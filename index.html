<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>بوابة الشكاوي - نقابة تكنولوجيا المعلومات والبرمجيات | VR 2.05.2026</title>
    
    <!-- الخطوط الأساسية الفاخرة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- AOS (Animate On Scroll) -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* =====================================================================
           التصميم الفخم جداً - VR 2.05.2026 ULTIMATE
           جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات © 2026
           تصميم حصري: المهندس/ محمود جميل
           ===================================================================== */
        
        /* -------------------- متغيرات الألوان الرئيسية الفاخرة -------------------- */
        :root {
            --bg-deep: #030514;
            --bg-dark: #0a0f1f;
            --bg-medium: #111827;
            --bg-light: #1e293b;
            --bg-card: rgba(15, 23, 42, 0.25);
            --bg-card-solid: #0f172a;
            --bg-sidebar: rgba(3, 5, 20, 0.7);
            --bg-input: rgba(3, 5, 20, 0.5);
            --bg-hover: rgba(0, 255, 255, 0.1);
            
            /* ألوان النيون الرئيسية */
            --neon-cyan: #00ffff;
            --neon-cyan-light: #7fffff;
            --neon-cyan-dark: #00cccc;
            --neon-cyan-glow: rgba(0, 255, 255, 0.7);
            --neon-cyan-soft: rgba(0, 255, 255, 0.2);
            --neon-cyan-glow-dark: rgba(0, 255, 255, 0.1);
            
            --neon-blue: #3b82f6;
            --neon-blue-light: #60a5fa;
            --neon-blue-dark: #2563eb;
            --neon-blue-glow: rgba(59, 130, 246, 0.7);
            
            --neon-purple: #a855f7;
            --neon-purple-light: #c084fc;
            --neon-purple-dark: #9333ea;
            --neon-purple-glow: rgba(168, 85, 247, 0.7);
            --neon-purple-soft: rgba(168, 85, 247, 0.2);
            
            --neon-pink: #ec4899;
            --neon-pink-light: #f472b6;
            --neon-pink-dark: #db2777;
            --neon-pink-glow: rgba(236, 72, 153, 0.7);
            
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.7);
            
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.7);
            
            --neon-orange: #f97316;
            --neon-orange-glow: rgba(249, 115, 22, 0.7);
            
            /* تدرجات نيون متحركة */
            --gradient-prime: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple));
            --gradient-warm: linear-gradient(45deg, var(--neon-orange), var(--neon-pink), var(--neon-purple));
            --gradient-cold: linear-gradient(315deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple));
            --gradient-rainbow: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple), var(--neon-pink), var(--neon-orange));
            
            --gradient-primary: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            --gradient-secondary: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            --gradient-danger: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
            --gradient-success: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            
            /* الظلال */
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 30px 60px rgba(0, 0, 0, 0.6);
            --shadow-2xl: 0 40px 80px rgba(0, 0, 0, 0.7);
            --shadow-3d: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            --shadow-neon: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-purple);
            --shadow-neon-strong: 0 0 50px var(--neon-cyan), 0 0 100px var(--neon-purple), 0 0 150px var(--neon-pink);
            
            /* المسافات */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 40px;
            --space-3xl: 60px;
            --space-4xl: 80px;
            
            /* أحجام الخطوط */
            --text-xs: 12px;
            --text-sm: 14px;
            --text-md: 16px;
            --text-lg: 18px;
            --text-xl: 20px;
            --text-2xl: 24px;
            --text-3xl: 30px;
            --text-4xl: 36px;
            --text-5xl: 48px;
            --text-6xl: 60px;
            --text-7xl: 72px;
            --text-8xl: 96px;
            
            /* مدة الحركات */
            --transition-fast: 0.15s;
            --transition-normal: 0.25s;
            --transition-slow: 0.4s;
            --transition-very-slow: 0.8s;
            
            /* منحنيات الحركة */
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            
            /* الحدود */
            --border-color: rgba(255, 255, 255, 0.1);
            --border-color-strong: rgba(255, 255, 255, 0.2);
            --border-hover: var(--neon-cyan);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 16px;
            --border-radius-xl: 24px;
            --border-radius-2xl: 32px;
            --border-radius-3xl: 40px;
            --border-radius-4xl: 50px;
            --border-radius-full: 50%;
            
            /* منظور ثلاثي الأبعاد */
            --perspective: 1000px;
            --perspective-3d: 2000px;
        }
        
        /* -------------------- إعادة تعيين الأنماط -------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', 'Space Grotesk', sans-serif;
            background: var(--bg-deep);
            color: #ffffff;
            direction: rtl;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
            will-change: transform;
        }
        
        /* -------------------- مؤشر الماوس المخصص السريع -------------------- */
        * {
            cursor: none !important;
        }
        
        .custom-cursor {
            width: 32px;
            height: 32px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.15s, height 0.15s, background 0.15s;
            mix-blend-mode: difference;
            box-shadow: 0 0 20px var(--neon-cyan);
            will-change: transform;
        }
        
        .custom-cursor::before {
            content: '';
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .custom-cursor.hover {
            width: 48px;
            height: 48px;
            background: rgba(0, 255, 255, 0.1);
            border-width: 3px;
        }
        
        /* -------------------- منع النسخ مع الحفاظ على الماوس ظاهر -------------------- */
        *:not(input):not(textarea):not(select) {
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
        }
        
        input, textarea, select {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
            pointer-events: auto !important;
            cursor: text !important;
        }
        
        button, .btn, .nav-btn, .login-btn, .splash-skip {
            cursor: none !important;
        }
        
        /* -------------------- الخلفية الكونية المتطورة (محسنة للأداء) -------------------- */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            animation: cosmicDrift 40s linear infinite;
            z-index: -2;
            pointer-events: none;
            will-change: transform;
        }
        
        @keyframes cosmicDrift {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.02) rotate(1deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        
        /* شبكة متحركة سريعة */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        
        /* -------------------- عناصر عائمة سريعة -------------------- */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            animation: floatFast 15s infinite alternate;
            will-change: transform;
        }
        
        .floating-element:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -150px;
            right: -150px;
            background: var(--neon-cyan);
            animation-duration: 12s;
        }
        
        .floating-element:nth-child(2) {
            width: 600px;
            height: 600px;
            bottom: -200px;
            left: -200px;
            background: var(--neon-purple);
            animation-duration: 15s;
            animation-direction: reverse;
        }
        
        @keyframes floatFast {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.05); }
        }
        
        /* -------------------- جزيئات متطايرة سريعة -------------------- */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: particleFloat 10s linear infinite;
            opacity: 0.3;
            will-change: transform;
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
        
        /* -------------------- شاشة البداية السريعة المبهرة -------------------- */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #030514, #0a0f1f);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        
        .splash-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        
        .splash-content {
            text-align: center;
            max-width: 90%;
            position: relative;
            z-index: 10;
            animation: splashFloat 4s ease-in-out infinite;
        }
        
        @keyframes splashFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* تأثير 3D سريع للشعار */
        .splash-logo-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 25px;
        }
        
        .splash-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 2;
            animation: logoSpin 8s linear infinite;
            box-shadow: 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-purple);
            will-change: transform;
        }
        
        @keyframes logoSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .splash-logo-wrapper::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--neon-cyan);
            border-right-color: var(--neon-purple);
            animation: borderRotate 4s linear infinite;
        }
        
        @keyframes borderRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .splash-title {
            font-size: var(--text-5xl);
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            animation: titleGlow 2s ease-in-out infinite;
        }
        
        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }
        
        .splash-subtitle {
            font-size: var(--text-lg);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            animation: subtitlePulse 2s ease-in-out infinite;
        }
        
        @keyframes subtitlePulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        /* محول سريع */
        .splash-loader {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px auto;
            overflow: hidden;
            border-radius: 2px;
        }
        
        .loader-bar {
            width: 40%;
            height: 100%;
            background: var(--gradient-primary);
            animation: loaderMove 1.2s ease-in-out infinite;
            will-change: transform;
        }
        
        @keyframes loaderMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        
        .splash-version {
            margin-top: 20px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            font-size: 14px;
        }
        
        /* زر تخطي سريع */
        .splash-skip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        
        .splash-skip:hover {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            transform: translateY(-2px);
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        /* -------------------- الحاوية الرئيسية -------------------- */
        .main-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            padding: var(--space-lg);
            width: 100%;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        .main-wrapper.visible {
            opacity: 1;
        }
        
        /* -------------------- تأثير الزجاج السريع -------------------- */
        .glass-effect {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-3d);
            transition: all var(--transition-normal) var(--ease-smooth);
            will-change: transform;
        }
        
        .glass-effect:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-neon), var(--shadow-3d);
        }
        
        /* -------------------- الهيدر السريع مع اللوجو -------------------- */
        .header-box {
            margin-bottom: var(--space-2xl);
            padding: var(--space-xl);
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-3xl);
            box-shadow: var(--shadow-3d);
            animation: headerFloat 5s ease-in-out infinite;
        }
        
        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: var(--space-xl);
            flex-wrap: wrap;
        }
        
        .header-logo-container {
            position: relative;
            flex-shrink: 0;
        }
        
        .header-logo-container::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-cyan-glow), transparent 70%);
            animation: logoPulse 2s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes logoPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        .header-main-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan);
            object-fit: cover;
            animation: logoGlow 3s ease-in-out infinite;
        }
        
        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 30px var(--neon-cyan); }
            50% { box-shadow: 0 0 50px var(--neon-purple); }
        }
        
        .header-titles {
            flex: 1;
        }
        
        .header-subtitle {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: var(--text-md);
            margin-bottom: 5px;
        }
        
        .header-title {
            font-size: var(--text-3xl);
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .header-role {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: var(--text-md);
            margin-bottom: 3px;
        }
        
        .header-name {
            display: block;
            font-size: var(--text-xl);
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink);
        }
        
        .version-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            border-radius: 30px;
            padding: 8px 20px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            font-size: var(--text-sm);
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }
        
        /* -------------------- أزرار التنقل السريعة -------------------- */
        .nav-buttons {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-2xl);
            flex-wrap: wrap;
        }
        
        .btn-nav {
            flex: 1;
            min-width: 140px;
            padding: var(--space-md) var(--space-lg);
            border: none;
            border-radius: var(--border-radius-xl);
            background: var(--bg-card);
            color: #fff;
            font-weight: 600;
            font-size: var(--text-md);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            cursor: pointer;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: all var(--transition-fast) var(--ease-smooth);
            will-change: transform;
        }
        
        .btn-nav:hover {
            transform: translateY(-3px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .btn-nav.active {
            background: var(--gradient-primary);
            border-color: transparent;
            box-shadow: 0 0 25px var(--neon-cyan);
        }
        
        .btn-nav.btn-admin-icon {
            flex: 0.3;
            min-width: 60px;
        }
        
        /* -------------------- الكروت السريعة -------------------- */
        .card {
            padding: var(--space-xl);
            border-radius: var(--border-radius-2xl);
            margin-bottom: var(--space-xl);
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-3d);
            transition: all var(--transition-fast) var(--ease-smooth);
            will-change: transform;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-neon), var(--shadow-3d);
        }
        
        .card-title {
            font-size: var(--text-xl);
            font-weight: 900;
            color: var(--neon-cyan);
            margin-bottom: var(--space-xl);
            text-align: center;
            text-shadow: 0 0 15px var(--neon-cyan);
        }
        
        /* -------------------- الحقول السريعة -------------------- */
        .input-group {
            margin-bottom: var(--space-lg);
        }
        
        .input-group label {

                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        // =====================================================================
        // شاشة البداية
        // =====================================================================
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-wrapper').classList.add('visible');
            }, 3000);
        });
        
        window.skipSplash = function() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-wrapper').classList.add('visible');
        };
        
        // =====================================================================
        // تحميل الإعدادات
        // =====================================================================
        function getSetting(key, defaultValue) {
            return localStorage.getItem(key) || defaultValue;
        }
        
        function getSavedLogo() {
            return getSetting(STORAGE_KEYS.LOGO_URL, DEFAULT_SETTINGS.LOGO_URL);
        }
        
        function getComplaintPrefix() {
            return getSetting(STORAGE_KEYS.COMPLAINT_PREFIX, DEFAULT_SETTINGS.COMPLAINT_PREFIX);
        }
        
        function getSuggestionPrefix() {
            return getSetting(STORAGE_KEYS.SUGGESTION_PREFIX, DEFAULT_SETTINGS.SUGGESTION_PREFIX);
        }
        
        function updateAllLogos() {
            const logo = getSavedLogo();
            document.getElementById('splash-logo').src = logo;
            document.getElementById('header-main-logo').src = logo;
        }
        updateAllLogos();
        
        // =====================================================================
        // تبديل المشاهد
        // =====================================================================
        window.switchView = function(view) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + view).style.display = 'block';
            
            if (view === 'submit') document.getElementById('btn-submit').classList.add('active');
            else if (view === 'track') document.getElementById('btn-track').classList.add('active');
            else if (view === 'login') document.getElementById('btn-login').classList.add('active');
        };
        window.switchView('submit');
        
        // =====================================================================
        // حقل العضوية
        // =====================================================================
        window.toggleMemberField = function() {
            const type = document.getElementById('u-member-type').value;
            const box = document.getElementById('member-id-box');
            const typeSelect = document.getElementById('u-req-type');
            
            if (type === 'عضو نقابة') {
                box.style.display = 'block';
                typeSelect.innerHTML = '<option value="شكوى">شكوى</option><option value="اقتراح">اقتراح</option>';
            } else {
                box.style.display = 'none';
                typeSelect.innerHTML = '<option value="اقتراح">اقتراح فقط</option>';
            }
        };
        
        // =====================================================================
        // التحقق من البيانات
        // =====================================================================
        function validateNationalID(nid) {
            return /^\d{14}$/.test(nid);
        }
        
        function validatePhone(phone) {
            return /^01[0-2,5]{1}[0-9]{8}$/.test(phone);
        }
        
        // =====================================================================
        // إنشاء رقم الطلب
        // =====================================================================
        async function generateRequestNumber(type) {
            const year = new Date().getFullYear();
            const prefix = type === 'شكوى' ? getComplaintPrefix() : getSuggestionPrefix();
            
            try {
                const requestsRef = collection(db, "Requests");
                const q = query(requestsRef, where("type", "==", type));
                const snapshot = await getDocs(q);
                
                let maxSerial = 0;
                snapshot.forEach(doc => {
                    const ref = doc.data().refId;
                    if (ref) {
                        const serial = parseInt(ref.split('-')[1]);
                        if (!isNaN(serial) && serial > maxSerial) maxSerial = serial;
                    }
                });
                
                return `${prefix}-${(maxSerial + 1).toString().padStart(4,'0')}-${year}`;
            } catch (e) {
                return `${prefix}-${Date.now().toString().slice(-6)}-${year}`;
            }
        }
        
        // =====================================================================
        // تقديم الطلب
        // =====================================================================
        function validateSubmitForm() {
            const name = document.getElementById('u-name')?.value.trim();
            const nid = document.getElementById('u-nid')?.value.trim();
            const phone = document.getElementById('u-phone')?.value.trim();
            const gov = document.getElementById('u-gov')?.value;
            const address = document.getElementById('u-address')?.value.trim();
            const job = document.getElementById('u-job')?.value.trim();
            const type = document.getElementById('u-req-type')?.value;
            const details = document.getElementById('u-details')?.value.trim();
            const memberType = document.getElementById('u-member-type')?.value;
            const memberId = document.getElementById('u-member-id')?.value.trim() || "غير عضو";
            
            if (!name || !nid || !phone || !gov || !address || !job || !details) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'املأ جميع البيانات', background: '#030514', confirmButtonColor: '#00ffff' });
                return null;
            }
            
            if (name.split(' ').length < 2) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'الاسم ثلاثي على الأقل', background: '#030514', confirmButtonColor: '#00ffff' });
                return null;
            }
            
            if (!validateNationalID(nid)) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'الرقم القومي 14 رقم', background: '#030514', confirmButtonColor: '#00ffff' });
                return null;
            }
            
            if (!validatePhone(phone)) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'رقم الهاتف غير صحيح', background: '#030514', confirmButtonColor: '#00ffff' });
                return null;
            }
            
            if (memberType === 'عضو نقابة' && !memberId) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'أدخل رقم العضوية', background: '#030514', confirmButtonColor: '#00ffff' });
                return null;
            }
            
            if (details.length < 10) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'التفاصيل على الأقل 10 حروف', background: '#030514', confirmButtonColor: '#00ffff' });
                return null;
            }
            
            return { name, nid, phone, gov, address, job, type, details, memberType, memberId };
        }
        
        async function generateRequestCard(data) {
            const logo = getSavedLogo();
            const date = new Date().toLocaleDateString('ar-EG');
            const time = new Date().toLocaleTimeString('ar-EG');
            
            const container = document.getElementById('request-card-container');
            container.innerHTML = '';
            
            const card = document.createElement('div');
            card.style.cssText = `
                width: 550px;
                padding: 35px;
                background: linear-gradient(135deg, #0a0f1f, #030514);
                border-radius: 35px;
                border: 4px solid #00ffff;
                font-family: 'Tajawal', sans-serif;
                color: white;
                text-align: center;
                direction: rtl;
                box-shadow: 0 20px 40px rgba(0,255,255,0.4);
            `;
            
            const logoImg = document.createElement('img');
            logoImg.src = logo;
            logoImg.style.cssText = `
                width: 100px;
                height: 100px;
                border-radius: 50%;
                border: 3px solid #00ffff;
                margin: 0 auto 15px;
                display: block;
                box-shadow: 0 0 30px #00ffff;
                object-fit: cover;
            `;
            
            const typeColor = data.type === 'شكوى' ? '#ef4444' : '#10b981';
            
            card.innerHTML = `
                <h2 style="font-size: 24px; background: linear-gradient(135deg, #00ffff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 5px 0;">نقابة تكنولوجيا المعلومات</h2>
                <h3 style="font-size: 18px; color: white;">المهندس / محمود جميل</h3>
                
                <div style="background: rgba(0,255,255,0.1); padding: 15px; border-radius: 20px; margin: 15px 0;">
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <span style="color: #aaa;">رقم الطلب:</span>
                        <span style="color: #00ffff;">${data.refId}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <span style="color: #aaa;">نوع الطلب:</span>
                        <span style="color: ${typeColor};">${data.type}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <span style="color: #aaa;">الاسم:</span>
                        <span>${data.name}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 8px 0;">
                        <span style="color: #aaa;">التاريخ:</span>
                        <span>${date} - ${time}</span>
                    </div>
                </div>
                
                <div style="color: #666; font-size: 12px;">هذا الكارت معتمد من النقابة</div>
                <div style="color: #00ffff; font-size: 10px; margin-top: 10px;">VR 2.05.2026</div>
            `;
            
            card.prepend(logoImg);
            container.appendChild(card);
            
            try {
                const canvas = await html2canvas(card, { scale: 2 });
                const dataUrl = canvas.toDataURL('image/png');
                
                const result = await Swal.fire({
                    title: '✅ تم الحفظ',
                    html: `<div style="color: #00ffff;">${data.refId}</div>`,
                    imageUrl: dataUrl,
                    imageWidth: 450,
                    showCancelButton: true,
                    confirmButtonText: '📥 تحميل',
                    cancelButtonText: 'إغلاق',
                    background: '#030514'
                });
                
                if (result.isConfirmed) {
                    const link = document.createElement('a');
                    link.download = `طلب_${data.refId}.png`;
                    link.href = dataUrl;
                    link.click();
                }
            } catch (e) {
                Swal.fire({ icon: 'success', title: 'تم', text: data.refId, background: '#030514' });
            }
            
            setTimeout(() => container.innerHTML = '', 1000);
        }
        
        window.handleSubmit = async function() {
            const formData = validateSubmitForm();
            if (!formData) return;
            
            try {
                Swal.fire({ title: 'جاري الحفظ', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const refId = await generateRequestNumber(formData.type);
                const initialStatus = formData.type === 'شكوى' ? "تم الاستلام" : "لم يقرأ";
                
                const requestData = {
                    refId,
                    ...formData,
                    status: initialStatus,
                    createdAt: serverTimestamp(),
                    tracking: [{
                        status: initialStatus,
                        comment: formData.type === 'شكوى' ? "تم استلام شكواك" : "تم استلام اقتراحك",
                        time: new Date().toLocaleString('ar-EG'),
                        isFinal: false
                    }]
                };
                
                await setDoc(doc(db, "Requests", refId), requestData);
                Swal.close();
                await generateRequestCard(requestData);
                
                // Clear form
                ['u-name','u-nid','u-phone','u-address','u-job','u-details','u-member-id'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = '';
                });
                document.getElementById('u-member-type').value = 'عضو نقابة';
                document.getElementById('u-gov').value = 'القاهرة';
                document.getElementById('u-req-type').innerHTML = '<option value="شكوى">شكوى</option><option value="اقتراح">اقتراح</option>';
                document.getElementById('member-id-box').style.display = 'block';
                
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: e.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
        
        // =====================================================================
        // الاستعلام
        // =====================================================================
        window.handleTrack = async function() {
            const nid = document.getElementById('q-nid')?.value.trim();
            const ref = document.getElementById('q-ref')?.value.trim();
            const type = document.getElementById('q-type')?.value;
            
            if (!nid || !ref || !type) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'أدخل جميع البيانات', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            try {
                Swal.fire({ title: 'جاري البحث', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const requestsRef = collection(db, "Requests");
                const q = query(requestsRef, 
                    where("nid", "==", nid),
                    where("refId", "==", ref),
                    where("type", "==", type)
                );
                const snapshot = await getDocs(q);
                
                Swal.close();
                
                if (snapshot.empty) {
                    Swal.fire({ icon: 'error', title: 'لا يوجد', text: 'لا يوجد طلب', background: '#030514', confirmButtonColor: '#00ffff' });
                    return;
                }
                
                const data = snapshot.docs[0].data();
                renderTrackResult(data);
                
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: e.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
        
        function renderTrackResult(data) {
            const stages = [...(data.tracking?.map(t => t.status) || []), "تم الإغلاق النهائي"];
            const currentIdx = stages.indexOf(data.status);
            const progress = stages.length > 0 ? (currentIdx / (stages.length - 1)) * 100 : 0;
            
            const timeline = data.tracking?.length ? data.tracking.slice().reverse().map(t => `
                <div class="timeline-card">
                    <div class="timeline-header">
                        <span class="timeline-status">${t.status}</span>
                        <span class="timeline-time">${t.time}</span>
                    </div>
                    <p>${t.comment}</p>
                </div>
            `).join('') : '<p style="text-align:center">لا يوجد مسار زمني</p>';
            
            const html = `
                <div class="card" style="margin-top:20px;">
                    <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                        <div style="width:60px; height:60px; background:var(--gradient-primary); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                            <i class="fas fa-qrcode" style="font-size:30px; color:#fff;"></i>
                        </div>
                        <div>
                            <h3 style="color:var(--neon-cyan); font-size:20px;">${data.refId}</h3>
                            <p>${data.name}</p>
                        </div>
                    </div>
                    
                    <div class="track-container">
                        <div class="track-line-bg"></div>
                        <div class="track-line-fill" style="width:${progress}%;"></div>
                        <div class="track-points">
                            ${stages.map((s, i) => `
                                <div class="track-point">
                                    <div class="track-dot ${i <= currentIdx ? 'active' : ''}">
                                        ${i <= currentIdx ? '<i class="fas fa-check"></i>' : ''}
                                    </div>
                                    <span class="track-label">${s}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <h4 style="color:var(--neon-cyan); margin:15px 0 10px;">المسار الزمني</h4>
                    <div style="max-height:250px; overflow-y:auto;">${timeline}</div>
                </div>
            `;
            
            const resultBox = document.getElementById('track-result-box');
            resultBox.innerHTML = html;
            resultBox.style.display = 'block';
        }
        
        // =====================================================================
        // تسجيل الدخول
        // =====================================================================
        window.handleLogin = async function() {
            const username = document.getElementById('login-username')?.value.trim();
            const password = document.getElementById('login-password')?.value.trim();
            
            if (!username || !password) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'أدخل اسم المستخدم وكلمة المرور', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            try {
                Swal.fire({ title: 'جاري التحقق', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const usersRef = collection(db, 'Users');
                const q = query(usersRef, where('username', '==', username));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    Swal.close();
                    Swal.fire({ icon: 'error', title: 'خطأ', text: 'اسم المستخدم غير موجود', background: '#030514', confirmButtonColor: '#00ffff' });
                    return;
                }
                
                const userDoc = snapshot.docs[0];
                const userData = userDoc.data();
                
                if (userData.isActive === false) {
                    Swal.close();
                    Swal.fire({ icon: 'error', title: 'حساب معطل', text: 'الحساب غير نشط', background: '#030514', confirmButtonColor: '#00ffff' });
                    return;
                }
                
                // Simple password check (base64)
                const hashedPassword = btoa(password);
                if (hashedPassword !== userData.password) {
                    Swal.close();
                    Swal.fire({ icon: 'error', title: 'خطأ', text: 'كلمة المرور غير صحيحة', background: '#030514', confirmButtonColor: '#00ffff' });
                    return;
                }
                
                // Update last login
                await setDoc(doc(db, "Users", userDoc.id), {
                    lastLogin: serverTimestamp(),
                    lastLoginString: new Date().toLocaleString('ar-EG')
                }, { merge: true });
                
                localStorage.setItem('currentUserId', userDoc.id);
                localStorage.setItem('currentUser', userData.username);
                localStorage.setItem('currentUserRole', userData.role);
                
                Swal.close();
                Swal.fire({
                    icon: 'success',
                    title: 'مرحباً',
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#030514'
                }).then(() => {
                    window.location.href = 'admin.html';
                });
                
            } catch (error) {
                Swal.close();
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
    </script>
</body>
</html>
