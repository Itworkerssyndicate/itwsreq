<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>بوابة الشكاوي - نقابة تكنولوجيا المعلومات والبرمجيات | VR 2.05.2026</title>
    
    <!-- الخطوط الأساسية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        /* =====================================================================
           التصميم الخرافي - VR 2.05.2026 ULTIMATE
           جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات © 2026
           تصميم حصري: المهندس/ محمود جميل
           ===================================================================== */
        
        :root {
            --bg-deep: #030514;
            --bg-dark: #0a0f1f;
            --bg-medium: #111827;
            --bg-light: #1e293b;
            --bg-card: rgba(15, 23, 42, 0.25);
            --bg-card-solid: #0f172a;
            --bg-sidebar: rgba(3, 5, 20, 0.7);
            --bg-input: rgba(3, 5, 20, 0.5);
            --bg-hover: rgba(0, 255, 255, 0.1);
            
            --neon-cyan: #00ffff;
            --neon-cyan-light: #7fffff;
            --neon-cyan-dark: #00cccc;
            --neon-cyan-glow: rgba(0, 255, 255, 0.7);
            --neon-cyan-soft: rgba(0, 255, 255, 0.15);
            
            --neon-blue: #3b82f6;
            --neon-blue-light: #60a5fa;
            --neon-blue-dark: #2563eb;
            --neon-blue-glow: rgba(59, 130, 246, 0.7);
            
            --neon-purple: #a855f7;
            --neon-purple-light: #c084fc;
            --neon-purple-dark: #9333ea;
            --neon-purple-glow: rgba(168, 85, 247, 0.7);
            --neon-purple-soft: rgba(168, 85, 247, 0.15);
            
            --neon-pink: #ec4899;
            --neon-pink-light: #f472b6;
            --neon-pink-dark: #db2777;
            --neon-pink-glow: rgba(236, 72, 153, 0.7);
            
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.7);
            
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.7);
            
            --neon-orange: #f97316;
            --neon-orange-glow: rgba(249, 115, 22, 0.7);
            
            --gradient-prime: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple));
            --gradient-warm: linear-gradient(45deg, var(--neon-orange), var(--neon-pink), var(--neon-purple));
            --gradient-cold: linear-gradient(315deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple));
            --gradient-rainbow: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue), var(--neon-purple), var(--neon-pink), var(--neon-orange));
            
            --gradient-primary: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            --gradient-secondary: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
            --gradient-danger: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
            --gradient-success: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 30px 60px rgba(0, 0, 0, 0.6);
            --shadow-2xl: 0 40px 80px rgba(0, 0, 0, 0.7);
            --shadow-3d: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            --shadow-neon: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-purple);
            --shadow-neon-strong: 0 0 50px var(--neon-cyan), 0 0 100px var(--neon-purple), 0 0 150px var(--neon-pink);
            
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 40px;
            --space-3xl: 60px;
            --space-4xl: 80px;
            
            --text-xs: 12px;
            --text-sm: 14px;
            --text-md: 16px;
            --text-lg: 18px;
            --text-xl: 20px;
            --text-2xl: 24px;
            --text-3xl: 30px;
            --text-4xl: 36px;
            --text-5xl: 48px;
            --text-6xl: 60px;
            --text-7xl: 72px;
            
            --transition-fast: 0.15s;
            --transition-normal: 0.25s;
            --transition-slow: 0.4s;
            --transition-very-slow: 0.8s;
            
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            
            --border-color: rgba(255, 255, 255, 0.1);
            --border-color-strong: rgba(255, 255, 255, 0.2);
            --border-hover: var(--neon-cyan);
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 16px;
            --border-radius-xl: 24px;
            --border-radius-2xl: 32px;
            --border-radius-3xl: 40px;
            --border-radius-4xl: 50px;
            --border-radius-full: 50%;
            
            --perspective: 1000px;
            --perspective-3d: 2000px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', 'Space Grotesk', sans-serif;
            background: var(--bg-deep);
            color: #ffffff;
            direction: rtl;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        /* -------------------- مؤشر الماوس المخصص (سريع) -------------------- */
        * {
            cursor: none !important;
        }
        
        .custom-cursor {
            width: 24px;
            height: 24px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.1s, height 0.1s, background 0.1s;
            mix-blend-mode: difference;
            box-shadow: 0 0 15px var(--neon-cyan);
            will-change: transform;
        }
        
        .custom-cursor::before {
            content: '';
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .custom-cursor.hover {
            width: 36px;
            height: 36px;
            background: rgba(0, 255, 255, 0.1);
        }
        
        *:not(input):not(textarea):not(select) {
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
        }
        
        input, textarea, select {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
            pointer-events: auto !important;
            cursor: text !important;
        }
        
        button, .btn, .nav-btn, .login-btn, .splash-skip {
            cursor: none !important;
        }
        
        /* -------------------- الخلفية الكونية -------------------- */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            animation: cosmicDrift 30s ease-in-out infinite alternate;
            z-index: -2;
            pointer-events: none;
        }
        
        @keyframes cosmicDrift {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.5; transform: scale(1.05); }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(30px); }
        }
        
        /* -------------------- عناصر عائمة -------------------- */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            animation: float 15s infinite alternate;
        }
        
        .floating-element:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -150px;
            right: -150px;
            background: var(--neon-cyan);
        }
        
        .floating-element:nth-child(2) {
            width: 600px;
            height: 600px;
            bottom: -200px;
            left: -200px;
            background: var(--neon-purple);
        }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, -30px); }
        }
        
        /* -------------------- جزيئات متطايرة -------------------- */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: particleFloat 15s linear infinite;
            opacity: 0.3;
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
        
        /* -------------------- شاشة البداية - لوجو بيلف بهدوء -------------------- */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #030514, #0a0f1f);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .splash-screen.fade-out {
            animation: splashFadeOut 1s ease forwards;
        }
        
        @keyframes splashFadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        
        .splash-content {
            text-align: center;
            max-width: 90%;
            animation: splashFloat 4s ease-in-out infinite;
        }
        
        @keyframes splashFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .splash-logo-wrapper {
            width: 250px;
            height: 250px;
            margin: 0 auto 25px;
        }
        
        .splash-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-purple);
            object-fit: cover;
            animation: logoSpin 20s linear infinite;
        }
        
        @keyframes logoSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .splash-title {
            font-size: var(--text-5xl);
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .splash-subtitle {
            font-size: var(--text-xl);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }
        
        .splash-loader {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px auto;
            overflow: hidden;
            border-radius: 2px;
        }
        
        .loader-bar {
            width: 40%;
            height: 100%;
            background: var(--gradient-primary);
            animation: loaderMove 1.5s ease infinite;
        }
        
        @keyframes loaderMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        
        .splash-version {
            margin-top: 20px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            font-size: 14px;
        }
        
        .splash-skip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.2s;
        }
        
        .splash-skip:hover {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        /* -------------------- الحاوية الرئيسية -------------------- */
        .main-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            padding: var(--space-lg);
            width: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .main-wrapper.visible {
            opacity: 1;
        }
        
        /* -------------------- تأثير الزجاج -------------------- */
        .glass-effect {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-3d);
            transition: var(--transition-normal);
        }
        
        .glass-effect:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-neon), var(--shadow-3d);
        }
        
        /* -------------------- الهيدر -------------------- */
        .header-box {
            margin-bottom: var(--space-2xl);
            padding: var(--space-xl);
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-3xl);
            box-shadow: var(--shadow-3d);
            animation: headerFloat 5s ease-in-out infinite;
        }
        
        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: var(--space-xl);
            flex-wrap: wrap;
        }
        
        .header-logo-container {
            position: relative;
        }
        
        .header-logo-container::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-cyan-glow), transparent 70%);
            animation: logoPulse 2s ease infinite;
            z-index: -1;
        }
        
        @keyframes logoPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        .header-main-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan);
            object-fit: cover;
        }
        
        .header-titles {
            flex: 1;
        }
        
        .header-subtitle {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: var(--text-md);
            margin-bottom: 5px;
        }
        
        .header-title {
            font-size: var(--text-3xl);
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }
        
        .header-role {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: var(--text-md);
            margin-bottom: 3px;
        }
        
        /* المهندس / محمود جميل - بدون ظل */
        .header-name {
            display: block;
            font-size: var(--text-xl);
            color: #fff;
        }
        
        .version-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            border-radius: 30px;
            padding: 8px 20px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            font-size: var(--text-sm);
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }
        
        /* -------------------- أزرار التنقل -------------------- */
        .nav-buttons {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-2xl);
            flex-wrap: wrap;
        }
        
        .btn-nav {
            flex: 1;
            min-width: 140px;
            padding: var(--space-md) var(--space-lg);
            border: none;
            border-radius: var(--border-radius-xl);
            background: var(--bg-card);
            color: #fff;
            font-weight: 600;
            font-size: var(--text-md);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            cursor: pointer;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: var(--transition-fast);
        }
        
        .btn-nav:hover {
            transform: translateY(-3px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .btn-nav.active {
            background: var(--gradient-primary);
            border-color: transparent;
            box-shadow: 0 0 25px var(--neon-cyan);
        }
        
        .btn-nav.btn-admin-icon {
            flex: 0.3;
            min-width: 60px;
        }
        
        /* -------------------- الكروت -------------------- */
        .card {
            padding: var(--space-xl);
            border-radius: var(--border-radius-2xl);
            margin-bottom: var(--space-xl);
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-3d);
            transition: var(--transition-fast);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-neon), var(--shadow-3d);
        }
        
        .card-title {
            font-size: var(--text-xl);
            font-weight: 900;
            color: var(--neon-cyan);
            margin-bottom: var(--space-xl);
            text-align: center;
        }
        
        /* -------------------- الحقول -------------------- */
        .input-group {
            margin-bottom: var(--space-lg);
        }
        
        .input-group label {
            display: block;
            margin-bottom: var(--space-xs);
            font-size: var(--text-sm);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }
        
        .input-group label i {
            color: var(--neon-cyan);
            margin-left: var(--space-xs);
            width: 20px;
        }
        
        .neon-input {
            width: 100%;
            padding: var(--space-md) var(--space-lg);
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-xl);
            color: #fff;
            font-size: var(--text-sm);
            outline: none;
            transition: var(--transition-fast);
            backdrop-filter: blur(5px);
        }
        
        .neon-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: translateY(-2px);
        }
        
        select.neon-input {
            cursor: pointer;
        }
        
        textarea.neon-input {
            resize: vertical;
            min-height: 100px;
        }
        
        .responsive-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }
        
        /* -------------------- الزر الرئيسي -------------------- */
        .btn-main {
            width: 100%;
            padding: var(--space-lg);
            border: none;
            border-radius: var(--border-radius-xl);
            background: var(--gradient-primary);
            color: #fff;
            font-weight: 800;
            font-size: var(--text-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
            transition: var(--transition-fast);
        }
        
        .btn-main:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-neon);
        }
        
        .btn-main:hover i {
            transform: rotate(360deg);
            transition: transform 0.4s;
        }
        
        /* -------------------- شاشة تسجيل الدخول -------------------- */
        .login-card {
            max-width: 450px;
            margin: 0 auto;
        }
        
        .login-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-lg);
            box-shadow: var(--shadow-neon);
        }
        
        .login-icon i {
            font-size: 40px;
            color: white;
        }
        
        .login-info {
            text-align: center;
            margin-top: var(--space-lg);
            color: rgba(255, 255, 255, 0.5);
            font-size: var(--text-xs);
        }
        
        /* -------------------- المسار الزمني -------------------- */
        .track-container {
            position: relative;
            width: 100%;
            height: 100px;
            margin: var(--space-2xl) 0;
        }
        
        .track-line-bg {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            transform: translateY(-50%);
        }
        
        .track-line-fill {
            position: absolute;
            top: 50%;
            right: 0;
            height: 6px;
            background: var(--gradient-primary);
            border-radius: 3px;
            transform: translateY(-50%);
            transition: width 1s ease;
            box-shadow: 0 0 20px var(--neon-cyan);
            z-index: 2;
        }
        
        .track-points {
            position: relative;
            display: flex;
            justify-content: space-between;
            height: 100px;
            z-index: 3;
        }
        
        .track-point {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .track-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-deep);
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
        }
        
        .track-dot.active {
            background: var(--gradient-primary);
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: scale(1.1);
        }
        
        .track-dot i {
            color: #fff;
            font-size: 16px;
        }
        
        .track-label {
            font-size: var(--text-xs);
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 8px;
            border-radius: 15px;
            max-width: 100px;
        }
        
        .timeline-card {
            background: rgba(255, 255, 255, 0.02);
            border-right: 3px solid var(--neon-cyan);
            padding: var(--space-md);
            border-radius: var(--border-radius-md);
            margin-bottom: var(--space-sm);
        }
        
        .timeline-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-xs);
        }
        
        .timeline-status {
            color: var(--neon-cyan);
            font-weight: 600;
        }
        
        .timeline-time {
            color: rgba(255, 255, 255, 0.5);
            font-size: var(--text-xs);
        }
        
        .timeline-card p {
            font-size: var(--text-xs);
            color: rgba(255, 255, 255, 0.8);
            padding-right: var(--space-md);
            border-right: 1px dashed rgba(255, 255, 255, 0.1);
        }
        
        /* -------------------- كارت التصدير -------------------- */
        #request-card-container {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 600px;
        }
        
        /* -------------------- تحسينات الجوال -------------------- */

    <!-- html2canvas -->

    <script>
        // =====================================================================
        // تهيئة Firebase
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC71PVDTouBkQ4hRTANelbwRo4AYI6LwnE",
            authDomain: "itwsreq.firebaseapp.com",
            projectId: "itwsreq",
            storageBucket: "itwsreq.firebasestorage.app",
            messagingSenderId: "417900842360",
            appId: "1:417900842360:web:83d9310f36fef5bbbe4c8d",
            measurementId: "G-P3YQFRSBMM"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // =====================================================================
        // متغيرات الإعدادات
        // =====================================================================
        const STORAGE_KEYS = {
            LOGO_URL: 'union_logo_url',
            SERVICES_URL: 'services_url',
            SERVICES_TEXT: 'services_text',
            SHOW_SERVICES: 'show_services',
            COMPLAINT_PREFIX: 'complaint_prefix',
            SUGGESTION_PREFIX: 'suggestion_prefix'
        };
        
        const DEFAULT_SETTINGS = {
            LOGO_URL: 'https://placehold.co/250x250/0a0f1f/00ffff/png?text=Logo',
            SERVICES_URL: 'https://services.egeng.org',
            SERVICES_TEXT: 'موقع تقديم خدمات النقابة',
            SHOW_SERVICES: true,
            COMPLAINT_PREFIX: 'REQ',
            SUGGESTION_PREFIX: 'REP'
        };
        
        // =====================================================================
        // مؤشر الماوس المخصص السريع
        // =====================================================================
        const cursor = document.getElementById('custom-cursor');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        
        document.querySelectorAll('button, a, .btn-nav, .btn-main, .splash-skip').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });
        
        // =====================================================================
        // إنشاء الجزيئات
        // =====================================================================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        // =====================================================================
        // شاشة البداية
        // =====================================================================
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-wrapper').classList.add('visible');
                }, 1000);
            }, 3000);
        });
        
        window.skipSplash = function() {
            document.getElementById('splash-screen').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-wrapper').classList.add('visible');
            }, 1000);
        };
        
        // =====================================================================
        // تحميل اللوجو من الإعدادات
        // =====================================================================
        function getSavedLogo() {
            return localStorage.getItem(STORAGE_KEYS.LOGO_URL) || DEFAULT_SETTINGS.LOGO_URL;
        }
        
        function updateAllLogos() {
            const logo = getSavedLogo();
            const splashLogo = document.getElementById('splash-logo');
            const headerLogo = document.getElementById('header-main-logo');
            
            if (splashLogo) splashLogo.src = logo;
            if (headerLogo) headerLogo.src = logo;
        }
        
        // =====================================================================
        // تحميل الإعدادات
        // =====================================================================
        window.addEventListener('load', updateAllLogos);
        
        // =====================================================================
        // تبديل المشاهد
        // =====================================================================
        window.switchView = function(view) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + view).style.display = 'block';
            
            if (view === 'submit') document.getElementById('btn-submit').classList.add('active');
            else if (view === 'track') document.getElementById('btn-track').classList.add('active');
            else if (view === 'login') document.getElementById('btn-login').classList.add('active');
        };
        window.switchView('submit');
        
        // =====================================================================
        // حقل العضوية
        // =====================================================================
        window.toggleMemberField = function() {
            const type = document.getElementById('u-member-type').value;
            const box = document.getElementById('member-id-box');
            const typeSelect = document.getElementById('u-req-type');
            
            if (type === 'عضو نقابة') {
                box.style.display = 'block';
                typeSelect.innerHTML = '<option value="شكوى">شكوى</option><option value="اقتراح">اقتراح</option>';
            } else {
                box.style.display = 'none';
                typeSelect.innerHTML = '<option value="اقتراح">اقتراح فقط</option>';
            }
        };
        
        // =====================================================================
        // التحقق من البيانات
        // =====================================================================
        function validateNationalID(nid) {
            return /^\d{14}$/.test(nid);
        }
        
        function validatePhone(phone) {
            return /^01[0-2,5]{1}[0-9]{8}$/.test(phone);
        }
        
        // =====================================================================
        // تقديم الطلب
        // =====================================================================
        window.handleSubmit = async function() {
            const name = document.getElementById('u-name')?.value.trim();
            const nid = document.getElementById('u-nid')?.value.trim();
            const phone = document.getElementById('u-phone')?.value.trim();
            const gov = document.getElementById('u-gov')?.value;
            const address = document.getElementById('u-address')?.value.trim();
            const job = document.getElementById('u-job')?.value.trim();
            const type = document.getElementById('u-req-type')?.value;
            const details = document.getElementById('u-details')?.value.trim();
            const memberType = document.getElementById('u-member-type')?.value;
            const memberId = document.getElementById('u-member-id')?.value.trim() || "غير عضو";
            
            if (!name || !nid || !phone || !gov || !address || !job || !details) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'املأ جميع البيانات', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            if (!validateNationalID(nid)) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'الرقم القومي 14 رقم', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            if (!validatePhone(phone)) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'رقم الهاتف غير صحيح', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            try {
                Swal.fire({ title: 'جاري الحفظ', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const year = new Date().getFullYear();
                const prefix = type === 'شكوى' ? 'REQ' : 'REP';
                const refId = prefix + '-0001-' + year;
                
                const requestData = {
                    refId,
                    name, nid, phone, gov, address, job, type, details, memberType, memberId,
                    status: type === 'شكوى' ? 'تم الاستلام' : 'لم يقرأ',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    tracking: [{
                        status: type === 'شكوى' ? 'تم الاستلام' : 'لم يقرأ',
                        comment: type === 'شكوى' ? 'تم استلام شكواك' : 'تم استلام اقتراحك',
                        time: new Date().toLocaleString('ar-EG'),
                        isFinal: false
                    }]
                };
                
                await db.collection('Requests').doc(refId).set(requestData);
                Swal.close();
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم الحفظ',
                    text: refId,
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                
                ['u-name','u-nid','u-phone','u-address','u-job','u-details','u-member-id'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = '';
                });
                
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
        
        // =====================================================================
        // الاستعلام
        // =====================================================================
        window.handleTrack = async function() {
            const nid = document.getElementById('q-nid')?.value.trim();
            const ref = document.getElementById('q-ref')?.value.trim();
            const type = document.getElementById('q-type')?.value;
            
            if (!nid || !ref || !type) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'أدخل جميع البيانات', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            try {
                Swal.fire({ title: 'جاري البحث', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const snapshot = await db.collection('Requests')
                    .where('nid', '==', nid)
                    .where('refId', '==', ref)
                    .where('type', '==', type)
                    .get();
                
                Swal.close();
                
                if (snapshot.empty) {
                    Swal.fire({ icon: 'error', title: 'لا يوجد', text: 'لا يوجد طلب', background: '#030514', confirmButtonColor: '#00ffff' });
                    return;
                }
                
                const data = snapshot.docs[0].data();
                
                const stages = [...(data.tracking?.map(t => t.status) || []), "تم الإغلاق النهائي"];
                const currentIdx = stages.indexOf(data.status);
                const progress = stages.length > 0 ? (currentIdx / (stages.length - 1)) * 100 : 0;
                
                const timeline = data.tracking?.length ? data.tracking.slice().reverse().map(t => `
                    <div class="timeline-card">
                        <div class="timeline-header">
                            <span class="timeline-status">${t.status}</span>
                            <span class="timeline-time">${t.time}</span>
                        </div>
                        <p>${t.comment}</p>
                    </div>
                `).join('') : '<p style="text-align:center">لا يوجد مسار زمني</p>';
                
                const html = `
                    <div class="card" style="margin-top:20px;">
                        <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                            <div style="width:60px; height:60px; background:var(--gradient-primary); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                                <i class="fas fa-qrcode" style="font-size:30px; color:#fff;"></i>
                            </div>
                            <div>
                                <h3 style="color:var(--neon-cyan);">${data.refId}</h3>
                                <p>${data.name}</p>
                            </div>
                        </div>
                        
                        <div class="track-container">
                            <div class="track-line-bg"></div>
                            <div class="track-line-fill" style="width:${progress}%;"></div>
                            <div class="track-points">
                                ${stages.map((s, i) => `
                                    <div class="track-point">
                                        <div class="track-dot ${i <= currentIdx ? 'active' : ''}">
                                            ${i <= currentIdx ? '<i class="fas fa-check"></i>' : ''}
                                        </div>
                                        <span class="track-label">${s}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <h4 style="color:var(--neon-cyan); margin:15px 0 10px;">المسار الزمني</h4>
                        <div style="max-height:250px; overflow-y:auto;">${timeline}</div>
                    </div>
                `;
                
                document.getElementById('track-result-box').innerHTML = html;
                document.getElementById('track-result-box').style.display = 'block';
                
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
        
        // =====================================================================
        // تسجيل الدخول
        // =====================================================================
        window.handleLogin = async function() {
            const username = document.getElementById('login-username')?.value.trim();
            const password = document.getElementById('login-password')?.value.trim();
            
            if (!username || !password) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'أدخل اسم المستخدم وكلمة المرور', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            try {
                Swal.fire({ title: 'جاري التحقق', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const snapshot = await db.collection('Users').where('username', '==', username).get();
                
                if (snapshot.empty) {
                    Swal.close();
                    Swal.fire({ icon: 'error', title: 'خطأ', text: 'اسم المستخدم غير موجود', background: '#030514', confirmButtonColor: '#00ffff' });
                    return;
                }
                
                const userDoc = snapshot.docs[0];
                const userData = userDoc.data();
                
                if (userData.isActive === false) {
                    Swal.close();
                    Swal.fire({ icon: 'error', title: 'حساب معطل', text: 'الحساب غير نشط', background: '#030514', confirmButtonColor: '#00ffff' });
                    return;
                }
                
                const hashedPassword = btoa(password);
                if (hashedPassword !== userData.password) {
                    Swal.close();
                    Swal.fire({ icon: 'error', title: 'خطأ', text: 'كلمة المرور غير صحيحة', background: '#030514', confirmButtonColor: '#00ffff' });
                    return;
                }
                
                const now = new Date();
                const lastLoginStr = now.toLocaleString('ar-EG');
                
                await db.collection('Users').doc(userDoc.id).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLoginString: lastLoginStr
                });
                
                localStorage.setItem('currentUserId', userDoc.id);
                localStorage.setItem('currentUser', userData.username);
                localStorage.setItem('currentUserRole', userData.role);
                
                Swal.close();
                
                Swal.fire({
                    icon: 'success',
                    title: 'مرحباً بك',
                    html: `<p style="color: #00ffff;">${userData.name || userData.username}</p><p>جاري التحويل...</p>`,
                    timer: 2000,
                    showConfirmButton: false,
                    background: '#030514'
                }).then(() => {
                    window.location.href = 'admin.html';
                });
                
            } catch (error) {
                Swal.close();
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
    </script>
</body>
</html>
