<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>بوابة الشكاوي - نقابة تكنولوجيا المعلومات والبرمجيات | VR 2.05.2026</title>
    
    <!-- الخطوط الأساسية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        /* =====================================================================
           التصميم الفخم - VR 2.05.2026
           جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات © 2026
           ===================================================================== */
        
        :root {
            --bg-deep: #030514;
            --bg-dark: #0a0f1f;
            --bg-medium: #111827;
            --bg-card: rgba(15, 23, 42, 0.4);
            --bg-input: rgba(3, 5, 20, 0.6);
            --bg-hover: rgba(0, 255, 255, 0.1);
            
            --neon-cyan: #00ffff;
            --neon-cyan-glow: rgba(0, 255, 255, 0.7);
            --neon-cyan-soft: rgba(0, 255, 255, 0.2);
            
            --neon-purple: #a855f7;
            --neon-purple-glow: rgba(168, 85, 247, 0.7);
            --neon-purple-soft: rgba(168, 85, 247, 0.2);
            
            --neon-pink: #ec4899;
            --neon-pink-glow: rgba(236, 72, 153, 0.7);
            
            --neon-green: #10b981;
            --neon-red: #ef4444;
            --neon-orange: #f97316;
            
            --gradient-primary: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            --gradient-warm: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            --gradient-rainbow: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            
            --shadow-3d: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            --shadow-neon: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-purple);
            
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 40px;
            
            --text-xs: 12px;
            --text-sm: 14px;
            --text-md: 16px;
            --text-lg: 18px;
            --text-xl: 20px;
            --text-2xl: 24px;
            --text-3xl: 30px;
            --text-4xl: 36px;
            --text-5xl: 48px;
            
            --border-color: rgba(255, 255, 255, 0.1);
            --border-radius-xl: 30px;
            --border-radius-2xl: 40px;
            --border-radius-3xl: 50px;
            --border-radius-full: 50%;
            
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: #fff;
            direction: rtl;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, var(--neon-cyan-soft) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, var(--neon-purple-soft) 0%, transparent 50%);
            animation: cosmicWave 20s ease infinite;
            z-index: -2;
        }
        
        @keyframes cosmicWave {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        
        /* عناصر عائمة */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 15s infinite alternate;
        }
        
        .floating-element:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -150px;
            right: -150px;
            background: var(--neon-cyan);
        }
        
        .floating-element:nth-child(2) {
            width: 600px;
            height: 600px;
            bottom: -200px;
            left: -200px;
            background: var(--neon-purple);
        }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, -30px); }
        }
        
        /* جزيئات متطايرة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gradient-primary);
            border-radius: 50%;
            animation: particleFloat 20s linear infinite;
            opacity: 0.4;
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0.4; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* ==================== شاشة البداية - مضبوطة في النص ==================== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #030514, #0a0f1f, #1a1f3a);
            z-index: 9999;
            animation: splashFadeOut 1s ease 4s forwards;
        }
        
        @keyframes splashFadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        .splash-content {
            text-align: center;
            max-width: 90%;
            transform: translateY(0);
            animation: splashFloat 3s ease-in-out infinite;
        }
        
        @keyframes splashFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .splash-logo-wrapper {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .splash-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 50px var(--neon-cyan), 0 0 100px var(--neon-purple);
            animation: logoSpin 10s linear infinite;
            object-fit: cover;
        }
        
        @keyframes logoSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .splash-title {
            font-size: var(--text-4xl);
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .splash-subtitle {
            font-size: var(--text-lg);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }
        
        .splash-loader {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px auto;
            overflow: hidden;
            border-radius: 2px;
        }
        
        .loader-bar {
            width: 40%;
            height: 100%;
            background: var(--gradient-primary);
            animation: loaderMove 1.5s ease infinite;
        }
        
        @keyframes loaderMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        
        .splash-version {
            margin-top: 20px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            font-size: 14px;
        }
        
        /* ==================== الحاوية الرئيسية ==================== */
        .main-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            padding: var(--space-lg);
            width: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .main-wrapper.visible {
            opacity: 1;
        }
        
        /* تأثير الزجاج */
        .glass-effect {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-3d);
            transition: var(--transition);
        }
        
        .glass-effect:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-neon), var(--shadow-3d);
        }
        
        /* ==================== الهيدر ==================== */
        .header-box {
            margin-bottom: var(--space-2xl);
            padding: var(--space-xl);
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-3xl);
            box-shadow: var(--shadow-3d);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: var(--space-xl);
            flex-wrap: wrap;
        }
        
        .header-logo-container {
            position: relative;
        }
        
        .header-main-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan);
            object-fit: cover;
        }
        
        .header-titles {
            flex: 1;
        }
        
        .header-subtitle {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: var(--text-md);
            margin-bottom: 5px;
        }
        
        .header-title {
            font-size: var(--text-3xl);
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }
        
        .header-role {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: var(--text-md);
        }
        
        .header-name {
            display: block;
            font-size: var(--text-xl);
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink);
        }
        
        .version-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            border-radius: 30px;
            padding: 8px 20px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
        }
        
        /* ==================== أزرار التنقل ==================== */
        .nav-buttons {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-2xl);
            flex-wrap: wrap;
        }
        
        .btn-nav {
            flex: 1;
            min-width: 140px;
            padding: var(--space-md) var(--space-lg);
            border: none;
            border-radius: var(--border-radius-xl);
            background: var(--bg-card);
            color: #fff;
            font-weight: 600;
            font-size: var(--text-md);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            cursor: pointer;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }
        
        .btn-nav:hover {
            transform: translateY(-3px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .btn-nav.active {
            background: var(--gradient-primary);
            border-color: transparent;
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        .btn-nav.btn-admin-icon {
            flex: 0.3;
            min-width: 60px;
        }
        
        /* ==================== الكروت ==================== */
        .card {
            padding: var(--space-xl);
            border-radius: var(--border-radius-2xl);
            margin-bottom: var(--space-xl);
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-3d);
            transition: var(--transition);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-neon), var(--shadow-3d);
        }
        
        .card-title {
            font-size: var(--text-xl);
            font-weight: 900;
            color: var(--neon-cyan);
            margin-bottom: var(--space-xl);
            text-align: center;
        }
        
        /* ==================== الحقول ==================== */
        .input-group {
            margin-bottom: var(--space-lg);
        }
        
        .input-group label {
            display: block;
            margin-bottom: var(--space-xs);
            font-size: var(--text-sm);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }
        
        .input-group label i {
            color: var(--neon-cyan);
            margin-left: var(--space-xs);
            width: 20px;
        }
        
        .neon-input {
            width: 100%;
            padding: var(--space-md) var(--space-lg);
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-xl);
            color: #fff;
            font-size: var(--text-sm);
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }
        
        .neon-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: translateY(-2px);
        }
        
        select.neon-input {
            cursor: pointer;
        }
        
        textarea.neon-input {
            resize: vertical;
            min-height: 100px;
        }
        
        .responsive-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }
        
        /* ==================== الزر الرئيسي ==================== */
        .btn-main {
            width: 100%;
            padding: var(--space-lg);
            border: none;
            border-radius: var(--border-radius-xl);
            background: var(--gradient-primary);
            color: #fff;
            font-weight: 800;
            font-size: var(--text-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
            transition: var(--transition);
        }
        
        .btn-main:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-neon);
        }
        
        /* ==================== شاشة تسجيل الدخول ==================== */
        .login-card {
            max-width: 450px;
            margin: 0 auto;
        }
        
        .login-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-lg);
            box-shadow: var(--shadow-neon);
        }
        
        .login-icon i {
            font-size: 40px;
            color: white;
        }
        
        .login-info {
            text-align: center;
            margin-top: var(--space-lg);
            color: rgba(255, 255, 255, 0.5);
            font-size: var(--text-xs);
        }
        
        /* ==================== المسار الزمني ==================== */
        .track-container {
            position: relative;
            width: 100%;
            height: 100px;
            margin: var(--space-2xl) 0;
        }
        
        .track-line-bg {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            transform: translateY(-50%);
        }
        
        .track-line-fill {
            position: absolute;
            top: 50%;
            right: 0;
            height: 6px;
            background: var(--gradient-primary);
            border-radius: 3px;
            transform: translateY(-50%);
            transition: width 1s ease;
            box-shadow: 0 0 20px var(--neon-cyan);
            z-index: 2;
        }
        
        .track-points {
            position: relative;
            display: flex;
            justify-content: space-between;
            height: 100px;
            z-index: 3;
        }
        
        .track-point {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .track-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-deep);
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
        }
        
        .track-dot.active {
            background: var(--gradient-primary);
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: scale(1.1);
        }
        
        .track-label {
            font-size: var(--text-xs);
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 8px;
            border-radius: 15px;
            max-width: 100px;
        }
        
        .timeline-card {
            background: rgba(255, 255, 255, 0.02);
            border-right: 3px solid var(--neon-cyan);
            padding: var(--space-md);
            border-radius: var(--border-radius-md);
            margin-bottom: var(--space-sm);
        }
        
        .timeline-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-xs);
        }
        
        .timeline-status {
            color: var(--neon-cyan);
            font-weight: 600;
        }
        
        .timeline-time {
            color: rgba(255, 255, 255, 0.5);
            font-size: var(--text-xs);
        }
        
        /* ==================== تحسينات الجوال ==================== */
        @media (max-width: 1024px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            .responsive-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .nav-buttons {
                flex-direction: column;
            }
            .splash-logo-wrapper {
                width: 150px;
                height: 150px;
            }
            .splash-title {
                font-size: var(--text-2xl);
            }
        }
    </style>
</head>
<body>
    <!-- جزيئات متطايرة -->
    <div class="particles" id="particles"></div>
    
    <!-- عناصر عائمة -->
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>
    
    <!-- ==================== شاشة البداية (مضبوطة في النص) ==================== -->
    <div class="splash-screen" id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo-wrapper">
                <img src="https://placehold.co/200x200/0a0f1f/00ffff/png?text=Logo" alt="شعار" class="splash-logo" id="splash-logo">
            </div>
            <h1 class="splash-title">نقابة تكنولوجيا المعلومات</h1>
            <p class="splash-subtitle">بوابة الشكاوي والمقترحات</p>
            <div class="splash-loader">
                <div class="loader-bar"></div>
            </div>
            <div class="splash-version">VR 2.05.2026</div>
        </div>
    </div>
    
    <!-- ==================== المحتوى الرئيسي ==================== -->
    <div class="main-wrapper" id="main-wrapper">
        <div class="main-content" id="main-content">
            
            <!-- الهيدر -->
            <header class="header-box glass-effect">
                <div class="header-content">
                    <div class="header-logo-container">
                        <img src="https://placehold.co/130x130/0a0f1f/00ffff/png?text=Logo" alt="شعار" class="header-main-logo" id="header-main-logo">
                    </div>
                    <div class="header-titles">
                        <span class="header-subtitle">نقابة تكنولوجيا المعلومات والبرمجيات</span>
                        <h1 class="header-title">بوابة الشكاوي والمقترحات</h1>
                        <span class="header-role">النقيب العام</span>
                        <h2 class="header-name">المهندس / محمود جميل</h2>
                    </div>
                    <div class="version-badge">
                        <i class="fas fa-crown"></i> VR 2.05.2026
                    </div>
                </div>
            </header>
            
            <!-- أزرار التنقل -->
            <nav class="nav-buttons">
                <button class="btn-nav active" onclick="switchView('submit')" id="btn-submit">
                    <i class="fas fa-plus-circle"></i> تقديم طلب
                </button>
                <button class="btn-nav" onclick="switchView('track')" id="btn-track">
                    <i class="fas fa-search"></i> استعلام
                </button>
                <button class="btn-nav btn-admin-icon" onclick="switchView('login')" id="btn-login">
                    <i class="fas fa-user-cog"></i>
                </button>
            </nav>
            
            <!-- شاشة تقديم الطلب -->
            <section id="view-submit" class="view">
                <div class="card">
                    <a href="#" id="services-link" class="services-banner" style="display: none; background: var(--gradient-warm); padding: 15px; border-radius: 30px; margin-bottom: 20px; text-align: center; color: white; text-decoration: none;">
                        <i class="fas fa-globe"></i> <span>موقع تقديم خدمات النقابة</span> <i class="fas fa-arrow-left"></i>
                    </a>
                    
                    <h2 class="card-title"><i class="fas fa-pen-alt"></i> نموذج تقديم طلب</h2>
                    
                    <div class="input-group">
                        <label><i class="fas fa-id-card"></i> نوع مقدم الطلب</label>
                        <select id="u-member-type" class="neon-input" onchange="toggleMemberField()">
                            <option value="عضو نقابة">عضو نقابة</option>
                            <option value="غير عضو">غير عضو</option>
                        </select>
                    </div>

                                <option value="سوهاج">سوهاج</option>
                                <option value="شمال سيناء">شمال سيناء</option>

                    <div class="input-group">

                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-briefcase"></i> المهنة</label>
                        <input type="text" id="u-job" placeholder="مثال: مهندس برمجيات" class="neon-input">

                    </button>

            <!-- شاشة الاستعلام -->
            <section id="view-track" class="view" style="display: none;">
                <div class="card">

                        <i class="fas fa-search" style="font-size: 50px; color: var(--neon-cyan);"></i>
                        <h2 class="card-title">استعلام عن طلب</h2>
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-id-card"></i> الرقم القومي</label>
                        <input type="text" id="q-nid" placeholder="الرقم القومي" class="neon-input" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-tag"></i> نوع الطلب</label>
                        <select id="q-type" class="neon-input">
                            <option value="شكوى">شكوى</option>
                            <option value="اقتراح">اقتراح</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-qrcode"></i> كود الطلب</label>
                        <input type="text" id="q-ref" placeholder="مثال: REQ-0001-2026" class="neon-input">
                    </div>
                    
                    <button class="btn-main" onclick="handleTrack()">
                        <i class="fas fa-search"></i> استعلام
                    </button>
                </div>
                
                <div id="track-result-box" style="display: none;"></div>
            </section>
            
            <!-- ==================== شاشة تسجيل الدخول (مصححة) ==================== -->
            <section id="view-login" class="view" style="display: none;">
                <div class="card login-card">
                    <div class="login-icon">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    
                    <h2 class="card-title">دخول المنظومة</h2>
                    
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> اسم المستخدم</label>
                        <input type="text" id="login-username" placeholder="اسم المستخدم" class="neon-input">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> كلمة المرور</label>
                        <input type="password" id="login-password" placeholder="كلمة المرور" class="neon-input">
                    </div>
                    
                    <button class="btn-main" onclick="handleLogin()">
                        <i class="fas fa-sign-in-alt"></i> دخول
                    </button>
                    
                    <div class="login-info">
                        <i class="fas fa-info-circle"></i> استخدم بيانات المستخدم المسجلة في النظام
                    </div>

    </div>
    
    <!-- كارت التصدير المخفي -->
    <div id="request-card-container" style="position: absolute; left: -9999px; top: 0; width: 600px;"></div>
    
    <!-- Firebase v9 compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        // =====================================================================
        // تهيئة Firebase
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC71PVDTouBkQ4hRTANelbwRo4AYI6LwnE",
            authDomain: "itwsreq.firebaseapp.com",
            projectId: "itwsreq",
            storageBucket: "itwsreq.firebasestorage.app",
            messagingSenderId: "417900842360",
            appId: "1:417900842360:web:83d9310f36fef5bbbe4c8d",
            measurementId: "G-P3YQFRSBMM"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // =====================================================================
        // إنشاء الجزيئات
        // =====================================================================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        // =====================================================================
        // شاشة البداية
        // =====================================================================
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-wrapper').classList.add('visible');
            }, 4000);
        });
        
        // =====================================================================
        // تبديل المشاهد
        // =====================================================================
        window.switchView = function(view) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + view).style.display = 'block';
            
            if (view === 'submit') document.getElementById('btn-submit').classList.add('active');
            else if (view === 'track') document.getElementById('btn-track').classList.add('active');
            else if (view === 'login') document.getElementById('btn-login').classList.add('active');
        };
        window.switchView('submit');
        
        // =====================================================================
        // حقل العضوية
        // =====================================================================
        window.toggleMemberField = function() {
            const type = document.getElementById('u-member-type').value;
            const box = document.getElementById('member-id-box');
            const typeSelect = document.getElementById('u-req-type');
            
            if (type === 'عضو نقابة') {
                box.style.display = 'block';
                typeSelect.innerHTML = '<option value="شكوى">شكوى</option><option value="اقتراح">اقتراح</option>';
            } else {
                box.style.display = 'none';
                typeSelect.innerHTML = '<option value="اقتراح">اقتراح فقط</option>';
            }
        };
        
        // =====================================================================
        // التحقق من البيانات
        // =====================================================================
        function validateNationalID(nid) {
            return /^\d{14}$/.test(nid);
        }
        
        function validatePhone(phone) {
            return /^01[0-2,5]{1}[0-9]{8}$/.test(phone);
        }
        
        // =====================================================================
        // تقديم الطلب
        // =====================================================================
        window.handleSubmit = async function() {
            const name = document.getElementById('u-name')?.value.trim();
            const nid = document.getElementById('u-nid')?.value.trim();
            const phone = document.getElementById('u-phone')?.value.trim();
            const gov = document.getElementById('u-gov')?.value;
            const address = document.getElementById('u-address')?.value.trim();
            const job = document.getElementById('u-job')?.value.trim();
            const type = document.getElementById('u-req-type')?.value;
            const details = document.getElementById('u-details')?.value.trim();
            const memberType = document.getElementById('u-member-type')?.value;
            const memberId = document.getElementById('u-member-id')?.value.trim() || "غير عضو";
            
            if (!name || !nid || !phone || !gov || !address || !job || !details) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'املأ جميع البيانات', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            if (!validateNationalID(nid)) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'الرقم القومي 14 رقم', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            if (!validatePhone(phone)) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'رقم الهاتف غير صحيح', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            try {
                Swal.fire({ title: 'جاري الحفظ', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const year = new Date().getFullYear();
                const prefix = type === 'شكوى' ? 'REQ' : 'REP';
                const refId = prefix + '-0001-' + year;
                
                const requestData = {
                    refId,
                    name, nid, phone, gov, address, job, type, details, memberType, memberId,
                    status: type === 'شكوى' ? 'تم الاستلام' : 'لم يقرأ',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    tracking: [{
                        status: type === 'شكوى' ? 'تم الاستلام' : 'لم يقرأ',
                        comment: type === 'شكوى' ? 'تم استلام شكواك' : 'تم استلام اقتراحك',
                        time: new Date().toLocaleString('ar-EG'),
                        isFinal: false
                    }]
                };
                
                await db.collection('Requests').doc(refId).set(requestData);
                Swal.close();
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم الحفظ',
                    text: refId,
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                
                // Clear form
                ['u-name','u-nid','u-phone','u-address','u-job','u-details','u-member-id'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = '';
                });
                
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
        
        // =====================================================================
        // الاستعلام
        // =====================================================================
        window.handleTrack = async function() {
            const nid = document.getElementById('q-nid')?.value.trim();
            const ref = document.getElementById('q-ref')?.value.trim();
            const type = document.getElementById('q-type')?.value;
            
            if (!nid || !ref || !type) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'أدخل جميع البيانات', background: '#030514', confirmButtonColor: '#00ffff' });
                return;
            }
            
            try {
                Swal.fire({ title: 'جاري البحث', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const snapshot = await db.collection('Requests')
                    .where('nid', '==', nid)
                    .where('refId', '==', ref)
                    .where('type', '==', type)
                    .get();
                
                Swal.close();
                
                if (snapshot.empty) {
                    Swal.fire({ icon: 'error', title: 'لا يوجد', text: 'لا يوجد طلب', background: '#030514', confirmButtonColor: '#00ffff' });
                    return;
                }
                
                const data = snapshot.docs[0].data();
                
                const stages = [...(data.tracking?.map(t => t.status) || []), "تم الإغلاق النهائي"];
                const currentIdx = stages.indexOf(data.status);
                const progress = stages.length > 0 ? (currentIdx / (stages.length - 1)) * 100 : 0;
                
                const timeline = data.tracking?.length ? data.tracking.slice().reverse().map(t => `
                    <div class="timeline-card">
                        <div class="timeline-header">
                            <span class="timeline-status">${t.status}</span>
                            <span class="timeline-time">${t.time}</span>
                        </div>
                        <p>${t.comment}</p>
                    </div>
                `).join('') : '<p style="text-align:center">لا يوجد مسار زمني</p>';
                
                const html = `
                    <div class="card" style="margin-top:20px;">
                        <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                            <div style="width:60px; height:60px; background:var(--gradient-primary); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                                <i class="fas fa-qrcode" style="font-size:30px; color:#fff;"></i>
                            </div>
                            <div>
                                <h3 style="color:var(--neon-cyan);">${data.refId}</h3>
                                <p>${data.name}</p>
                            </div>
                        </div>
                        
                        <div class="track-container">
                            <div class="track-line-bg"></div>
                            <div class="track-line-fill" style="width:${progress}%;"></div>
                            <div class="track-points">
                                ${stages.map((s, i) => `
                                    <div class="track-point">
                                        <div class="track-dot ${i <= currentIdx ? 'active' : ''}">
                                            ${i <= currentIdx ? '<i class="fas fa-check"></i>' : ''}
                                        </div>
                                        <span class="track-label">${s}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <h4 style="color:var(--neon-cyan); margin:15px 0 10px;">المسار الزمني</h4>
                        <div style="max-height:250px; overflow-y:auto;">${timeline}</div>
                    </div>
                `;
                
                document.getElementById('track-result-box').innerHTML = html;
                document.getElementById('track-result-box').style.display = 'block';
                
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, background: '#030514', confirmButtonColor: '#00ffff' });
            }
        };
        
        // =====================================================================
        // تسجيل الدخول - مصحح بالكامل
        // =====================================================================
        window.handleLogin = async function() {
            const username = document.getElementById('login-username')?.value.trim();
            const password = document.getElementById('login-password')?.value.trim();
            
            console.log('محاولة دخول:', username);
            
            if (!username || !password) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'خطأ', 
                    text: 'أدخل اسم المستخدم وكلمة المرور', 
                    background: '#030514', 
                    confirmButtonColor: '#00ffff' 
                });
                return;
            }
            
            try {
                Swal.fire({ 
                    title: 'جاري التحقق', 
                    allowOutsideClick: false, 
                    didOpen: () => Swal.showLoading(), 
                    background: '#030514' 
                });
                
                // البحث في مجموعة Users
                const usersRef = db.collection('Users');
                const snapshot = await usersRef.where('username', '==', username).get();
                
                console.log('نتيجة البحث:', snapshot.empty ? 'لا يوجد' : 'موجود');
                
                if (snapshot.empty) {
                    Swal.close();
                    Swal.fire({ 
                        icon: 'error', 
                        title: 'خطأ', 
                        text: 'اسم المستخدم غير موجود', 
                        background: '#030514', 
                        confirmButtonColor: '#00ffff' 
                    });
                    return;
                }
                
                const userDoc = snapshot.docs[0];
                const userData = userDoc.data();
                
                console.log('بيانات المستخدم:', { 
                    username: userData.username, 
                    role: userData.role,
                    isActive: userData.isActive 
                });
                
                // التحقق من حالة الحساب
                if (userData.isActive === false) {
                    Swal.close();
                    Swal.fire({ 
                        icon: 'error', 
                        title: 'حساب معطل', 
                        text: 'هذا الحساب غير نشط', 
                        background: '#030514', 
                        confirmButtonColor: '#00ffff' 
                    });
                    return;
                }
                
                // التحقق من كلمة المرور
                const hashedPassword = btoa(password);
                console.log('كلمة السر المدخلة (مشفرة):', hashedPassword);
                console.log('كلمة السر المخزنة:', userData.password);
                
                if (hashedPassword !== userData.password) {
                    Swal.close();
                    Swal.fire({ 
                        icon: 'error', 
                        title: 'خطأ', 
                        text: 'كلمة المرور غير صحيحة', 
                        background: '#030514', 
                        confirmButtonColor: '#00ffff' 
                    });
                    return;
                }
                
                // تسجيل الدخول ناجح
                const now = new Date();
                const lastLoginStr = now.toLocaleString('ar-EG');
                
                // تحديث آخر دخول
                await db.collection('Users').doc(userDoc.id).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLoginString: lastLoginStr
                });
                
                // تخزين في localStorage
                localStorage.setItem('currentUserId', userDoc.id);
                localStorage.setItem('currentUser', userData.username);
                localStorage.setItem('currentUserRole', userData.role);
                localStorage.setItem('currentUserLastLogin', lastLoginStr);
                
                Swal.close();
                
                Swal.fire({
                    icon: 'success',
                    title: 'مرحباً بك',
                    html: `<p style="color: #00ffff;">${userData.name || userData.username}</p><p>جاري التحويل...</p>`,
                    timer: 2000,
                    showConfirmButton: false,
                    background: '#030514'
                }).then(() => {
                    window.location.href = 'admin.html';
                });
                
            } catch (error) {
                console.error('خطأ في تسجيل الدخول:', error);
                Swal.close();
                Swal.fire({ 
                    icon: 'error', 
                    title: 'خطأ', 
                    text: error.message, 
                    background: '#030514', 
                    confirmButtonColor: '#00ffff' 
                });
            }
        };
    </script>
</body>
</html>
