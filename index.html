<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>بوابة الشكاوي - نقابة تكنولوجيا المعلومات والبرمجيات | VR 2.05.2026</title>
    
    <!-- الخطوط الأساسية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        /* =====================================================================
           التصميم الأساسي للصفحة الرئيسية - نسخة نهائية بدون Google
           جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات © 2026
           ===================================================================== */
        
        :root {
            --bg-deep: #030514;
            --bg-dark: #0a0f1f;
            --bg-medium: #111827;
            --bg-light: #1e293b;
            
            --bg-card: rgba(15, 23, 42, 0.4);
            --bg-card-hover: rgba(15, 23, 42, 0.6);
            --bg-sidebar: rgba(3, 5, 20, 0.7);
            --bg-input: rgba(3, 5, 20, 0.6);
            --bg-hover: rgba(0, 255, 255, 0.1);
            
            --neon-cyan: #00ffff;
            --neon-cyan-glow: rgba(0, 255, 255, 0.7);
            --neon-cyan-soft: rgba(0, 255, 255, 0.3);
            
            --neon-purple: #a855f7;
            --neon-purple-glow: rgba(168, 85, 247, 0.7);
            --neon-purple-soft: rgba(168, 85, 247, 0.3);
            
            --neon-pink: #ec4899;
            --neon-pink-glow: rgba(236, 72, 153, 0.7);
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.7);
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.7);
            --neon-orange: #f97316;
            --neon-orange-glow: rgba(249, 115, 22, 0.7);
            --neon-blue: #3b82f6;
            --neon-blue-glow: rgba(59, 130, 246, 0.7);
            
            --gradient-primary: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            --gradient-danger: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
            --gradient-success: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            
            --shadow-3d: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            --shadow-neon: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-purple);
            
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 40px;
            --space-3xl: 60px;
            
            --text-xs: 12px;
            --text-sm: 14px;
            --text-md: 16px;
            --text-lg: 18px;
            --text-xl: 20px;
            --text-2xl: 24px;
            --text-3xl: 30px;
            --text-4xl: 36px;
            --text-5xl: 48px;
            
            --border-color: rgba(255, 255, 255, 0.1);
            --border-radius-xl: 30px;
            --border-radius-2xl: 40px;
            --border-radius-3xl: 50px;
            --border-radius-full: 50%;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: #fff;
            direction: rtl;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, var(--neon-cyan-soft) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, var(--neon-purple-soft) 0%, transparent 50%);
            animation: cosmicWave 20s ease infinite;
            z-index: -2;
        }
        
        @keyframes cosmicWave {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        
        /* عناصر عائمة */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite alternate;
        }
        
        .floating-element:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: var(--neon-cyan);
        }
        
        .floating-element:nth-child(2) {
            width: 700px;
            height: 700px;
            bottom: -250px;
            left: -250px;
            background: var(--neon-purple);
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.1); }
        }
        
        /* جزيئات متطايرة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gradient-primary);
            border-radius: 50%;
            animation: particleFloat 20s linear infinite;
            opacity: 0.4;
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0.4; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* شاشة البداية */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #030514, #0a0f1f, #1a1f3a);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: splashFadeOut 1s ease 4s forwards;
        }
        
        @keyframes splashFadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        
        .splash-content {
            text-align: center;
            animation: splashFloat 4s ease infinite;
        }
        
        @keyframes splashFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .splash-logo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 50px var(--neon-cyan), 0 0 100px var(--neon-purple);
            margin-bottom: 25px;
            object-fit: cover;
        }
        
        .splash-title {
            font-size: var(--text-5xl);
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .splash-subtitle {
            font-size: var(--text-xl);
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
        }
        
        .splash-loader {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin: 20px auto;
            overflow: hidden;
            border-radius: 2px;
        }
        
        .loader-bar {
            width: 40%;
            height: 100%;
            background: var(--gradient-primary);
            animation: loaderMove 1.5s ease infinite;
        }
        
        @keyframes loaderMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        
        .splash-version {
            margin-top: 20px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* الحاوية الرئيسية */
        .main-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            padding: var(--space-lg);
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        .main-wrapper.visible {
            opacity: 1;
        }
        
        /* الهيدر */
        .header-box {
            margin-bottom: var(--space-2xl);
            padding: var(--space-2xl);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-3xl);
            box-shadow: var(--shadow-3d);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: var(--space-xl);
            flex-wrap: wrap;
        }
        
        .header-logo-container {
            position: relative;
        }
        
        .header-logo-container::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-cyan-glow), transparent 70%);
            animation: pulse 2s ease infinite;
            z-index: -1;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .header-main-logo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 40px var(--neon-cyan);
            object-fit: cover;
        }
        
        .header-titles {
            flex: 1;
        }
        
        .header-subtitle {
            display: block;
            color: rgba(255,255,255,0.8);
            font-size: var(--text-lg);
            margin-bottom: var(--space-xs);
        }
        
        .header-title {
            font-size: var(--text-4xl);
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: var(--space-xs);
            text-shadow: 0 0 30px var(--neon-cyan);
        }
        
        .header-role {
            display: block;
            color: rgba(255,255,255,0.9);
            font-size: var(--text-xl);
            margin-bottom: var(--space-xs);
        }
        
        .header-name {
            display: block;
            font-size: var(--text-2xl);
            color: #fff;
            text-shadow: 0 0 15px var(--neon-pink);
        }
        
        .version-badge {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 1px solid var(--neon-cyan);
            border-radius: 30px;
            padding: 10px 20px;
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            font-size: var(--text-md);
        }
        
        /* أزرار التنقل */
        .nav-buttons {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-2xl);
            flex-wrap: wrap;
        }
        
        .btn-nav {
            flex: 1;
            min-width: 150px;
            padding: var(--space-md) var(--space-lg);
            border: none;
            border-radius: var(--border-radius-xl);
            background: var(--bg-card);
            color: #fff;
            font-weight: 700;
            font-size: var(--text-md);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            cursor: pointer;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }
        
        .btn-nav:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: var(--shadow-neon);
        }
        
        .btn-nav.active {
            background: var(--gradient-primary);
            border-color: transparent;
            box-shadow: var(--shadow-neon);
        }
        
        .btn-nav.btn-admin-icon {
            flex: 0.3;
            min-width: 70px;
        }
        
        /* الكروت */
        .card {
            padding: var(--space-2xl);
            border-radius: var(--border-radius-2xl);
            margin-bottom: var(--space-xl);
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-3d);
        }
        
        .card-title {
            font-size: var(--text-2xl);
            font-weight: 900;
            color: var(--neon-cyan);
            margin-bottom: var(--space-xl);
            text-align: center;
            text-shadow: 0 0 20px var(--neon-cyan);
        }
        
        /* الحقول */
        .input-group {
            margin-bottom: var(--space-lg);
        }
        
        .input-group label {
            display: block;
            margin-bottom: var(--space-sm);
            font-size: var(--text-md);
            color: rgba(255,255,255,0.9);
            font-weight: 700;
        }
        
        .input-group label i {
            color: var(--neon-cyan);
            margin-left: var(--space-xs);
            width: 24px;
            text-align: center;
        }
        
        .neon-input {
            width: 100%;
            padding: var(--space-md) var(--space-lg);
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-xl);
            color: #fff;
            font-size: var(--text-md);
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }
        
        .neon-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px var(--neon-cyan);
            transform: translateY(-3px);
        }
        
        .neon-input:hover {
            border-color: var(--neon-purple);
        }
        
        select.neon-input {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2300ffff' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: left 15px center;
            padding-left: 40px;
        }
        
        textarea.neon-input {
            resize: vertical;
            min-height: 100px;
        }
        
        .responsive-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }
        
        /* الأزرار الرئيسية */
        .btn-main {
            width: 100%;
            padding: var(--space-lg);
            border: none;
            border-radius: var(--border-radius-xl);
            background: var(--gradient-primary);
            color: #fff;
            font-weight: 800;
            font-size: var(--text-lg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-md);
            margin-top: var(--space-lg);
            transition: var(--transition);
        }
        
        .btn-main:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-neon);
        }
        
        .btn-main i {
            font-size: var(--text-xl);
            transition: transform 0.5s;
        }
        
        .btn-main:hover i {
            transform: rotate(360deg);
        }
        
        /* خدمات */
        .services-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-md);
            padding: var(--space-md) var(--space-xl);
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            border-radius: var(--border-radius-xl);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            margin-bottom: var(--space-xl);
        }
        
        /* شاشة تسجيل الدخول */
        .login-card {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .login-icon {
            width: 100px;
            height: 100px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-xl);
            box-shadow: var(--shadow-neon);
        }
        
        .login-icon i {
            font-size: 50px;
            color: white;
        }
        
        .login-info {
            text-align: center;
            margin-top: var(--space-lg);
            color: var(--text-muted);
            font-size: var(--text-sm);
        }
        
        /* المسار الزمني */
        .track-container {
            position: relative;
            width: 100%;
            height: 120px;
            margin: var(--space-2xl) 0;
        }
        
        .track-line-bg {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            transform: translateY(-50%);
        }
        
        .track-line-fill {
            position: absolute;
            top: 50%;
            right: 0;
            height: 8px;
            background: var(--gradient-primary);
            border-radius: 4px;
            transform: translateY(-50%);
            transition: width 1.5s ease;
            box-shadow: var(--shadow-neon);
            z-index: 2;
        }
        
        .track-points {
            position: relative;
            display: flex;
            justify-content: space-between;
            height: 120px;
            z-index: 3;
        }
        
        .track-point {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .track-dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-deep);
            border: 3px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--space-xs);
        }
        
        .track-dot.active {
            background: var(--gradient-primary);
            box-shadow: var(--shadow-neon);
            transform: scale(1.2);
            border-color: #fff;
        }
        
        .track-dot i {
            color: #fff;
            font-size: 20px;
        }
        
        .track-label {
            font-size: var(--text-xs);
            color: #fff;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: var(--space-xs) var(--space-sm);
            border-radius: 20px;
            max-width: 120px;
        }
        
        /* كروت المسار الزمني */
        .timeline-card {
            background: rgba(255,255,255,0.02);
            border-right: 3px solid var(--neon-cyan);
            padding: var(--space-md);
            border-radius: var(--border-radius-md);
            margin-bottom: var(--space-sm);
        }
        
        .timeline-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-xs);
        }
        
        .timeline-status {
            color: var(--neon-cyan);
            font-weight: 600;
        }
        
        .timeline-time {
            color: var(--text-muted);
            font-size: var(--text-xs);
        }
        
        .timeline-comment {
            color: var(--text-secondary);
            font-size: var(--text-xs);
            padding-right: var(--space-md);
            border-right: 1px dashed var(--border-color);
        }
        
        /* كارت التصدير */
        #request-card-container {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 650px;
        }
        
        /* تحسينات الجوال */
        @media (max-width: 1024px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            .responsive-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .header-main-logo {
                width: 140px;
                height: 140px;
            }
            .header-title {
                font-size: var(--text-3xl);
            }
            .nav-buttons {
                flex-direction: column;
            }
            .splash-logo {
                width: 150px;
                height: 150px;
            }
        }
        
        @media (max-width: 480px) {
            .header-main-logo {
                width: 120px;
                height: 120px;
            }
            .splash-logo {
                width: 130px;
                height: 130px;
            }
        }
        
        /* منع الطباعة */
        @media print {
            * { display: none !important; }
            body::before {
                content: "لا يمكن طباعة هذه الصفحة";
                display: flex;
                align-items: center;
                justify-content: center;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: var(--bg-deep);
                color: var(--neon-red);
                font-size: 36px;
                z-index: 999999;
            }
        }
    </style>
</head>
<body>
    <!-- جزيئات -->
    <div class="particles" id="particles"></div>
    
    <!-- عناصر عائمة -->
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>
    
    <!-- شاشة البداية -->
    <div class="splash-screen" id="splash-screen">
        <div class="splash-content">
            <img src="https://placehold.co/200x200/0a0f1f/00ffff/png?text=Logo" alt="شعار" class="splash-logo" id="splash-logo">
            <h1 class="splash-title">نقابة تكنولوجيا المعلومات</h1>

    <script>

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED });
        
        // =====================================================================
        // المتغيرات العامة
        // =====================================================================
        const STORAGE_KEYS = {
            LOGO_URL: 'union_logo_url',
            SERVICES_URL: 'services_url',
            SERVICES_TEXT: 'services_text',
            SHOW_SERVICES: 'show_services',
            COMPLAINT_PREFIX: 'complaint_prefix',

        const DEFAULT_SETTINGS = {
            LOGO_URL: 'https://placehold.co/200x200/0a0f1f/00ffff/png?text=Logo',
            SERVICES_URL: 'https://services.egeng.org',
            SERVICES_TEXT: 'موقع تقديم خدمات النقابة',

            SUGGESTION_PREFIX: 'REP'

        // =====================================================================
        // إنشاء الجزيئات
        // =====================================================================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {

                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';

        // =====================================================================

        window.addEventListener('load', function() {
            createParticles();

                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-wrapper').classList.add('visible');

            // تحميل الإعدادات

        function skipSplash() {

        // =====================================================================
        // الإعدادات
        // =====================================================================
        function getSetting(key, defaultValue) {
            return localStorage.getItem(key) || defaultValue;
        }
        
        function getSavedLogo() {
            return getSetting(STORAGE_KEYS.LOGO_URL, DEFAULT_SETTINGS.LOGO_URL);
        }
        
        function loadSettings() {
            updateServicesButton();
        }
        
        function updateServicesButton() {
            const btn = document.getElementById('services-link');
            if (!btn) return;
            
            const show = localStorage.getItem(STORAGE_KEYS.SHOW_SERVICES) !== 'false';
            const url = getSetting(STORAGE_KEYS.SERVICES_URL, DEFAULT_SETTINGS.SERVICES_URL);
            const text = getSetting(STORAGE_KEYS.SERVICES_TEXT, DEFAULT_SETTINGS.SERVICES_TEXT);
            
            if (show && url) {
                btn.style.display = 'flex';
                btn.href = url;
                btn.querySelector('span').textContent = text;
            } else {
                btn.style.display = 'none';
            }
        }
        
        function updateAllLogos() {
            const logo = getSavedLogo();
            const splashLogo = document.getElementById('splash-logo');
            const headerLogo = document.getElementById('header-main-logo');
            
            if (splashLogo) splashLogo.src = logo;
            if (headerLogo) headerLogo.src = logo;
        }
        
        // =====================================================================
        // التبديل بين المشاهد
        // =====================================================================
        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            
            document.getElementById('view-' + view).style.display = 'block';
            
            if (view === 'submit') document.getElementById('btn-submit').classList.add('active');
            else if (view === 'track') document.getElementById('btn-track').classList.add('active');
            else if (view === 'login') document.getElementById('btn-login').classList.add('active');
        }
        
        // =====================================================================
        // حقل العضوية
        // =====================================================================
        function toggleMemberField() {
            const type = document.getElementById('u-member-type').value;
            const box = document.getElementById('member-id-box');
            const typeSelect = document.getElementById('u-req-type');
            
            if (type === 'عضو نقابة') {
                box.style.display = 'block';
                typeSelect.innerHTML = '<option value="شكوى">شكوى</option><option value="اقتراح">اقتراح</option>';
            } else {
                box.style.display = 'none';
                typeSelect.innerHTML = '<option value="اقتراح">اقتراح فقط</option>';
            }
        }
        
        // =====================================================================
        // التحقق من البيانات
        // =====================================================================
        function validateNationalID(nid) {
            return /^\d{14}$/.test(nid);
        }
        
        function validatePhone(phone) {
            return /^01[0-2,5]{1}[0-9]{8}$/.test(phone);
        }
        
        // =====================================================================
        // إنشاء رقم الطلب
        // =====================================================================
        async function generateRequestNumber(type) {
            const year = new Date().getFullYear();
            const prefix = type === 'شكوى' ? 
                getSetting(STORAGE_KEYS.COMPLAINT_PREFIX, 'REQ') : 
                getSetting(STORAGE_KEYS.SUGGESTION_PREFIX, 'REP');
            
            try {
                const snapshot = await db.collection("Requests")
                    .where("type", "==", type)
                    .get();
                
                let maxSerial = 0;
                snapshot.forEach(doc => {
                    const ref = doc.data().refId;
                    if (ref) {
                        const serial = parseInt(ref.split('-')[1]);
                        if (!isNaN(serial) && serial > maxSerial) maxSerial = serial;
                    }
                });
                
                return `${prefix}-${(maxSerial + 1).toString().padStart(4,'0')}-${year}`;
            } catch (e) {
                return `${prefix}-${Date.now().toString().slice(-6)}-${year}`;
            }
        }
        
        // =====================================================================
        // تقديم الطلب
        // =====================================================================
        function validateSubmitForm() {
            const name = document.getElementById('u-name')?.value.trim();
            const nid = document.getElementById('u-nid')?.value.trim();
            const phone = document.getElementById('u-phone')?.value.trim();
            const gov = document.getElementById('u-gov')?.value;
            const address = document.getElementById('u-address')?.value.trim();
            const job = document.getElementById('u-job')?.value.trim();
            const type = document.getElementById('u-req-type')?.value;
            const details = document.getElementById('u-details')?.value.trim();
            const memberType = document.getElementById('u-member-type')?.value;
            const memberId = document.getElementById('u-member-id')?.value.trim() || "غير عضو";
            
            if (!name || !nid || !phone || !gov || !address || !job || !details) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'املأ جميع البيانات', background: '#030514' });
                return null;
            }
            
            if (name.split(' ').length < 2) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'الاسم ثلاثي على الأقل', background: '#030514' });
                return null;
            }
            
            if (!validateNationalID(nid)) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'الرقم القومي 14 رقم', background: '#030514' });
                return null;
            }
            
            if (!validatePhone(phone)) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'رقم الهاتف غير صحيح', background: '#030514' });
                return null;
            }
            
            if (memberType === 'عضو نقابة' && !memberId) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'أدخل رقم العضوية', background: '#030514' });
                return null;
            }
            
            return { name, nid, phone, gov, address, job, type, details, memberType, memberId };
        }
        
        async function generateRequestCard(data) {
            const logo = getSavedLogo();
            const date = new Date().toLocaleDateString('ar-EG');
            const time = new Date().toLocaleTimeString('ar-EG');
            
            const container = document.getElementById('request-card-container');

            const card = document.createElement('div');
            card.style.cssText = `

                border-radius: 40px;
                border: 5px solid #00ffff;
                font-family: 'Tajawal', 'Cairo', sans-serif;
                color: white;
                text-align: center;
                direction: rtl;
                box-shadow: 0 30px 50px rgba(0,255,255,0.5);
                position: relative;
                overflow: hidden;
            `;
            
            // خلفية متحركة
            const glow = document.createElement('div');
            glow.style.cssText = `
                position: absolute;
                top: -50%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: radial-gradient(circle, rgba(0,255,255,0.2), transparent 70%);
                animation: rotate 15s linear infinite;

            `;

            // حركة الدوران

            card.appendChild(style);
            
            // الشعار
            const logoImg = document.createElement('img');
            logoImg.src = logo;
            logoImg.style.cssText = `

                height: 130px;
                border-radius: 50%;
                border: 4px solid #00ffff;
                margin: 0 auto 20px;
                display: block;
                box-shadow: 0 0 40px #00ffff;
                position: relative;
                z-index: 2;
                object-fit: cover;
            `;
            
            const typeColor = data.type === 'شكوى' ? '#ef4444' : '#10b981';
            
            const content = document.createElement('div');
            content.style.cssText = 'position: relative; z-index: 2;';
            content.innerHTML = `
                <h2 style="font-size: 28px; background: linear-gradient(135deg, #00ffff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0;">نقابة تكنولوجيا المعلومات والبرمجيات</h2>

                        <span style="color: rgba(255,255,255,0.6); font-weight: 600;">رقم الطلب :</span>
                        <span style="color: #00ffff; font-weight: 700;">${data.refId}</span>
                    </div>
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <span style="color: rgba(255,255,255,0.6); font-weight: 600;">نوع الطلب :</span>
                        <span style="color: ${typeColor}; font-weight: 700;">${data.type}</span>
                    </div>
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <span style="color: rgba(255,255,255,0.6); font-weight: 600;">اسم مقدم الطلب :</span>
                        <span style="font-weight: 600;">${data.name}</span>
                    </div>
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 0;">
                        <span style="color: rgba(255,255,255,0.6); font-weight: 600;">تاريخ التقديم :</span>
                        <span style="font-weight: 600;">${date} - ${time}</span>
                    </div>
                </div>
                
                <div style="color: rgba(255,255,255,0.4); font-size: 14px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 15px;">
                    هذا الكارت معتمد من نقابة تكنولوجيا المعلومات والبرمجيات
                </div>
                <div style="color: #00ffff; font-size: 12px; margin-top: 10px;">VR 2.05.2026</div>
            `;
            
            card.appendChild(logoImg);
            card.appendChild(content);
            container.appendChild(card);
            
            try {
                let dataUrl;
                if (typeof domtoimage !== 'undefined') {
                    dataUrl = await domtoimage.toPng(card, { quality: 1, bgcolor: '#030514' });
                } else if (typeof html2canvas !== 'undefined') {
                    const canvas = await html2canvas(card, { scale: 2, backgroundColor: '#030514' });
                    dataUrl = canvas.toDataURL('image/png');
                }
                
                if (dataUrl) {
                    const result = await Swal.fire({
                        title: '✅ تم الحفظ',
                        html: `<div style="color: #00ffff; font-size: 28px;">${data.refId}</div>`,
                        imageUrl: dataUrl,
                        imageWidth: 500,
                        showCancelButton: true,
                        confirmButtonText: '📥 تحميل',
                        cancelButtonText: '🔒 إغلاق',
                        background: '#030514',
                        confirmButtonColor: '#00ffff'
                    });
                    
                    if (result.isConfirmed) {
                        const link = document.createElement('a');
                        link.download = `طلب_${data.refId}.png`;
                        link.href = dataUrl;
                        link.click();
                    }
                }
            } catch (e) {
                Swal.fire({ icon: 'success', title: 'تم', text: data.refId, background: '#030514' });
            }
            
            setTimeout(() => container.innerHTML = '', 1000);
        }
        
        function clearForm() {
            ['u-name','u-nid','u-phone','u-address','u-job','u-details','u-member-id'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            document.getElementById('u-member-type').value = 'عضو نقابة';
            document.getElementById('u-gov').value = 'القاهرة';
            document.getElementById('u-req-type').innerHTML = '<option value="شكوى">شكوى</option><option value="اقتراح">اقتراح</option>';
            document.getElementById('member-id-box').style.display = 'block';
        }
        
        async function handleSubmit() {
            const data = validateSubmitForm();
            if (!data) return;
            
            try {
                Swal.fire({ title: 'جاري الحفظ', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const refId = await generateRequestNumber(data.type);
                const initialStatus = data.type === 'شكوى' ? "تم الاستلام" : "لم يقرأ";
                
                const request = {
                    refId, ...data,
                    status: initialStatus,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    tracking: [{
                        status: initialStatus,
                        comment: data.type === 'شكوى' ? "تم استلام شكواك" : "تم استلام اقتراحك",
                        time: new Date().toLocaleString('ar-EG'),
                        isFinal: false
                    }]
                };
                
                await db.collection("Requests").doc(refId).set(request);
                Swal.close();
                await generateRequestCard(request);
                clearForm();
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: e.message, background: '#030514' });
            }
        }
        
        // =====================================================================
        // الاستعلام
        // =====================================================================
        async function handleTrack() {
            const nid = document.getElementById('q-nid')?.value.trim();
            const ref = document.getElementById('q-ref')?.value.trim();
            const type = document.getElementById('q-type')?.value;
            
            if (!nid || !ref || !type) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'أدخل جميع البيانات', background: '#030514' });
                return;
            }
            
            try {
                Swal.fire({ title: 'جاري البحث', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                const snap = await db.collection("Requests")
                    .where("nid", "==", nid)
                    .where("refId", "==", ref)
                    .where("type", "==", type)
                    .get();
                
                Swal.close();
                
                if (snap.empty) {
                    Swal.fire({ icon: 'error', title: 'لا يوجد', text: 'لا يوجد طلب', background: '#030514' });
                    return;
                }
                
                const data = snap.docs[0].data();
                if (data.createdAt?.toDate) data.createdAtDate = data.createdAt.toDate();
                renderTrack(data);
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: e.message, background: '#030514' });
            }
        }
        
        function renderTrack(data) {
            const stages = [...(data.tracking?.map(t => t.status) || []), "تم الإغلاق النهائي"];
            const currentIdx = stages.indexOf(data.status);
            const progress = stages.length > 0 ? (currentIdx / (stages.length - 1)) * 100 : 0;
            const date = data.createdAtDate?.toLocaleDateString('ar-EG') || 'غير محدد';
            
            const timeline = data.tracking?.length ? data.tracking.slice().reverse().map(t => `
                <div class="timeline-card">
                    <div class="timeline-header">
                        <span class="timeline-status">${t.status}</span>
                        <span class="timeline-time">${t.time}</span>
                    </div>
                    <div class="timeline-comment">${t.comment}</div>
                </div>
            `).join('') : '<p style="text-align:center">لا يوجد مسار زمني</p>';
            
            const html = `
                <div class="card" style="margin-top:20px;">
                    <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px;">
                        <div style="width:70px; height:70px; background:var(--gradient-primary); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                            <i class="fas fa-qrcode" style="font-size:35px; color:#fff;"></i>
                        </div>
                        <div>
                            <h3 style="color:var(--neon-cyan); font-size:24px;">${data.refId}</h3>
                            <p>${data.name}</p>
                        </div>
                    </div>
                    
                    <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:15px; margin-bottom:20px;">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <div><span style="color:var(--text-muted);">النوع:</span> ${data.type}</div>
                            <div><span style="color:var(--text-muted);">الحالة:</span> ${data.status}</div>
                            <div><span style="color:var(--text-muted);">التاريخ:</span> ${date}</div>
                            <div><span style="color:var(--text-muted);">المحافظة:</span> ${data.gov}</div>
                        </div>
                    </div>
                    
                    <div class="track-container">
                        <div class="track-line-bg"></div>
                        <div class="track-line-fill" style="width:${progress}%;"></div>
                        <div class="track-points">
                            ${stages.map((s, i) => `
                                <div class="track-point">
                                    <div class="track-dot ${i <= currentIdx ? 'active' : ''}">
                                        ${i <= currentIdx ? '<i class="fas fa-check"></i>' : ''}
                                    </div>
                                    <span class="track-label">${s}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <h4 style="color:var(--neon-cyan); margin-bottom:10px;">المسار الزمني</h4>
                    <div style="max-height:300px; overflow-y:auto;">${timeline}</div>
                </div>
            `;
            
            document.getElementById('track-result-box').innerHTML = html;
            document.getElementById('track-result-box').style.display = 'block';
        }
        
        // =====================================================================
        // تسجيل الدخول
        // =====================================================================
        async function handleLogin() {
            const username = document.getElementById('login-username')?.value.trim();
            const password = document.getElementById('login-password')?.value.trim();
            
            if (!username || !password) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'أدخل اسم المستخدم وكلمة المرور', background: '#030514' });
                return;
            }
            
            try {
                Swal.fire({ title: 'جاري التحقق', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
                
                // البحث عن المستخدم في Firestore
                const usersRef = db.collection('Users');
                const snapshot = await usersRef.where('username', '==', username).get();
                
                if (snapshot.empty) {
                    Swal.close();
                    Swal.fire({ icon: 'error', title: 'خطأ', text: 'اسم المستخدم غير موجود', background: '#030514' });
                    return;
                }
                
                const userDoc = snapshot.docs[0];
                const userData = userDoc.data();
                
                // التحقق من حالة الحساب
                if (userData.isActive === false) {
                    Swal.close();
                    Swal.fire({ icon: 'error', title: 'حساب معطل', text: 'الحساب غير نشط', background: '#030514' });
                    return;
                }
                
                // التحقق من كلمة المرور (تشفير بسيط)
                const hashedPassword = btoa(password);
                if (hashedPassword !== userData.password) {
                    Swal.close();
                    Swal.fire({ icon: 'error', title: 'خطأ', text: 'كلمة المرور غير صحيحة', background: '#030514' });
                    return;
                }
                
                // تسجيل الدخول ناجح
                const now = new Date();
                const lastLoginStr = now.toLocaleString('ar-EG');
                
                // تحديث آخر دخول
                await db.collection("Users").doc(userDoc.id).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLoginString: lastLoginStr
                });
                
                // تخزين في localStorage
                localStorage.setItem('currentUserId', userDoc.id);
                localStorage.setItem('currentUser', userData.username);
                localStorage.setItem('currentUserRole', userData.role);
                localStorage.setItem('currentUserLastLogin', lastLoginStr);
                
                Swal.close();
                
                Swal.fire({
                    icon: 'success',
                    title: 'مرحباً',
                    html: `<p>${userData.name || userData.username}</p><p>جاري التحويل...</p>`,
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#030514'
                }).then(() => {
                    window.location.href = 'admin.html';
                });
                
            } catch (error) {
                Swal.close();
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message, background: '#030514' });
            }
        }
    </script>
</body>
</html>
