                    const createdDate = user.createdAt?.toDate ? user.createdAt.toDate().toLocaleDateString('ar-EG') : 'غير محدد';
                    const isCurrentUser = user.id === currentUser?.id;
                    tableHTML += `<tr style="${isCurrentUser ? 'background: rgba(0, 255, 255, 0.1);' : ''}"><td>${index + 1}</td><td><strong>${user.username}</strong> ${isCurrentUser ? '<span style="color: var(--neon-cyan);">(أنت)</span>' : ''}</td><td>${user.name || '-'}</td><td>${user.email || '-'}</td><td>${user.phone || '-'}</td><td><span class="role-badge ${user.role || 'data_entry'}">${getRoleName(user.role)}</span></td><td><span style="color: ${user.isActive ? '#10b981' : '#ef4444'};">${user.isActive ? 'نشط' : 'غير نشط'}</span></td><td>${user.lastLoginDisplay}</td><td>${createdDate}</td>${isSuperAdmin ? `<td><button class="action-btn" onclick="editUser('${user.id}')" title="تعديل"><i class="fas fa-edit"></i></button><button class="action-btn" onclick="changeUserPassword('${user.id}')" title="تغيير كلمة السر"><i class="fas fa-key"></i></button>${user.id !== currentUser?.id ? `<button class="action-btn delete" onclick="openDeleteModal('user', '${user.id}')" title="حذف"><i class="fas fa-trash"></i></button>` : ''}</td>` : ''}</tr>`;
                });
            }
            tableHTML += `</tbody></table></div></div>`;
            document.getElementById('contentArea').innerHTML = tableHTML;
        }
        
        function showAddUserModal() {
            if (!isSuperAdmin) { Swal.fire({ icon: 'error', title: 'غير مصرح', text: 'أنت لا تملك صلاحية إضافة مستخدمين', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            document.getElementById('addUserModalContent').innerHTML = `
                <div style="padding: 10px;"><h3 style="color: var(--neon-cyan); margin-bottom: 20px; text-align: center;"><i class="fas fa-user-plus"></i> إضافة مستخدم جديد</h3>
                <div style="margin-bottom: 15px;"><label style="color: var(--text-muted);">اسم المستخدم</label><input type="text" id="newUsername" placeholder="اسم المستخدم" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="margin-bottom: 15px;"><label style="color: var(--text-muted);">كلمة السر</label><input type="password" id="newPassword" placeholder="كلمة السر" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="margin-bottom: 15px;"><label style="color: var(--text-muted);">الاسم الكامل</label><input type="text" id="newName" placeholder="الاسم الكامل" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="margin-bottom: 15px;"><label style="color: var(--text-muted);">البريد الإلكتروني</label><input type="email" id="newEmail" placeholder="البريد الإلكتروني" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="margin-bottom: 15px;"><label style="color: var(--text-muted);">رقم الهاتف</label><input type="text" id="newPhone" placeholder="رقم الهاتف" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="margin-bottom: 15px;"><label style="color: var(--text-muted);">الدور</label><select id="newRole" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"><option value="admin">أدمن</option><option value="reviewer">مراجع</option><option value="data_entry" selected>مدخل بيانات</option></select></div>
                <div style="margin-bottom: 15px;"><label style="display: flex; align-items: center; gap: 10px;"><input type="checkbox" id="newIsActive" checked style="width: 18px; height: 18px;"><span>حساب نشط</span></label></div>
                <div style="display: flex; gap: 10px; margin-top: 20px;"><button class="btn btn-success" onclick="addUser()" style="flex: 2;"><i class="fas fa-save"></i> إضافة المستخدم</button><button class="btn btn-secondary" onclick="closeModal('addUserModal')" style="flex: 1;"><i class="fas fa-times"></i> إلغاء</button></div></div>`;
            document.getElementById('addUserModal').classList.add('show');
        }
        
        function hashPassword(password) { return btoa(password); }
        
        async function addUser() {
            if (!isSuperAdmin) return;
            const username = document.getElementById('newUsername')?.value.trim();
            const password = document.getElementById('newPassword')?.value.trim();
            const name = document.getElementById('newName')?.value.trim();
            const email = document.getElementById('newEmail')?.value.trim();
            const phone = document.getElementById('newPhone')?.value.trim();
            const role = document.getElementById('newRole')?.value;
            const isActive = document.getElementById('newIsActive')?.checked;
            if (!username || !password) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'اسم المستخدم وكلمة السر مطلوبان', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            const existingUser = allUsers.find(u => u.username === username);
            if (existingUser) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'اسم المستخدم موجود بالفعل', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            try {
                const hashedPassword = hashPassword(password);
                const userRef = await db.collection("Users").add({ username, password: hashedPassword, name: name || '', email: email || '', phone: phone || '', role: role || 'data_entry', isActive: isActive !== undefined ? isActive : true, createdAt: firebase.firestore.FieldValue.serverTimestamp(), lastLogin: null, lastLoginString: null, createdBy: currentUser?.username || 'system' });
                await logUserActivity('add_user', { userId: userRef.id, username, role });
                Swal.fire({ icon: 'success', title: 'تم', text: 'تم إضافة المستخدم بنجاح', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' });
                closeModal('addUserModal');
            } catch (error) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ في إضافة المستخدم', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); }
        }
        
        function editUser(userId) {
            if (!isSuperAdmin) { Swal.fire({ icon: 'error', title: 'غير مصرح', text: 'أنت لا تملك صلاحية تعديل المستخدمين', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            document.getElementById('editUserModalContent').innerHTML = `
                <div style="padding: 10px;"><h3 style="color: var(--neon-cyan); margin-bottom: 20px; text-align: center;"><i class="fas fa-user-edit"></i> تعديل المستخدم</h3>
                <div style="margin-bottom: 15px;"><label>اسم المستخدم</label><input type="text" id="editUsername" value="${user.username}" readonly style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white; opacity: 0.7;"></div>
                <div style="margin-bottom: 15px;"><label>الاسم الكامل</label><input type="text" id="editName" value="${user.name || ''}" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="margin-bottom: 15px;"><label>البريد الإلكتروني</label><input type="email" id="editEmail" value="${user.email || ''}" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="margin-bottom: 15px;"><label>رقم الهاتف</label><input type="text" id="editPhone" value="${user.phone || ''}" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="margin-bottom: 15px;"><label>الدور</label><select id="editRole" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"><option value="super_admin" ${user.role === 'super_admin' ? 'selected' : ''}>سوبر أدمن</option><option value="admin" ${user.role === 'admin' ? 'selected' : ''}>أدمن</option><option value="reviewer" ${user.role === 'reviewer' ? 'selected' : ''}>مراجع</option><option value="data_entry" ${user.role === 'data_entry' ? 'selected' : ''}>مدخل بيانات</option></select></div>
                <div style="margin-bottom: 15px;"><label style="display: flex; align-items: center; gap: 10px;"><input type="checkbox" id="editIsActive" ${user.isActive ? 'checked' : ''}><span>حساب نشط</span></label></div>
                <div style="display: flex; gap: 10px; margin-top: 20px;"><button class="btn btn-primary" onclick="updateUser('${user.id}')" style="flex: 2;"><i class="fas fa-save"></i> حفظ التعديلات</button><button class="btn btn-secondary" onclick="closeModal('editUserModal')" style="flex: 1;"><i class="fas fa-times"></i> إلغاء</button></div></div>`;
            document.getElementById('editUserModal').classList.add('show');
        }
        
        async function updateUser(userId) {
            if (!isSuperAdmin) return;
            const name = document.getElementById('editName')?.value.trim();
            const email = document.getElementById('editEmail')?.value.trim();
            const phone = document.getElementById('editPhone')?.value.trim();
            const role = document.getElementById('editRole')?.value;
            const isActive = document.getElementById('editIsActive')?.checked;
            try {
                await db.collection("Users").doc(userId).update({ name: name || '', email: email || '', phone: phone || '', role: role || 'data_entry', isActive: isActive !== undefined ? isActive : true });
                await logUserActivity('update_user', { userId, updates: { name, email, phone, role, isActive } });
                Swal.fire({ icon: 'success', title: 'تم', text: 'تم تحديث بيانات المستخدم بنجاح', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' });
                closeModal('editUserModal');
            } catch (error) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ في تحديث البيانات', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); }
        }
        
        function changeUserPassword(userId) {
            if (!isSuperAdmin) { Swal.fire({ icon: 'error', title: 'غير مصرح', text: 'أنت لا تملك صلاحية تغيير كلمات السر', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            document.getElementById('changePasswordModalContent').innerHTML = `
                <div style="padding: 10px;"><h3 style="color: var(--neon-cyan); margin-bottom: 20px;"><i class="fas fa-key"></i> تغيير كلمة السر</h3>
                <p style="text-align: center; margin-bottom: 20px;">المستخدم: <strong style="color: var(--neon-cyan);">${user.username}</strong></p>
                <div style="margin-bottom: 15px;"><label>كلمة السر الجديدة</label><input type="password" id="newUserPassword" placeholder="كلمة السر الجديدة" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="margin-bottom: 15px;"><label>تأكيد كلمة السر</label><input type="password" id="confirmUserPassword" placeholder="تأكيد كلمة السر" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;"></div>
                <div style="display: flex; gap: 10px; margin-top: 20px;"><button class="btn btn-primary" onclick="updateUserPassword('${user.id}')" style="flex: 2;"><i class="fas fa-save"></i> تغيير كلمة السر</button><button class="btn btn-secondary" onclick="closeModal('changePasswordModal')" style="flex: 1;"><i class="fas fa-times"></i> إلغاء</button></div></div>`;
            document.getElementById('changePasswordModal').classList.add('show');
        }
        
        async function updateUserPassword(userId) {
            if (!isSuperAdmin) return;
            const newPassword = document.getElementById('newUserPassword')?.value.trim();
            const confirmPassword = document.getElementById('confirmUserPassword')?.value.trim();
            if (!newPassword) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'كلمة السر مطلوبة', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            if (newPassword !== confirmPassword) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'كلمة السر غير متطابقة', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            try {
                const hashedPassword = hashPassword(newPassword);
                await db.collection("Users").doc(userId).update({ password: hashedPassword });
                await logUserActivity('change_password', { userId });
                Swal.fire({ icon: 'success', title: 'تم', text: 'تم تغيير كلمة السر بنجاح', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' });
                closeModal('changePasswordModal');
            } catch (error) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ في تغيير كلمة السر', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); }
        }
        
        let currentDeleteId = null;
        function openDeleteModal(type, id) {
            if (!isSuperAdmin) { Swal.fire({ icon: 'error', title: 'غير مصرح', text: 'أنت لا تملك صلاحية الحذف', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            currentDeleteId = id;
            const content = `<div style="text-align: center; padding: 20px;"><i class="fas fa-trash-alt" style="font-size: 50px; color: var(--neon-red); margin-bottom: 20px;"></i><h3 style="color: var(--neon-red); margin-bottom: 20px;">حذف ${type === 'request' ? 'الطلب' : 'المستخدم'}</h3><p style="color: var(--text-muted); margin-bottom: 20px;">هل أنت متأكد من الحذف؟</p><input type="password" id="deletePassword" placeholder="كلمة سر الحذف" style="width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.5); border: 2px solid var(--neon-red); border-radius: 10px; color: white;"><div style="display: flex; gap: 10px;"><button class="btn btn-danger" onclick="confirmDelete('${type}')" style="flex: 2;"><i class="fas fa-check"></i> تأكيد الحذف</button><button class="btn btn-secondary" onclick="closeModal('deleteModal')" style="flex: 1;"><i class="fas fa-times"></i> إلغاء</button></div></div>`;
            document.getElementById('deleteModalContent').innerHTML = content;
            document.getElementById('deleteModal').classList.add('show');
        }
        
        async function confirmDelete(type) {
            if (!isSuperAdmin) return;
            const password = document.getElementById('deletePassword')?.value;
            if (password !== '11111@') { Swal.fire({ icon: 'error', title: 'خطأ', text: 'كلمة السر غير صحيحة', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            try {
                if (type === 'request') { await db.collection("Requests").doc(currentDeleteId).delete(); await logUserActivity('delete_request', { requestId: currentDeleteId }); }
                else { await db.collection("Users").doc(currentDeleteId).delete(); await logUserActivity('delete_user', { userId: currentDeleteId }); }
                Swal.fire({ icon: 'success', title: 'تم الحذف', text: `تم حذف ${type === 'request' ? 'الطلب' : 'المستخدم'} بنجاح`, background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' });
                closeModal('deleteModal');
                if (type === 'request') closeModal('requestModal');
            } catch (error) { Swal.fire({ icon: 'error', title: 'خطأ', text: `حدث خطأ في حذف ${type === 'request' ? 'الطلب' : 'المستخدم'}`, background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); }
        }
        
        // =====================================================================
        // تغيير العرض
        // =====================================================================
        function changeView(view) {
            currentView = view;
            setActiveNav(view);
            if (view === 'dashboard') loadDashboard();
            else if (view === 'users') { if (isSuperAdmin) loadUsers(); else { currentView = 'dashboard'; setActiveNav('dashboard'); loadDashboard(); } }
            else if (view === 'visitors') { if (isSuperAdmin) loadVisitorsStats(); else { currentView = 'dashboard'; setActiveNav('dashboard'); loadDashboard(); } }
            else if (view === 'activity') { if (isSuperAdmin) loadActivityDashboard(); else { currentView = 'dashboard'; setActiveNav('dashboard'); loadDashboard(); } }
            else loadRequests();
        }
        
        // =====================================================================
        // تسجيل الجلسة النشطة
        // =====================================================================
        let currentSessionId = null;
        async function registerCurrentSession() {
            if (!currentUser) return;
            try {
                const deviceInfo = await getDeviceInfo();
                const oldSessions = await db.collection('ActiveSessions').where('userId', '==', currentUser.id).where('isActive', '==', true).get();
                const batch = db.batch();
                oldSessions.docs.forEach(doc => batch.update(doc.ref, { isActive: false }));
                await batch.commit();
                currentSessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substring(2);
                await db.collection('ActiveSessions').doc(currentSessionId).set({ sessionId: currentSessionId, userId: currentUser.id, username: currentUser.username, role: currentUser.role, userType: 'user', loginTime: firebase.firestore.FieldValue.serverTimestamp(), lastActivity: firebase.firestore.FieldValue.serverTimestamp(), currentPage: window.location.pathname, deviceInfo: deviceInfo, userAgent: navigator.userAgent, isActive: true });
            } catch (error) { console.error('خطأ في تسجيل الجلسة:', error); }
        }
        
        setInterval(async () => {
            if (currentSessionId && currentUser) {
                try { await db.collection('ActiveSessions').doc(currentSessionId).update({ lastActivity: firebase.firestore.FieldValue.serverTimestamp(), currentPage: window.location.pathname }); } catch (error) {}
            }
        }, 30000);
        
        window.addEventListener('beforeunload', async function() {
            if (currentSessionId) {
                try { await db.collection('ActiveSessions').doc(currentSessionId).update({ isActive: false, endedAt: firebase.firestore.FieldValue.serverTimestamp() }); } catch (error) {}
            }
        });
        
        // =====================================================================
        // التهيئة
        // =====================================================================
        window.addEventListener('load', async function() {
            await loadCurrentUser();
            await updateAllLogos();
            await loadAllSettingsFromFirebase();
            await registerCurrentSession();
            await logUserActivity('login', {});
            
            document.getElementById('navDashboard').addEventListener('click', () => changeView('dashboard'));
            document.getElementById('navAll').addEventListener('click', () => changeView('all'));
            document.getElementById('navComplaints').addEventListener('click', () => changeView('شكوى'));
            document.getElementById('navSuggestions').addEventListener('click', () => changeView('اقتراح'));
            document.getElementById('navVisitors').addEventListener('click', () => changeView('visitors'));
            document.getElementById('navActivity').addEventListener('click', () => changeView('activity'));
            document.getElementById('navUsers').addEventListener('click', () => changeView('users'));
            document.getElementById('logoutBtn').addEventListener('click', async () => { await logUserActivity('logout', {}); logout(); });
            
            changeView('dashboard');
        });
    </script>
</body>
</html>
