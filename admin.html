<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة التحكم - نقابة تكنولوجيا المعلومات | VR 2.05.2026</title>
    
    <!-- الخطوط الأساسية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- Chart.js للرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- bcryptjs للتشفير الآمن -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    
    <!-- FingerprintJS لتحديد الأجهزة الفريدة -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    
    <style>
        /* =====================================================================
           التصميم الأساسي للوحة التحكم - نسخة متكاملة مع نظام التتبع
           جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات © 2026
           ===================================================================== */
        
        :root {
            --bg-primary: #030514;
            --bg-secondary: #0a0f1f;
            --bg-tertiary: #111827;
            --bg-card: rgba(15, 23, 42, 0.7);
            --bg-sidebar: rgba(3, 5, 20, 0.8);
            --bg-hover: rgba(0, 255, 255, 0.1);
            --bg-input: rgba(3, 5, 20, 0.6);
            
            --neon-cyan: #00ffff;
            --neon-cyan-glow: rgba(0, 255, 255, 0.5);
            --neon-purple: #a855f7;
            --neon-purple-glow: rgba(168, 85, 247, 0.5);
            --neon-pink: #ec4899;
            --neon-pink-glow: rgba(236, 72, 153, 0.5);
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.5);
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.5);
            --neon-orange: #f97316;
            --neon-orange-glow: rgba(249, 115, 22, 0.5);
            --neon-blue: #3b82f6;
            --neon-blue-glow: rgba(59, 130, 246, 0.5);
            
            --text-primary: #ffffff;
            --text-secondary: #b0c4de;
            --text-muted: #94a3b8;
            
            --border-color: rgba(255, 255, 255, 0.1);
            --border-hover: var(--neon-cyan);
            
            --gradient-primary: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            --gradient-secondary: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            --gradient-danger: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
            --gradient-success: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            --gradient-warning: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            --gradient-services: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            
            --shadow-card: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-color) inset;
            --shadow-neon: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-purple);
            --shadow-neon-red: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red);
            --shadow-neon-orange: 0 0 20px var(--neon-orange), 0 0 40px var(--neon-pink);
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            --sidebar-width: 280px;
            --border-radius: 20px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            animation: cosmicWave 20s ease infinite;
            z-index: -2;
            pointer-events: none;
        }
        
        @keyframes cosmicWave {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        
        /* جزيئات متطايرة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gradient-primary);
            border-radius: 50%;
            animation: particleFloat 20s linear infinite;
            opacity: 0.3;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* عناصر عائمة */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.1;
            animation: floatLuxury 20s infinite alternate;
        }
        
        .floating-element:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: var(--neon-cyan);
        }
        
        .floating-element:nth-child(2) {
            width: 700px;
            height: 700px;
            bottom: -250px;
            left: -250px;
            background: var(--neon-purple);
        }
        
        @keyframes floatLuxury {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.1); }
        }
        
        /* زر الإعدادات - يظهر فقط للسوبر أدمن */
        .settings-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gradient-primary);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 1000;
        }
        
        .settings-btn:hover {
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-purple);
        }
        
        /* القائمة الجانبية */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: -10px 0 50px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .sidebar-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            position: relative;
        }
        
        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-cyan-glow), transparent 70%);
            animation: pulse 2s ease infinite;
            z-index: -1;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .sidebar-logo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--neon-cyan);
            object-fit: cover;
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        .sidebar-title {
            font-size: 20px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .sidebar-sub {
            color: var(--text-muted);
            font-size: 12px;
        }
        
        /* معلومات المستخدم الحالي */
        .current-user {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .user-info-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .user-info-header i {
            width: 30px;
            height: 30px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }
        
        .user-info-header span {
            font-weight: 700;
            color: var(--neon-cyan);
        }
        
        .user-info-detail {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        
        .user-info-detail i {
            color: var(--neon-cyan);
            margin-left: 5px;
        }
        
        .user-role-badge {
            background: rgba(0, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
        }
        
        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        
        .nav-item {
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            text-align: right;
            width: 100%;
        }
        
        .nav-item i {
            width: 24px;
            color: var(--neon-cyan);
            font-size: 18px;
            transition: var(--transition);
        }
        
        .nav-item:hover {
            background: var(--bg-hover);
            border-color: var(--neon-cyan);
            transform: translateX(-5px);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .nav-item.active {
            background: var(--gradient-primary);
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        .nav-item.active i {
            color: white;
        }
        
        .logout-btn {
            margin-top: auto;
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--neon-red);
        }
        
        .logout-btn i {
            color: var(--neon-red);
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--neon-red);
            box-shadow: 0 0 30px var(--neon-red);
        }
        
        /* المحتوى الرئيسي */
        .main-content {
            margin-right: var(--sidebar-width);
            padding: 30px;
            min-height: 100vh;
            position: relative;
            z-index: 90;
            transition: var(--transition);
        }
        
        /* رأس الصفحة */
        .page-header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-card);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .page-title i {
            font-size: 28px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .page-title h1 {
            font-size: 24px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-icon:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--neon-cyan);
        }
        
        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
            box-shadow: var(--shadow-card);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        
        .stat-info h3 {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .stat-info p {
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        
        /* بطاقة البحث المتقدم */
        .search-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        
        .search-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.1), rgba(168, 85, 247, 0.1));
            transition: var(--transition);
        }
        
        .search-header:hover {
            padding-right: 25px;
        }
        
        .search-header i:first-child {
            color: var(--neon-cyan);
            font-size: 16px;
        }
        
        .search-header span {
            flex: 1;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .search-header i:last-child {
            transition: transform 0.3s;
        }
        
        .search-header.active i:last-child {
            transform: rotate(180deg);
        }
        
        .search-body {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: none;
        }
        
        .search-body.show {
            display: block;
        }
        
        .search-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-field label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .search-field input,
        .search-field select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: var(--transition);
        }
        
        .search-field input:focus,
        .search-field select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        
        .search-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        
        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            transform: translateY(-3px);
        }
        
        .btn-success {
            background: var(--gradient-success);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--neon-green);
        }
        
        .btn-danger {
            background: var(--gradient-danger);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--neon-red);
        }
        
        .btn-warning {
            background: var(--gradient-warning);
            color: white;
        }
        
        .btn-warning:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--neon-orange);
        }
        
        .btn-services {
            background: var(--gradient-services);
            color: white;
            box-shadow: 0 0 15px var(--neon-orange);
        }
        
        .btn-services:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px var(--neon-orange), 0 0 40px var(--neon-pink);
        }
        
        .results-count {
            background: rgba(0, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 30px;
            color: var(--neon-cyan);
            font-size: 13px;
            border: 1px solid var(--neon-cyan);
        }
        
        /* بطاقة الجدول */
        .table-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        
        .table-responsive {
            overflow-x: auto;
            padding: 5px;
        }
        
        #main-table, .users-table, .activity-table, .sessions-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1300px;
        }
        
        #main-table th, .users-table th, .activity-table th, .sessions-table th {
            padding: 15px 12px;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-primary);
            text-align: right;
            border-bottom: 2px solid var(--neon-cyan);
            background: linear-gradient(180deg, rgba(0, 255, 255, 0.1), transparent);
            white-space: nowrap;
        }
        
        #main-table td, .users-table td, .activity-table td, .sessions-table td {
            padding: 12px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            vertical-align: middle;
        }
        
        #main-table tbody tr, .users-table tbody tr, .activity-table tbody tr, .sessions-table tbody tr {
            transition: var(--transition);
        }
        
        #main-table tbody tr:hover, .users-table tbody tr:hover, .activity-table tbody tr:hover, .sessions-table tbody tr:hover {

            font-size: 20px;
        }
        
        canvas {

        }
        
        /* تخصيص SweetAlert */
        .swal2-popup {

        /* تحسينات للأجهزة المحمولة */
        @media (max-width: 1200px) {

                grid-template-columns: repeat(2, 1fr);
            }
            .search-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .advanced-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 992px) {

            .sidebar.show {
                transform: translateX(0);
            }

            }

                width: 320px;
            }
        }

                grid-template-columns: 1fr;
            }
            .search-grid {
                grid-template-columns: 1fr;
            }
            .advanced-stats {
                grid-template-columns: 1fr;
            }

                flex-direction: column;
                gap: 15px;

            }
            .settings-menu {
                width: 300px;
                left: 10px;
                padding: 20px;
            }
            .settings-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        // =====================================================================
        // تهيئة Firebase
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC71PVDTouBkQ4hRTANelbwRo4AYI6LwnE",
            authDomain: "itwsreq.firebaseapp.com",
            projectId: "itwsreq",
            storageBucket: "itwsreq.firebasestorage.app",
            messagingSenderId: "417900842360",
            appId: "1:417900842360:web:83d9310f36fef5bbbe4c8d",
            measurementId: "G-P3YQFRSBMM"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // تفعيل التخزين المؤقت
        db.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED, ignoreUndefinedProperties: true });
        
        // =====================================================================
        // الثوابت العامة
        // =====================================================================
        const STORAGE_KEYS = {
            LOGO_URL: 'union_logo_url',
            COMPLAINT_PREFIX: 'complaint_prefix',
            SUGGESTION_PREFIX: 'suggestion_prefix',
            SERVICES_URL: 'services_url',
            SERVICES_TEXT: 'services_text',
            SHOW_SERVICES: 'show_services',
            CURRENT_USER_ID: 'currentUserId',
            CURRENT_USER: 'currentUser',
            CURRENT_USER_ROLE: 'currentUserRole',
            CURRENT_USER_LAST_LOGIN: 'currentUserLastLogin'
        };
        
        const DEFAULT_SETTINGS = {
            LOGO_URL: 'https://placehold.co/200x200/0a0f1f/00ffff/png?text=Logo',
            COMPLAINT_PREFIX: 'REQ',
            SUGGESTION_PREFIX: 'REP',
            SERVICES_URL: 'https://services.egeng.org',
            SERVICES_TEXT: 'موقع تقديم خدمات النقابة',
            SHOW_SERVICES: true,
            SYSTEM_VERSION: 'VR 2.05.2026'
        };
        
        // =====================================================================
        // نظام الإعدادات المتكامل
        // =====================================================================
        
        async function loadAllSettingsFromFirebase() {
            try {
                const settingsDoc = await db.collection('Settings').doc('system').get();
                if (settingsDoc.exists) {
                    const settings = settingsDoc.data();
                    if (settings.logo) localStorage.setItem(STORAGE_KEYS.LOGO_URL, settings.logo);
                    if (settings.servicesUrl) localStorage.setItem(STORAGE_KEYS.SERVICES_URL, settings.servicesUrl);
                    if (settings.servicesText) localStorage.setItem(STORAGE_KEYS.SERVICES_TEXT, settings.servicesText);
                    if (settings.showServices !== undefined) localStorage.setItem(STORAGE_KEYS.SHOW_SERVICES, settings.showServices);
                    if (settings.complaintPrefix) localStorage.setItem(STORAGE_KEYS.COMPLAINT_PREFIX, settings.complaintPrefix);
                    if (settings.suggestionPrefix) localStorage.setItem(STORAGE_KEYS.SUGGESTION_PREFIX, settings.suggestionPrefix);
                    return settings;
                }
                return DEFAULT_SETTINGS;
            } catch (error) {
                return DEFAULT_SETTINGS;
            }
        }
        
        async function saveAllSettingsToFirebase(settings) {
            try {
                const currentUser = localStorage.getItem(STORAGE_KEYS.CURRENT_USER) || 'system';
                const settingsToSave = {
                    logo: settings.logo || DEFAULT_SETTINGS.LOGO_URL,
                    servicesUrl: settings.servicesUrl || DEFAULT_SETTINGS.SERVICES_URL,
                    servicesText: settings.servicesText || DEFAULT_SETTINGS.SERVICES_TEXT,
                    showServices: settings.showServices !== undefined ? settings.showServices : DEFAULT_SETTINGS.SHOW_SERVICES,
                    complaintPrefix: settings.complaintPrefix || DEFAULT_SETTINGS.COMPLAINT_PREFIX,
                    suggestionPrefix: settings.suggestionPrefix || DEFAULT_SETTINGS.SUGGESTION_PREFIX,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedBy: currentUser
                };
                await db.collection('Settings').doc('system').set(settingsToSave, { merge: true });
                localStorage.setItem(STORAGE_KEYS.LOGO_URL, settingsToSave.logo);
                return true;
            } catch (error) {
                return false;
            }
        }
        
        async function loadLogoFromFirebase() {
            const settings = await loadAllSettingsFromFirebase();
            return settings.logo || DEFAULT_SETTINGS.LOGO_URL;
        }
        
        async function updateAllLogos() {
            const logo = await loadLogoFromFirebase();
            const logoElement = document.getElementById('sidebar-logo');
            if (logoElement) {
                logoElement.src = logo;
                logoElement.onerror = function() { this.src = DEFAULT_SETTINGS.LOGO_URL; };
            }
            return logo;
        }
        
        async function saveLogoSettings() {
            const logoUrl = document.getElementById('logoUrl')?.value.trim();
            if (!logoUrl) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'الرجاء إدخال رابط الشعار', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' });
                return;
            }
            const settings = await loadAllSettingsFromFirebase();
            settings.logo = logoUrl;
            const result = await saveAllSettingsToFirebase(settings);
            if (result) {
                await updateAllLogos();
                Swal.fire({ icon: 'success', title: 'تم الحفظ', text: 'تم حفظ الشعار بنجاح', timer: 1500, showConfirmButton: false, background: '#030514' });
            } else {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ في حفظ الشعار', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' });
            }
        }
        
        async function saveAllSettings() {
            const settings = {
                logo: document.getElementById('logoUrl')?.value.trim() || DEFAULT_SETTINGS.LOGO_URL,
                servicesUrl: document.getElementById('servicesUrl')?.value.trim() || DEFAULT_SETTINGS.SERVICES_URL,
                servicesText: document.getElementById('servicesText')?.value.trim() || DEFAULT_SETTINGS.SERVICES_TEXT,
                showServices: document.getElementById('showServices')?.checked,
                complaintPrefix: document.getElementById('complaintPrefix')?.value.trim() || DEFAULT_SETTINGS.COMPLAINT_PREFIX,
                suggestionPrefix: document.getElementById('suggestionPrefix')?.value.trim() || DEFAULT_SETTINGS.SUGGESTION_PREFIX
            };
            const result = await saveAllSettingsToFirebase(settings);
            if (result) {
                await updateAllLogos();
                const msg = document.getElementById('autoSaveMessage');
                msg.style.display = 'flex';
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
                setTimeout(() => { document.getElementById('settingsMenu').classList.remove('show'); }, 2000);
            } else {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ في حفظ الإعدادات', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' });
            }
        }
        
        // =====================================================================
        // المتغيرات العامة
        // =====================================================================
        let allRequests = [];
        let allUsers = [];
        let allVisitors = [];
        let allServicesClicks = [];
        let allSessions = [];
        let allActivities = [];
        let currentView = 'dashboard';
        let unsubscribeRequests = null;
        let unsubscribeUsers = null;
        let unsubscribeVisitors = null;
        let unsubscribeServicesClicks = null;
        let unsubscribeSessions = null;
        let unsubscribeActivities = null;
        let currentRequestId = null;
        let currentUserId = null;
        let currentUser = null;
        let isSuperAdmin = false;
        let charts = {};
        
        // =====================================================================
        // إنشاء الجزيئات
        // =====================================================================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.animationDuration = 10 + Math.random() * 20 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        // =====================================================================
        // التحقق من تسجيل الدخول
        // =====================================================================
        function checkAuth() {
            const userId = localStorage.getItem(STORAGE_KEYS.CURRENT_USER_ID);
            const userName = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
            if (!userId && !userName) {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }
        checkAuth();
        
        // =====================================================================
        // تحميل معلومات المستخدم الحالي
        // =====================================================================
        async function loadCurrentUser() {
            const userId = localStorage.getItem(STORAGE_KEYS.CURRENT_USER_ID);
            const userName = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
            const userRole = localStorage.getItem(STORAGE_KEYS.CURRENT_USER_ROLE);
            
            if (userId && userName) {
                try {
                    const userDoc = await db.collection('Users').doc(userId).get();
                    if (userDoc.exists) {
                        const userData = userDoc.data();
                        currentUser = { id: userId, username: userData.username, role: userData.role, name: userData.name || userName };
                    } else {
                        currentUser = { id: userId, username: userName, role: userRole || 'admin', name: userName };
                    }
                } catch (error) {
                    currentUser = { id: userId, username: userName, role: userRole || 'admin', name: userName };
                }
            } else {
                currentUser = { id: 'unknown', username: 'زائر', role: 'viewer', name: 'زائر' };
            }
            
            document.getElementById('currentUserName').textContent = currentUser.name || currentUser.username;
            const roleName = getRoleName(currentUser.role);
            document.getElementById('currentUserRole').textContent = roleName;
            document.getElementById('currentUserRoleBadge').textContent = roleName;
            
            isSuperAdmin = (currentUser.role === 'super_admin');
            const settingsBtn = document.getElementById('settingsBtn');
            if (settingsBtn) settingsBtn.style.display = isSuperAdmin ? 'flex' : 'none';
            
            const lastLogin = localStorage.getItem(STORAGE_KEYS.CURRENT_USER_LAST_LOGIN);
            if (lastLogin) document.getElementById('currentUserLastLogin').textContent = lastLogin;
            
            return currentUser;
        }
        
        function getRoleName(role) {
            const roles = { 'super_admin': 'سوبر أدمن', 'admin': 'أدمن', 'reviewer': 'مراجع', 'data_entry': 'مدخل بيانات' };
            return roles[role] || role;
        }
        
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }
        function toggleSettings() { document.getElementById('settingsMenu').classList.toggle('show'); if (document.getElementById('settingsMenu').classList.contains('show')) loadSettings(); }
        function closeModal(modalId) { document.getElementById(modalId).classList.remove('show'); }
        
        function setActiveNav(view) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (view === 'dashboard') document.getElementById('navDashboard').classList.add('active');
            else if (view === 'all') document.getElementById('navAll').classList.add('active');
            else if (view === 'شكوى') document.getElementById('navComplaints').classList.add('active');
            else if (view === 'اقتراح') document.getElementById('navSuggestions').classList.add('active');
            else if (view === 'visitors') document.getElementById('navVisitors').classList.add('active');
            else if (view === 'activity') document.getElementById('navActivity').classList.add('active');
            else if (view === 'users') document.getElementById('navUsers').classList.add('active');
        }
        
        function logout() {
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER_ID);
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER_ROLE);
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER_LAST_LOGIN);
            window.location.href = 'index.html';
        }
        
        async function loadSettings() {
            const settings = await loadAllSettingsFromFirebase();
            document.getElementById('logoUrl').value = settings.logo || DEFAULT_SETTINGS.LOGO_URL;
            document.getElementById('servicesUrl').value = settings.servicesUrl || DEFAULT_SETTINGS.SERVICES_URL;
            document.getElementById('servicesText').value = settings.servicesText || DEFAULT_SETTINGS.SERVICES_TEXT;
            document.getElementById('showServices').checked = settings.showServices !== undefined ? settings.showServices : DEFAULT_SETTINGS.SHOW_SERVICES;
            document.getElementById('complaintPrefix').value = settings.complaintPrefix || DEFAULT_SETTINGS.COMPLAINT_PREFIX;
            document.getElementById('suggestionPrefix').value = settings.suggestionPrefix || DEFAULT_SETTINGS.SUGGESTION_PREFIX;
        }
        
        function exportToPDF() {
            const element = document.getElementById('contentArea');
            if (!element) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: 'لا يوجد محتوى للتصدير', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' });
                return;
            }
            Swal.fire({ title: 'جاري إنشاء PDF', text: 'الرجاء الانتظار...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
            const opt = { margin: [0.5, 0.5, 0.5, 0.5], filename: `تقرير_${new Date().toLocaleDateString('ar-EG')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, backgroundColor: '#030514' }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } };
            html2pdf().set(opt).from(element).save().then(() => Swal.close());
        }
        
        function refreshData() {
            Swal.fire({ title: 'جاري تحديث البيانات', text: 'الرجاء الانتظار...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#030514' });
            if (currentView === 'users') { if (unsubscribeUsers) unsubscribeUsers(); loadUsers(); }
            else if (currentView === 'visitors') { if (unsubscribeVisitors) unsubscribeVisitors(); if (unsubscribeServicesClicks) unsubscribeServicesClicks(); loadVisitorsStats(); }
            else if (currentView === 'activity') { if (unsubscribeSessions) unsubscribeSessions(); if (unsubscribeActivities) unsubscribeActivities(); loadActivityDashboard(); }
            else if (currentView === 'dashboard') { loadDashboard(); }
            else { if (unsubscribeRequests) unsubscribeRequests(); loadRequests(); }
            setTimeout(() => { Swal.close(); Swal.fire({ icon: 'success', title: 'تم التحديث', text: 'تم تحديث البيانات بنجاح', timer: 1500, showConfirmButton: false, background: '#030514' }); }, 1000);
        }
        
        // =====================================================================
        // لوحة التحكم الرئيسية (Dashboard)
        // =====================================================================
        async function loadDashboard() {
            document.getElementById('pageTitle').textContent = 'لوحة التحكم الرئيسية';
            document.getElementById('pageIcon').className = 'fas fa-chart-pie';
            document.getElementById('contentArea').innerHTML = `<div class="table-card"><div style="text-align: center; padding: 50px;"><i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--neon-cyan); margin-bottom: 15px;"></i><p style="color: var(--text-muted);">جاري تحميل البيانات...</p></div></div>`;
            
            try {
                // جلب الطلبات
                const requestsSnapshot = await db.collection('Requests').get();
                const totalRequests = requestsSnapshot.size;
                const complaints = requestsSnapshot.docs.filter(d => d.data().type === 'شكوى').length;
                const suggestions = requestsSnapshot.docs.filter(d => d.data().type === 'اقتراح').length;
                
                // جلب الطلبات المحلولة
                const resolved = requestsSnapshot.docs.filter(d => d.data().status === 'تم الحل' || d.data().status === 'تم الإغلاق النهائي').length;
                const pending = totalRequests - resolved;
                
                // جلب إحصائيات الزوار
                const visitorsStatsDoc = await db.collection('Visitors').doc('stats').get();
                const visitorsStats = visitorsStatsDoc.exists ? visitorsStatsDoc.data() : { totalUniqueVisitors: 0, totalVisits: 0 };
                
                // جلب إحصائيات النقرات
                const clicksStatsDoc = await db.collection('ServicesClicks').doc('stats').get();
                const clicksStats = clicksStatsDoc.exists ? clicksStatsDoc.data() : { totalClicks: 0 };
                
                // جلب الجلسات النشطة
                const sessionsSnapshot = await db.collection('ActiveSessions').where('isActive', '==', true).get();
                const activeSessions = sessionsSnapshot.size;
                
                // جلب المستخدمين
                const usersSnapshot = await db.collection('Users').get();
                const totalUsers = usersSnapshot.size;
                
                // جلب آخر الأنشطة
                const activitiesSnapshot = await db.collection('UserActivityLog').orderBy('timestamp', 'desc').limit(5).get();
                let activitiesHTML = '';
                activitiesSnapshot.forEach(doc => {
                    const activity = doc.data();
                    const time = activity.timestamp?.toDate ? activity.timestamp.toDate().toLocaleString('ar-EG') : 'منذ قليل';
                    let actionText = '', actionColor = '';
                    switch(activity.action) {
                        case 'login': actionText = 'تسجيل دخول'; actionColor = '#10b981'; break;
                        case 'logout': actionText = 'تسجيل خروج'; actionColor = '#ef4444'; break;
                        case 'create_request': actionText = 'إنشاء طلب'; actionColor = '#00ffff'; break;
                        case 'update_request': actionText = 'تحديث طلب'; actionColor = '#f97316'; break;
                        default: actionText = activity.action; actionColor = '#94a3b8';
                    }
                    activitiesHTML += `<div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 5px; border-right: 3px solid ${actionColor};"><div style="display: flex; justify-content: space-between;"><span style="color: ${actionColor};">${actionText}</span><span style="color: var(--text-muted); font-size: 11px;">${time}</span></div><div style="margin-top: 5px; font-size: 12px;"><span style="color: var(--neon-cyan);">${activity.username || 'زائر'}</span><span style="color: var(--text-muted);"> - </span><span>${activity.details ? JSON.stringify(activity.details) : ''}</span></div></div>`;
                });
                
                const html = `
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-icon"><i class="fas fa-file-alt"></i></div><div class="stat-info"><h3>إجمالي الطلبات</h3><p>${totalRequests}</p></div></div>
                        <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #ef4444, #f97316);"><i class="fas fa-exclamation-circle"></i></div><div class="stat-info"><h3>الشكاوى</h3><p>${complaints}</p></div></div>
                        <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #00ffff);"><i class="fas fa-lightbulb"></i></div><div class="stat-info"><h3>المقترحات</h3><p>${suggestions}</p></div></div>
                        <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #00ffff, #a855f7);"><i class="fas fa-users"></i></div><div class="stat-info"><h3>الزوار الفريدين</h3><p>${visitorsStats.totalUniqueVisitors || 0}</p></div></div>
                    </div>
                    <div class="advanced-stats">
                        <div class="chart-container"><div class="chart-title"><i class="fas fa-chart-pie"></i><span>توزيع الطلبات</span></div><canvas id="requestsChart"></canvas></div>
                        <div class="chart-container"><div class="chart-title"><i class="fas fa-chart-bar"></i><span>حالة الطلبات</span></div><canvas id="statusChart"></canvas></div>
                        <div class="chart-container"><div class="chart-title"><i class="fas fa-chart-line"></i><span>الأنشطة الأخيرة</span></div><div style="max-height: 250px; overflow-y: auto;">${activitiesHTML || '<p style="color: var(--text-muted);">لا توجد أنشطة</p>'}</div></div>
                    </div>
                    <div class="stats-grid" style="margin-top: 30px;">
                        <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #f97316, #ec4899);"><i class="fas fa-mouse-pointer"></i></div><div class="stat-info"><h3>نقرات الخدمات</h3><p>${clicksStats.totalClicks || 0}</p></div></div>
                        <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #a855f7, #ec4899);"><i class="fas fa-plug"></i></div><div class="stat-info"><h3>متصلين الآن</h3><p>${activeSessions}</p></div></div>
                        <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #00ffff);"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h3>الطلبات المحلولة</h3><p>${resolved}</p></div></div>
                        <div class="stat-card"><div class="stat-icon" style="background: linear-gradient(135deg, #3b82f6, #a855f7);"><i class="fas fa-users-cog"></i></div><div class="stat-info"><h3>المستخدمين</h3><p>${totalUsers}</p></div></div>
                    </div>
                `;
                
                document.getElementById('contentArea').innerHTML = html;
                
                setTimeout(() => {
                    if (document.getElementById('requestsChart')) {
                        if (charts.requests) charts.requests.destroy();
                        charts.requests = new Chart(document.getElementById('requestsChart'), {
                            type: 'doughnut',
                            data: { labels: ['شكاوى', 'مقترحات'], datasets: [{ data: [complaints, suggestions], backgroundColor: ['#ef4444', '#10b981'], borderColor: ['#ef4444', '#10b981'], borderWidth: 2 }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
                        });
                    }
                    if (document.getElementById('statusChart')) {
                        if (charts.status) charts.status.destroy();
                        charts.status = new Chart(document.getElementById('statusChart'), {
                            type: 'bar',
                            data: { labels: ['محلولة', 'قيد الانتظار'], datasets: [{ label: 'عدد الطلبات', data: [resolved, pending], backgroundColor: ['#10b981', '#f97316'], borderColor: ['#10b981', '#f97316'], borderWidth: 1 }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
                        });
                    }
                }, 100);
                
            } catch (error) {
                console.error('خطأ في تحميل لوحة التحكم:', error);
                document.getElementById('contentArea').innerHTML = `<div class="table-card"><div style="text-align: center; padding: 50px; color: var(--neon-red);"><i class="fas fa-exclamation-triangle" style="font-size: 50px; margin-bottom: 15px;"></i><h3 style="color: var(--neon-red);">حدث خطأ في تحميل البيانات</h3><p style="color: var(--text-muted);">${error.message}</p></div></div>`;
            }
        }
        
        // =====================================================================
        // إدارة الطلبات
        // =====================================================================
        function loadRequests() {
            if (unsubscribeRequests) unsubscribeRequests();
            document.getElementById('pageTitle').textContent = currentView === 'all' ? 'كل الطلبات' : (currentView === 'شكوى' ? 'سجل الشكاوى' : 'سجل المقترحات');
            document.getElementById('pageIcon').className = 'fas fa-database';
            document.getElementById('contentArea').innerHTML = `<div class="table-card"><div style="text-align: center; padding: 50px;"><i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--neon-cyan); margin-bottom: 15px;"></i><p style="color: var(--text-muted);">جاري تحميل الطلبات...</p></div></div>`;
            
            let query = db.collection("Requests").orderBy("createdAt", "desc");
            if (currentView !== 'all') query = query.where("type", "==", currentView);
            
            unsubscribeRequests = query.onSnapshot((snapshot) => {
                allRequests = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.createdAtDate = data.createdAt?.toDate ? data.createdAt.toDate() : (data.createdAt ? new Date(data.createdAt) : new Date());
                    allRequests.push({ id: doc.id, ...data });
                });
                updateStats();
                createRequestsView();
            }, (error) => {
                document.getElementById('contentArea').innerHTML = `<div class="table-card"><div style="text-align: center; padding: 50px; color: var(--neon-red);"><i class="fas fa-exclamation-triangle" style="font-size: 50px; margin-bottom: 15px;"></i><h3 style="color: var(--neon-red);">حدث خطأ في تحميل البيانات</h3><p style="color: var(--text-muted);">${error.message}</p><button class="btn btn-primary" onclick="loadRequests()"><i class="fas fa-sync-alt"></i> إعادة المحاولة</button></div></div>`;
            });
        }
        
        function updateStats() {
            const total = allRequests.length;
            const complaints = allRequests.filter(r => r.type === 'شكوى').length;
            const suggestions = allRequests.filter(r => r.type === 'اقتراح').length;
            const pending = allRequests.filter(r => r.status !== 'تم الحل' && r.status !== 'تم الإغلاق النهائي' && r.status !== 'تمت القراءة').length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('complaintsCount').textContent = complaints;
            document.getElementById('suggestionsCount').textContent = suggestions;
            document.getElementById('pendingCount').textContent = pending;
        }
        
        let searchFilters = { ref: '', name: '', nid: '', member: '', dateFrom: '', dateTo: '', type: 'all', status: 'all' };
        
        function toggleSearch() {
            const searchBody = document.getElementById('searchBody');
            const searchArrow = document.getElementById('searchArrow');
            if (searchBody && searchArrow) {
                searchBody.classList.toggle('show');
                searchArrow.style.transform = searchBody.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0)';
            }
        }
        
        function updateFilters() {
            searchFilters = {
                ref: document.getElementById('searchRef')?.value || '',
                name: document.getElementById('searchName')?.value || '',
                nid: document.getElementById('searchNid')?.value || '',
                member: document.getElementById('searchMember')?.value || '',
                dateFrom: document.getElementById('searchDateFrom')?.value || '',
                dateTo: document.getElementById('searchDateTo')?.value || '',
                type: document.getElementById('searchType')?.value || 'all',
                status: document.getElementById('searchStatus')?.value || 'all'
            };
            filterRequests();
        }
        
        function resetFilters() {
            if (document.getElementById('searchRef')) document.getElementById('searchRef').value = '';
            if (document.getElementById('searchName')) document.getElementById('searchName').value = '';
            if (document.getElementById('searchNid')) document.getElementById('searchNid').value = '';
            if (document.getElementById('searchMember')) document.getElementById('searchMember').value = '';
            if (document.getElementById('searchDateFrom')) document.getElementById('searchDateFrom').value = '';
            if (document.getElementById('searchDateTo')) document.getElementById('searchDateTo').value = '';
            if (document.getElementById('searchType')) document.getElementById('searchType').value = 'all';
            if (document.getElementById('searchStatus')) document.getElementById('searchStatus').value = 'all';
            searchFilters = { ref: '', name: '', nid: '', member: '', dateFrom: '', dateTo: '', type: 'all', status: 'all' };
            filterRequests();
        }
        
        function filterRequests() {
            let filtered = allRequests.filter(request => {
                if (searchFilters.ref && !request.refId?.toLowerCase().includes(searchFilters.ref.toLowerCase())) return false;
                if (searchFilters.name && !request.name?.toLowerCase().includes(searchFilters.name.toLowerCase())) return false;
                if (searchFilters.nid && !request.nid?.includes(searchFilters.nid)) return false;
                if (searchFilters.member && !request.memberId?.includes(searchFilters.member)) return false;
                if (searchFilters.type !== 'all' && request.type !== searchFilters.type) return false;
                if (searchFilters.status !== 'all' && request.status !== searchFilters.status) return false;
                if (searchFilters.dateFrom || searchFilters.dateTo) {
                    const requestDate = request.createdAtDate;
                    if (requestDate) {
                        const dateStr = requestDate.toISOString().split('T')[0];
                        if (searchFilters.dateFrom && dateStr < searchFilters.dateFrom) return false;
                        if (searchFilters.dateTo && dateStr > searchFilters.dateTo) return false;
                    }
                }
                return true;
            });
            renderRequests(filtered);
            if (document.getElementById('resultsCount')) document.getElementById('resultsCount').textContent = `${filtered.length} نتيجة`;
        }

            let tableHTML = `

                    <div class="search-body" id="searchBody">
                        <div class="search-grid">

                            <div class="search-field"><label>الحالة</label><select id="searchStatus" onchange="updateFilters()">${statusOptions}</select></div>

                        <div class="search-actions"><button class="btn btn-secondary" onclick="resetFilters()"><i class="fas fa-undo"></i> إعادة ضبط</button><span class="results-count" id="resultsCount">${requests.length} نتيجة</span></div>
                    </div>

            if (requests.length === 0) {

            } else {
                requests.forEach(request => {

                    const timeStr = request.createdAtDate ? request.createdAtDate.toLocaleTimeString('ar-EG') : '';

        async function updateRequestStatus() {
            const newStatus = document.getElementById('newStatus')?.value.trim();
            const comment = document.getElementById('statusComment')?.value.trim();
            if (!newStatus) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'اكتب اسم المرحلة الجديدة', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            if (!comment) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'اكتب تعليق على التحديث', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); return; }
            try {
                await db.collection("Requests").doc(currentRequestId).update({ status: newStatus, tracking: firebase.firestore.FieldValue.arrayUnion({ status: newStatus, comment: comment, time: new Date().toLocaleString('ar-EG'), isFinal: newStatus === 'تم الإغلاق النهائي' }) });
                await logUserActivity('update_request', { requestId: currentRequestId, newStatus, comment });
                Swal.fire({ icon: 'success', title: 'تم التحديث', text: 'تم تحديث حالة الطلب بنجاح', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' });
                closeModal('requestModal');
            } catch (error) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ في تحديث الحالة', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); }

        }

            try {
                await db.collection("Requests").doc(currentRequestId).update({ status: 'تم الإغلاق النهائي', tracking: firebase.firestore.FieldValue.arrayUnion({ status: 'تم الإغلاق النهائي', comment: comment, time: new Date().toLocaleString('ar-EG'), isFinal: true }) });

            document.getElementById('readModal').classList.add('show');
            document.getElementById('readModalContent').innerHTML = `<div style="text-align: center; padding: 20px;"><i class="fas fa-check-circle" style="font-size: 50px; color: var(--neon-green); margin-bottom: 20px;"></i><h3 style="color: var(--neon-green); margin-bottom: 20px;">تمييز كمقروء</h3><p style="color: var(--text-muted); margin-bottom: 20px;">سيتم إضافة حالة "تمت القراءة" إلى المسار الزمني</p><textarea id="readComment" rows="3" placeholder="اكتب أي ملاحظات (اختياري)..." style="width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.5); border: 2px solid var(--neon-green); border-radius: 10px; color: white;"></textarea><div style="display: flex; gap: 10px;"><button class="btn btn-success" onclick="confirmReadRequest()" style="flex: 2;"><i class="fas fa-check"></i> تأكيد</button><button class="btn btn-secondary" onclick="closeModal('readModal')" style="flex: 1;"><i class="fas fa-times"></i> إلغاء</button></div></div>`;
        }
        
        async function confirmReadRequest() {
            const comment = document.getElementById('readComment')?.value.trim() || 'تمت قراءة الاقتراح';
            try {
                await db.collection("Requests").doc(currentRequestId).update({ status: 'تمت القراءة', tracking: firebase.firestore.FieldValue.arrayUnion({ status: 'تمت القراءة', comment: comment, time: new Date().toLocaleString('ar-EG'), isFinal: false }) });

            } catch (error) { Swal.fire({ icon: 'error', title: 'خطأ', text: 'حدث خطأ في تحديث الحالة', background: '#030514', confirmButtonText: 'حسناً', confirmButtonColor: '#00ffff' }); }

        // =====================================================================
        // نظام تتبع أنشطة المستخدمين
        // =====================================================================
        async function logUserActivity(action, details = {}) {
            if (!currentUser) return;
            try {
                const deviceInfo = await getDeviceInfo();
                await db.collection('UserActivityLog').add({ userId: currentUser.id, username: currentUser.username, role: currentUser.role, action: action, details: details, timestamp: firebase.firestore.FieldValue.serverTimestamp(), deviceInfo: deviceInfo, userAgent: navigator.userAgent, page: window.location.pathname });
                const today = new Date().toISOString().split('T')[0];
                const countsRef = db.collection('UserActionCounts').doc(currentUser.id);
                const countsDoc = await countsRef.get();
                if (countsDoc.exists) {
                    await countsRef.update({ lastUpdated: firebase.firestore.FieldValue.serverTimestamp(), [`today.${action}`]: firebase.firestore.FieldValue.increment(1), [`today.total`]: firebase.firestore.FieldValue.increment(1), [`week.${action}`]: firebase.firestore.FieldValue.increment(1), [`week.total`]: firebase.firestore.FieldValue.increment(1), [`month.${action}`]: firebase.firestore.FieldValue.increment(1), [`month.total`]: firebase.firestore.FieldValue.increment(1), [`all.${action}`]: firebase.firestore.FieldValue.increment(1), [`all.total`]: firebase.firestore.FieldValue.increment(1) });
                } else {
                    await countsRef.set({ userId: currentUser.id, username: currentUser.username, lastUpdated: firebase.firestore.FieldValue.serverTimestamp(), today: { [action]: 1, total: 1 }, week: { [action]: 1, total: 1 }, month: { [action]: 1, total: 1 }, all: { [action]: 1, total: 1 } });
                }
                const dailyStatsRef = db.collection('DailyStats').doc(today);
                const dailyStatsDoc = await dailyStatsRef.get();
                if (dailyStatsDoc.exists) await dailyStatsRef.update({ 'users.actions': firebase.firestore.FieldValue.increment(1) });
            } catch (error) { console.error('خطأ في تسجيل النشاط:', error); }
        }
        
        async function getDeviceInfo() {
            const ua = navigator.userAgent;
            let deviceType = 'desktop';
            if (/mobile|android|iphone|ipad|ipod/i.test(ua)) deviceType = /ipad|tablet/i.test(ua) ? 'tablet' : 'mobile';
            let os = 'Unknown';
            if (ua.indexOf('Windows') > -1) os = 'Windows';
            else if (ua.indexOf('Android') > -1) os = 'Android';
            else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) os = 'iOS';
            else if (ua.indexOf('Mac') > -1) os = 'MacOS';
            else if (ua.indexOf('Linux') > -1) os = 'Linux';
            let browser = 'Unknown';
            if (ua.indexOf('Chrome') > -1) browser = 'Chrome';
            else if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
            else if (ua.indexOf('Safari') > -1) browser = 'Safari';
            else if (ua.indexOf('Edge') > -1) browser = 'Edge';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const language = navigator.language;
            return { type: deviceType, os: os, browser: browser, screen: `${window.screen.width}×${window.screen.height}`, language: language, timezone: timezone };
        }
        
        // =====================================================================
        // لوحة النشاط الحي
        // =====================================================================
        function loadActivityDashboard() {
            if (!isSuperAdmin) { changeView('dashboard'); return; }
            document.getElementById('pageTitle').textContent = 'النشاط الحي';
            document.getElementById('pageIcon').className = 'fas fa-history';
            document.getElementById('contentArea').innerHTML = `<div class="table-card"><div style="text-align: center; padding: 50px;"><i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--neon-cyan); margin-bottom: 15px;"></i><p style="color: var(--text-muted);">جاري تحميل النشاط الحي...</p></div></div>`;
            
            if (unsubscribeSessions) unsubscribeSessions();
            unsubscribeSessions = db.collection("ActiveSessions").where("isActive", "==", true).orderBy("lastActivity", "desc").onSnapshot((snapshot) => {
                allSessions = [];
                snapshot.forEach(doc => { const data = doc.data(); if (data.loginTime?.toDate) data.loginTimeDate = data.loginTime.toDate(); if (data.lastActivity?.toDate) data.lastActivityDate = data.lastActivity.toDate(); allSessions.push({ id: doc.id, ...data }); });
                renderActivityDashboard();
            });
            
            if (unsubscribeActivities) unsubscribeActivities();
            unsubscribeActivities = db.collection("UserActivityLog").orderBy("timestamp", "desc").limit(50).onSnapshot((snapshot) => {
                allActivities = [];
                snapshot.forEach(doc => { const data = doc.data(); if (data.timestamp?.toDate) data.timestampDate = data.timestamp.toDate(); allActivities.push({ id: doc.id, ...data }); });
                renderActivityDashboard();
            });
        }
        
        async function renderActivityDashboard() {
            const today = new Date().toISOString().split('T')[0];

            const lastVisit = visitor.lastVisitDate ? visitor.lastVisitDate.toLocaleString('ar-EG') : 'غير معروف';
            const visitsList = visitor.visits?.map((v, i) => `<div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 5px; border-right: 2px solid var(--neon-cyan);"><div style="display: flex; justify-content: space-between;"><span style="color: var(--neon-cyan);">زيارة ${i + 1}</span><span style="color: var(--text-muted);">${new Date(v.date).toLocaleString('ar-EG')}</span></div><div style="margin-top: 5px; color: var(--text-muted);">المدة: ${v.duration} ثانية</div><div style="margin-top: 5px;">الصفحات: ${v.pages?.join(' - ') || '/'}</div></div>`).join('') || '<p style="color: var(--text-muted);">لا توجد زيارات مفصلة</p>';
            const clicksList = visitorClicks.map((c, i) => `<div style="background: rgba(249,115,22,0.1); padding: 10px; border-radius: 10px; margin-bottom: 5px; border-right: 2px solid #f97316;"><div style="display: flex; justify-content: space-between;"><span style="color: #f97316;">نقرة ${i + 1}</span><span style="color: var(--text-muted);">${c.timestampDate ? c.timestampDate.toLocaleString('ar-EG') : 'غير معروف'}</span></div><div style="margin-top: 5px;">الصفحة: ${c.page || '/'}</div></div>`).join('') || '<p style="color: var(--text-muted);">لا توجد نقرات</p>';
            const modalHTML = `<div style="padding: 10px;"><h3 style="color: var(--neon-cyan); margin-bottom: 20px;">تفاصيل الزائر</h3><div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin-bottom: 20px;"><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"><div><span style="color: var(--text-muted);">البصمة:</span> <span style="font-family: monospace;">${fingerprint}</span></div><div><span style="color: var(--text-muted);">نوع الجهاز:</span> ${visitor.deviceInfo?.type || 'غير معروف'}</div><div><span style="color: var(--text-muted);">نظام التشغيل:</span> ${visitor.deviceInfo?.os || 'غير معروف'}</div><div><span style="color: var(--text-muted);">المتصفح:</span> ${visitor.deviceInfo?.browser || 'غير معروف'}</div><div><span style="color: var(--text-muted);">البلد:</span> <span style="color: #f97316;">${visitor.deviceInfo?.country || 'غير معروف'}</span></div><div><span style="color: var(--text-muted);">أول زيارة:</span> ${firstVisit}</div><div><span style="color: var(--text-muted);">آخر زيارة:</span> ${lastVisit}</div><div><span style="color: var(--text-muted);">عدد الزيارات:</span> <span style="color: #00ffff;">${visitor.visitCount || 0}</span></div><div><span style="color: var(--text-muted);">إجمالي الوقت:</span> <span style="color: #10b981;">${Math.floor((visitor.totalTimeSpent || 0) / 60)} دقيقة</span></div><div><span style="color: var(--text-muted);">نقرات الخدمات:</span> <span style="color: #f97316;">${visitorClicks.length}</span></div></div></div><h4 style="color: var(--neon-cyan); margin-bottom: 15px;">تفاصيل الزيارات</h4><div style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;">${visitsList}</div><h4 style="color: #f97316; margin-bottom: 15px;">نقرات موقع الخدمات</h4><div style="max-height: 200px; overflow-y: auto;">${clicksList}</div></div>`;
