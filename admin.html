<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة التحكم - نقابة تكنولوجيا المعلومات | VR 2.05.2026</title>
    
    <!-- الخطوط الأساسية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* =====================================================================
           التصميم الأساسي للوحة التحكم - نسخة متكاملة مع تتبع المستخدمين
           جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات © 2026
           ===================================================================== */
        
        :root {
            --bg-primary: #030514;
            --bg-secondary: #0a0f1f;
            --bg-tertiary: #111827;
            --bg-card: rgba(15, 23, 42, 0.7);
            --bg-sidebar: rgba(3, 5, 20, 0.8);
            --bg-hover: rgba(0, 255, 255, 0.1);
            --bg-input: rgba(3, 5, 20, 0.6);
            
            --neon-cyan: #00ffff;
            --neon-cyan-glow: rgba(0, 255, 255, 0.5);
            --neon-purple: #a855f7;
            --neon-purple-glow: rgba(168, 85, 247, 0.5);
            --neon-pink: #ec4899;
            --neon-pink-glow: rgba(236, 72, 153, 0.5);
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.5);
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.5);
            --neon-orange: #f97316;
            --neon-orange-glow: rgba(249, 115, 22, 0.5);
            --neon-blue: #3b82f6;
            --neon-blue-glow: rgba(59, 130, 246, 0.5);
            
            --text-primary: #ffffff;
            --text-secondary: #b0c4de;
            --text-muted: #94a3b8;
            
            --border-color: rgba(255, 255, 255, 0.1);
            --border-hover: var(--neon-cyan);
            
            --gradient-primary: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            --gradient-secondary: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            --gradient-danger: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
            --gradient-success: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            --gradient-warning: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            
            --shadow-card: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-color) inset;
            --shadow-neon: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-purple);
            --shadow-neon-red: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red);
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            --sidebar-width: 280px;
            --border-radius: 20px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            animation: cosmicWave 20s ease infinite;
            z-index: -2;
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        
        @keyframes cosmicWave {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        
        /* جزيئات متطايرة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gradient-primary);
            border-radius: 50%;
            animation: particleFloat 20s linear infinite;
            opacity: 0.3;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        
        /* عناصر عائمة */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.1;
            animation: floatLuxury 20s infinite alternate;
        }
        
        .floating-element:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: var(--neon-cyan);
        }
        
        .floating-element:nth-child(2) {
            width: 700px;
            height: 700px;
            bottom: -250px;
            left: -250px;
            background: var(--neon-purple);
        }
        
        @keyframes floatLuxury {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.1); }
        }
        
        /* زر الإعدادات - ثابت */
        .settings-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gradient-primary);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 1000;
        }
        
        .settings-btn:hover {
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 40px var(--neon-cyan), 0 0 80px var(--neon-purple);
        }
        
        /* القائمة الجانبية */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: -10px 0 50px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .sidebar-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            position: relative;
        }
        
        .logo-wrapper::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-cyan-glow), transparent 70%);
            animation: pulse 2s ease infinite;
            z-index: -1;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        .sidebar-logo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--neon-cyan);
            object-fit: cover;
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        .sidebar-title {
            font-size: 20px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .sidebar-sub {
            color: var(--text-muted);
            font-size: 12px;
        }
        
        /* معلومات المستخدم الحالي */
        .current-user {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .user-info-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .user-info-header i {
            width: 30px;
            height: 30px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }
        
        .user-info-header span {
            font-weight: 700;
            color: var(--neon-cyan);
        }
        
        .user-info-detail {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        
        .user-info-detail i {
            color: var(--neon-cyan);
            margin-left: 5px;
        }
        
        .user-role-badge {
            background: rgba(0, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
        }
        
        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        
        .nav-item {
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            text-align: right;
            width: 100%;
        }
        
        .nav-item i {
            width: 24px;
            color: var(--neon-cyan);
            font-size: 18px;
            transition: var(--transition);
        }
        
        .nav-item:hover {
            background: var(--bg-hover);
            border-color: var(--neon-cyan);
            transform: translateX(-5px);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .nav-item.active {
            background: var(--gradient-primary);
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        .nav-item.active i {
            color: white;
        }
        
        .logout-btn {
            margin-top: auto;
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--neon-red);
        }
        
        .logout-btn i {
            color: var(--neon-red);
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--neon-red);
            box-shadow: 0 0 30px var(--neon-red);
        }
        
        /* المحتوى الرئيسي */
        .main-content {
            margin-right: var(--sidebar-width);
            padding: 30px;
            min-height: 100vh;
            position: relative;
            z-index: 90;
            transition: var(--transition);
        }
        
        /* رأس الصفحة */
        .page-header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-card);
        }
        
        .page-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .page-title i {
            font-size: 28px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .page-title h1 {
            font-size: 24px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-icon:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--neon-cyan);
        }
        
        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
            box-shadow: var(--shadow-card);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        
        .stat-info h3 {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .stat-info p {
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        
        /* بطاقة البحث المتقدم */
        .search-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        
        .search-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.1), rgba(168, 85, 247, 0.1));
            transition: var(--transition);
        }
        
        .search-header:hover {
            padding-right: 25px;
        }
        
        .search-header i:first-child {
            color: var(--neon-cyan);
            font-size: 16px;
        }
        
        .search-header span {
            flex: 1;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .search-header i:last-child {
            transition: transform 0.3s;
        }
        
        .search-header.active i:last-child {
            transform: rotate(180deg);
        }
        
        .search-body {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: none;
        }
        
        .search-body.show {
            display: block;
        }
        
        .search-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-field label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .search-field input,
        .search-field select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: var(--transition);
        }
        
        .search-field input:focus,
        .search-field select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        
        .search-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        
        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            transform: translateY(-3px);
        }
        
        .btn-success {
            background: var(--gradient-success);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--neon-green);
        }
        
        .btn-danger {
            background: var(--gradient-danger);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--neon-red);
        }
        
        .btn-warning {
            background: var(--gradient-warning);
            color: white;
        }
        
        .btn-warning:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px var(--neon-orange);
        }
        
        .results-count {
            background: rgba(0, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 30px;
            color: var(--neon-cyan);
            font-size: 13px;
            border: 1px solid var(--neon-cyan);
        }
        
        /* بطاقة الجدول */
        .table-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        
        .table-responsive {
            overflow-x: auto;
            padding: 5px;
        }
        
        #main-table, .users-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1300px;
        }
        
        #main-table th, .users-table th {
            padding: 15px 12px;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-primary);
            text-align: right;
            border-bottom: 2px solid var(--neon-cyan);
            background: linear-gradient(180deg, rgba(0, 255, 255, 0.1), transparent);
            white-space: nowrap;
        }
        
        #main-table td, .users-table td {
            padding: 12px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            vertical-align: middle;
        }
        
        #main-table tbody tr, .users-table tbody tr {
            transition: var(--transition);
        }
        
        #main-table tbody tr:hover, .users-table tbody tr:hover {
            background: var(--bg-hover);
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.2);
        }
        
        /* شارات الأدوار */
        .role-badge {
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
        }
        
        .role-badge.super_admin {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        
        .role-badge.admin {
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
            border: 1px solid #f97316;
        }
        
        .role-badge.reviewer {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }
        
        .role-badge.viewer {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
            border: 1px solid #a855f7;
        }
        
        .role-badge.data_entry {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
        }
        
        /* شارات الحالة */
        .status-badge {
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
            white-space: nowrap;
        }
        
        .status-badge[data-status="تم الاستلام"] {

        async function updateUserLastLogin(userId) {

                const now = new Date();
                const lastLoginStr = now.toLocaleString('ar-EG');
                
                await db.collection("Users").doc(userId).update({

                });

        // =====================================================================
        // إدارة الطلبات (Requests)
        // =====================================================================
        function loadRequests() {
            if (unsubscribeRequests) {
                unsubscribeRequests();
            }
            
            document.getElementById('contentArea').innerHTML = `
                <div class="table-card">
                    <div style="text-align: center; padding: 50px;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--neon-cyan); margin-bottom: 15px;"></i>
                        <p style="color: var(--text-muted);">جاري تحميل الطلبات...</p>
                    </div>
                </div>
            `;
            
            let query = db.collection("Requests").orderBy("createdAt", "desc");
            
            if (currentView !== 'all') {
                query = query.where("type", "==", currentView);
            }
            
            unsubscribeRequests = query.onSnapshot((snapshot) => {
                allRequests = [];
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    
                    if (data.createdAt && data.createdAt.toDate) {
                        data.createdAtDate = data.createdAt.toDate();
                    } else if (data.createdAt) {
                        data.createdAtDate = new Date(data.createdAt);
                    } else {
                        data.createdAtDate = new Date();
                    }
                    
                    allRequests.push({
                        id: doc.id,
                        ...data
                    });
                });
                
                updateStats();
                createRequestsView();
                Swal.close();
                
            }, (error) => {
                console.error("خطأ في تحميل الطلبات:", error);
                
                document.getElementById('contentArea').innerHTML = `
                    <div class="table-card">
                        <div style="text-align: center; padding: 50px; color: var(--neon-red);">
                            <i class="fas fa-exclamation-triangle" style="font-size: 50px; margin-bottom: 15px;"></i>
                            <h3 style="color: var(--neon-red); margin-bottom: 10px;">حدث خطأ في تحميل البيانات</h3>
                            <p style="color: var(--text-muted); margin-bottom: 20px;">${error.message}</p>
                            <button class="btn btn-primary" onclick="loadRequests()">
                                <i class="fas fa-sync-alt"></i> إعادة المحاولة
                            </button>
                        </div>
                    </div>
                `;
                Swal.close();
            });
        }
        
        function updateStats() {
            const total = allRequests.length;
            const complaints = allRequests.filter(r => r.type === 'شكوى').length;
            const suggestions = allRequests.filter(r => r.type === 'اقتراح').length;
            const pending = allRequests.filter(r => 
                r.status !== 'تم الحل' && 
                r.status !== 'تم الإغلاق النهائي' && 
                r.status !== 'تمت القراءة'
            ).length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('complaintsCount').textContent = complaints;
            document.getElementById('suggestionsCount').textContent = suggestions;
            document.getElementById('pendingCount').textContent = pending;
        }
        
        function toggleSearch() {
            const searchBody = document.getElementById('searchBody');
            const searchArrow = document.getElementById('searchArrow');
            if (searchBody && searchArrow) {
                searchBody.classList.toggle('show');
                searchArrow.style.transform = searchBody.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0)';
            }
        }
        
        function updateFilters() {
            searchFilters = {
                ref: document.getElementById('searchRef')?.value || '',
                name: document.getElementById('searchName')?.value || '',
                nid: document.getElementById('searchNid')?.value || '',
                member: document.getElementById('searchMember')?.value || '',
                dateFrom: document.getElementById('searchDateFrom')?.value || '',
                dateTo: document.getElementById('searchDateTo')?.value || '',
                type: document.getElementById('searchType')?.value || 'all',
                status: document.getElementById('searchStatus')?.value || 'all'
            };
            
            filterRequests();
        }
        
        function resetFilters() {
            if (document.getElementById('searchRef')) document.getElementById('searchRef').value = '';
            if (document.getElementById('searchName')) document.getElementById('searchName').value = '';
            if (document.getElementById('searchNid')) document.getElementById('searchNid').value = '';
            if (document.getElementById('searchMember')) document.getElementById('searchMember').value = '';
            if (document.getElementById('searchDateFrom')) document.getElementById('searchDateFrom').value = '';
            if (document.getElementById('searchDateTo')) document.getElementById('searchDateTo').value = '';
            if (document.getElementById('searchType')) document.getElementById('searchType').value = 'all';
            if (document.getElementById('searchStatus')) document.getElementById('searchStatus').value = 'all';
            
            searchFilters = {
                ref: '',
                name: '',
                nid: '',
                member: '',
                dateFrom: '',
                dateTo: '',
                type: 'all',
                status: 'all'
            };
            
            filterRequests();
        }
        
        function filterRequests() {
            let filtered = allRequests.filter(request => {
                if (searchFilters.ref && !request.refId?.toLowerCase().includes(searchFilters.ref.toLowerCase())) return false;
                if (searchFilters.name && !request.name?.toLowerCase().includes(searchFilters.name.toLowerCase())) return false;
                if (searchFilters.nid && !request.nid?.includes(searchFilters.nid)) return false;
                if (searchFilters.member && !request.memberId?.includes(searchFilters.member)) return false;
                if (searchFilters.type !== 'all' && request.type !== searchFilters.type) return false;
                if (searchFilters.status !== 'all' && request.status !== searchFilters.status) return false;
                
                if (searchFilters.dateFrom || searchFilters.dateTo) {
                    const requestDate = request.createdAtDate;
                    if (requestDate) {
                        const dateStr = requestDate.toISOString().split('T')[0];
                        if (searchFilters.dateFrom && dateStr < searchFilters.dateFrom) return false;
                        if (searchFilters.dateTo && dateStr > searchFilters.dateTo) return false;
                    }
                }
                
                return true;
            });
            
            renderRequests(filtered);
            if (document.getElementById('resultsCount')) {
                document.getElementById('resultsCount').textContent = `${filtered.length} نتيجة`;
            }
        }

                                <input type="date" id="searchDateFrom" onchange="updateFilters()">
                            </div>
                            <div class="search-field">
                                <label>إلى تاريخ</label>
                                <input type="date" id="searchDateTo" onchange="updateFilters()">
                            </div>
                            <div class="search-field">
                                <label>نوع الطلب</label>
                                <select id="searchType" onchange="updateFilters()">

        // =====================================================================
        // إدارة الطلب
        // =====================================================================
        function manageRequest(refId) {

                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'الطلب غير موجود',
                    background: '#030514',

                });

                        <div class="timeline-header">

                            <span class="timeline-time">${t.time}</span>
                        </div>
                        <div class="timeline-comment">${t.comment}</div>

                            <div><span style="color: var(--text-muted);">الهاتف:</span> ${request.phone}</div>
                            <div><span style="color: var(--text-muted);">المحافظة:</span> ${request.gov}</div>

                            <div><span style="color: var(--text-muted);">الحالة الحالية:</span> ${request.status}</div>

        async function updateRequestStatus() {
            const newStatus = document.getElementById('newStatus')?.value.trim();
            const comment = document.getElementById('statusComment')?.value.trim();
            
            if (!newStatus) {
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'اكتب اسم المرحلة الجديدة',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                return;
            }
            
            if (!comment) {
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'اكتب تعليق على التحديث',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                return;
            }
            
            try {
                await db.collection("Requests").doc(currentRequestId).update({
                    status: newStatus,
                    tracking: firebase.firestore.FieldValue.arrayUnion({
                        status: newStatus,
                        comment: comment,
                        time: new Date().toLocaleString('ar-EG'),
                        isFinal: newStatus === 'تم الإغلاق النهائي'
                    })
                });
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم التحديث',
                    text: 'تم تحديث حالة الطلب بنجاح',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                
                closeModal('requestModal');
                
            } catch (error) {
                console.error("Error updating status:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'حدث خطأ في تحديث الحالة',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
            }
        }
        
        function openCloseModal() {

        // =====================================================================
        // دالة آمنة لتشفير كلمة السر (SHA-256)
        // =====================================================================
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

            const username = document.getElementById('newUsername')?.value.trim();
            const password = document.getElementById('newPassword')?.value.trim();
            const name = document.getElementById('newName')?.value.trim();
            const email = document.getElementById('newEmail')?.value.trim();
            const phone = document.getElementById('newPhone')?.value.trim();
            const role = document.getElementById('newRole')?.value;
            const isActive = document.getElementById('newIsActive')?.checked;

                    title: 'خطأ',

                });

            try {

                const hashedPassword = await hashPassword(password);
                
                await db.collection("Users").add({
                    username,

                    name: name || '',
                    email: email || '',
                    phone: phone || '',

                return;
            }
            
            const name = document.getElementById('editName')?.value.trim();
            const email = document.getElementById('editEmail')?.value.trim();
            const phone = document.getElementById('editPhone')?.value.trim();
            const role = document.getElementById('editRole')?.value;
            const isActive = document.getElementById('editIsActive')?.checked;
            
            try {
                await db.collection("Users").doc(userId).update({
                    name: name || '',
                    email: email || '',
                    phone: phone || '',
                    role: role || 'viewer',
                    isActive: isActive !== undefined ? isActive : true
                });
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم',
                    text: 'تم تحديث بيانات المستخدم بنجاح',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                
                closeModal('editUserModal');
                
            } catch (error) {
                console.error("Error updating user:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'حدث خطأ في تحديث البيانات',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
            }
        }
        
        function changeUserPassword(userId) {
            if (currentUser?.role !== 'super_admin') {
                Swal.fire({
                    icon: 'error',
                    title: 'غير مصرح',
                    text: 'أنت لا تملك صلاحية تغيير كلمات السر',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                return;
            }
            
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            
            document.getElementById('changePasswordModalContent').innerHTML = `
                <div style="padding: 10px;">
                    <h3 style="color: var(--neon-cyan); margin-bottom: 20px; text-align: center;">
                        <i class="fas fa-key"></i> تغيير كلمة السر
                    </h3>
                    
                    <p style="color: var(--text-muted); text-align: center; margin-bottom: 20px;">
                        المستخدم: <strong style="color: var(--neon-cyan);">${user.username}</strong>
                    </p>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="color: var(--text-muted); font-size: 13px; margin-bottom: 5px; display: block;">كلمة السر الجديدة</label>
                        <input type="password" id="newUserPassword" placeholder="كلمة السر الجديدة" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;">
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="color: var(--text-muted); font-size: 13px; margin-bottom: 5px; display: block;">تأكيد كلمة السر</label>
                        <input type="password" id="confirmUserPassword" placeholder="تأكيد كلمة السر" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 2px solid var(--border-color); border-radius: 10px; color: white;">
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn btn-primary" onclick="updateUserPassword('${user.id}')" style="flex: 2;">
                            <i class="fas fa-save"></i> تغيير كلمة السر
                        </button>
                        <button class="btn btn-secondary" onclick="closeModal('changePasswordModal')" style="flex: 1;">
                            <i class="fas fa-times"></i> إلغاء
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('changePasswordModal').classList.add('show');
        }
        
        async function updateUserPassword(userId) {
            if (currentUser?.role !== 'super_admin') {
                Swal.fire({
                    icon: 'error',
                    title: 'غير مصرح',
                    text: 'أنت لا تملك صلاحية تغيير كلمات السر',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                return;
            }
            
            const newPassword = document.getElementById('newUserPassword')?.value.trim();
            const confirmPassword = document.getElementById('confirmUserPassword')?.value.trim();
            
            if (!newPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'كلمة السر مطلوبة',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                return;
            }
            
            if (newPassword !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'كلمة السر غير متطابقة',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                return;
            }
            
            try {
                // تشفير كلمة السر بطريقة آمنة
                const hashedPassword = await hashPassword(newPassword);
                
                await db.collection("Users").doc(userId).update({
                    password: hashedPassword
                });
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم',
                    text: 'تم تغيير كلمة السر بنجاح',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                
                closeModal('changePasswordModal');
                
            } catch (error) {
                console.error("Error changing password:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'حدث خطأ في تغيير كلمة السر',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
            }
        }
        
        // =====================================================================
        // دوال الحذف المشتركة
        // =====================================================================
        function openDeleteModal(type, id) {
            currentDeleteId = id;
            
            let content = '';
            if (type === 'request') {
                content = `
                    <div style="text-align: center; padding: 20px;">
                        <i class="fas fa-trash-alt" style="font-size: 50px; color: var(--neon-red); margin-bottom: 20px;"></i>
                        <h3 style="color: var(--neon-red); margin-bottom: 20px;">حذف الطلب</h3>
                        <p style="color: var(--text-muted); margin-bottom: 20px;">هل أنت متأكد من حذف هذا الطلب؟</p>
                        <input type="password" id="deletePassword" placeholder="كلمة سر الحذف" style="width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.5); border: 2px solid var(--neon-red); border-radius: 10px; color: white;">
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-danger" onclick="confirmDelete('${type}')" style="flex: 2;">
                                <i class="fas fa-check"></i> تأكيد الحذف
                            </button>
                            <button class="btn btn-secondary" onclick="closeModal('deleteModal')" style="flex: 1;">
                                <i class="fas fa-times"></i> إلغاء
                            </button>
                        </div>
                    </div>
                `;
            } else {
                content = `
                    <div style="text-align: center; padding: 20px;">
                        <i class="fas fa-trash-alt" style="font-size: 50px; color: var(--neon-red); margin-bottom: 20px;"></i>
                        <h3 style="color: var(--neon-red); margin-bottom: 20px;">حذف المستخدم</h3>
                        <p style="color: var(--text-muted); margin-bottom: 20px;">هل أنت متأكد من حذف هذا المستخدم؟</p>
                        <input type="password" id="deletePassword" placeholder="كلمة سر الحذف" style="width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.5); border: 2px solid var(--neon-red); border-radius: 10px; color: white;">
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-danger" onclick="confirmDelete('${type}')" style="flex: 2;">
                                <i class="fas fa-check"></i> تأكيد الحذف
                            </button>
                            <button class="btn btn-secondary" onclick="closeModal('deleteModal')" style="flex: 1;">
                                <i class="fas fa-times"></i> إلغاء
                            </button>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('deleteModalContent').innerHTML = content;
            document.getElementById('deleteModal').classList.add('show');
        }
        
        async function confirmDelete(type) {
            const password = document.getElementById('deletePassword')?.value;
            
            if (password !== '11111@') {
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'كلمة السر غير صحيحة',
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                return;
            }
            
            try {
                if (type === 'request') {
                    await db.collection("Requests").doc(currentDeleteId).delete();
                } else {
                    if (currentUser?.role !== 'super_admin') {
                        Swal.fire({
                            icon: 'error',
                            title: 'غير مصرح',
                            text: 'أنت لا تملك صلاحية حذف المستخدمين',
                            background: '#030514',
                            confirmButtonColor: '#00ffff'
                        });
                        return;
                    }
                    await db.collection("Users").doc(currentDeleteId).delete();
                }
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم الحذف',
                    text: `تم حذف ${type === 'request' ? 'الطلب' : 'المستخدم'} بنجاح`,
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
                
                closeModal('deleteModal');
                if (type === 'request') {
                    closeModal('requestModal');
                }
                
            } catch (error) {
                console.error(`Error deleting ${type}:`, error);
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: `حدث خطأ في حذف ${type === 'request' ? 'الطلب' : 'المستخدم'}`,
                    background: '#030514',
                    confirmButtonColor: '#00ffff'
                });
            }
        }
        
        // =====================================================================
        // تغيير العرض
        // =====================================================================
        function changeView(view) {
            currentView = view;
            setActiveNav(view);
            
            if (view === 'users') {
                document.getElementById('statsContainer').style.display = 'none';
                document.getElementById('pageTitle').textContent = 'إدارة المستخدمين';
                document.getElementById('pageIcon').className = 'fas fa-users-cog';
                loadUsers();
            } else {
                document.getElementById('statsContainer').style.display = 'block';
                document.getElementById('pageTitle').textContent = view === 'all' ? 'كل الطلبات' : (view === 'شكوى' ? 'سجل الشكاوى' : 'سجل المقترحات');
                document.getElementById('pageIcon').className = 'fas fa-database';
                loadRequests();
            }
        }
        
        // =====================================================================
        // التهيئة
        // =====================================================================
        document.addEventListener('DOMContentLoaded', async function() {
            createParticles();
            
            // تحميل معلومات المستخدم الحالي
            loadCurrentUser();
            
            // التحقق من تسجيل الدخول
            const userId = localStorage.getItem('currentUserId');
            if (!userId) {
                window.location.href = 'index.html';
                return;
            }
            
            // تحديث آخر دخول للمستخدم
            await updateUserLastLogin(userId);
            
            // تحميل الإعدادات المحفوظة
            const savedLogo = localStorage.getItem('logo_url');
            if (savedLogo) {
                document.getElementById('sidebarLogo').src = savedLogo;
            }
            
            // إضافة مستمعي الأحداث لأزرار التنقل
            document.getElementById('navAll').addEventListener('click', () => changeView('all'));
            document.getElementById('navComplaints').addEventListener('click', () => changeView('شكوى'));
            document.getElementById('navSuggestions').addEventListener('click', () => changeView('اقتراح'));
            document.getElementById('navUsers').addEventListener('click', () => changeView('users'));
            document.getElementById('logoutBtn').addEventListener('click', logout);
            
            // تحميل البيانات
            changeView('all');
        });
        
        // تنظيف عند إغلاق الصفحة
        window.addEventListener('beforeunload', function() {
            if (unsubscribeRequests) {
                unsubscribeRequests();
            }
            if (unsubscribeUsers) {
                unsubscribeUsers();
            }
        });
    </script>
</body>
</html>
