<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>إعادة تعيين كلمة مرور السوبر أدمن - نقابة تكنولوجيا المعلومات | VR 2.05.2026</title>
    
    <!-- الخطوط الأساسية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- bcryptjs للتشفير الآمن -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* =====================================================================
           تصميم فخم لإعادة تعيين كلمة مرور السوبر أدمن
           ===================================================================== */
        
        :root {
            --bg-deep: #030514;
            --bg-dark: #0a0f1f;
            --bg-medium: #111827;
            --bg-light: #1e293b;
            --bg-card: rgba(15, 23, 42, 0.35);
            --bg-card-solid: #0f172a;
            
            --neon-cyan: #00ffff;
            --neon-cyan-light: #7fffff;
            --neon-cyan-dark: #00cccc;
            --neon-cyan-glow: rgba(0, 255, 255, 0.7);
            
            --neon-purple: #a855f7;
            --neon-purple-light: #c084fc;
            --neon-purple-dark: #9333ea;
            --neon-purple-glow: rgba(168, 85, 247, 0.7);
            
            --neon-pink: #ec4899;
            --neon-pink-glow: rgba(236, 72, 153, 0.7);
            
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.7);
            
            --neon-red: #ef4444;
            --neon-red-glow: rgba(239, 68, 68, 0.7);
            
            --neon-orange: #f97316;
            --neon-orange-glow: rgba(249, 115, 22, 0.7);
            
            --neon-blue: #3b82f6;
            --neon-blue-glow: rgba(59, 130, 246, 0.7);
            
            --gradient-prime: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            --gradient-success: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            --gradient-danger: linear-gradient(135deg, var(--neon-red), var(--neon-orange));
            --gradient-warning: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 30px 60px rgba(0, 0, 0, 0.6);
            --shadow-neon: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-purple);
            --shadow-neon-strong: 0 0 50px var(--neon-cyan), 0 0 100px var(--neon-purple);
            
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 40px;
            
            --text-xs: 12px;
            --text-sm: 14px;
            --text-md: 16px;
            --text-lg: 18px;
            --text-xl: 20px;
            --text-2xl: 24px;
            --text-3xl: 30px;
            --text-4xl: 36px;
            
            --transition-fast: 0.2s;
            --transition-normal: 0.3s;
            --transition-slow: 0.5s;
            
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            
            --border-color: rgba(255, 255, 255, 0.1);
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
            --border-radius-xl: 32px;
            --border-radius-2xl: 40px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: #ffffff;
            direction: rtl;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
            padding: 20px;
        }
        
        /* خلفية متحركة سينمائية */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            animation: cosmicDrift 40s ease-in-out infinite alternate;
            z-index: -2;
            pointer-events: none;
        }
        
        @keyframes cosmicDrift {
            0% { opacity: 0.5; transform: scale(1); filter: hue-rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1.05); filter: hue-rotate(10deg); }
            100% { opacity: 0.5; transform: scale(1); filter: hue-rotate(0deg); }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 40s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(60px) translateX(40px); }
        }
        
        /* جزيئات متطايرة فاخرة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 50%;
            animation: particleFloat 25s linear infinite;
            opacity: 0.4;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        
        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(150px) rotate(720deg); opacity: 0; }
        }
        
        /* الحاوية الرئيسية */
        .reset-container {
            max-width: 550px;
            margin: 40px auto;
            position: relative;
            z-index: 10;
        }
        
        /* الهيدر الفخم */
        .reset-header {
            text-align: center;
            margin-bottom: 40px;
            animation: headerAppear 1.2s var(--ease-elastic);
        }
        
        @keyframes headerAppear {
            0% { opacity: 0; transform: translateY(-50px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .logo-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .logo-wrapper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--neon-cyan), var(--neon-purple), var(--neon-pink), transparent);
            animation: rotateConic 8s linear infinite;
            mask: radial-gradient(circle, transparent 60%, black 61%);
            -webkit-mask: radial-gradient(circle, transparent 60%, black 61%);
        }
        
        @keyframes rotateConic {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--neon-cyan);
            box-shadow: 0 0 40px var(--neon-cyan);
            object-fit: cover;
            position: relative;
            z-index: 2;
        }
        
        .reset-title {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
            animation: titleGlow 3s ease-in-out infinite;
        }
        
        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 20px var(--neon-cyan)); }
            50% { filter: drop-shadow(0 0 40px var(--neon-purple)); }
            100% { filter: drop-shadow(0 0 20px var(--neon-cyan)); }
        }
        
        .reset-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* الكارت الفخم */
        .reset-card {
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(0, 255, 255, 0.1) inset;
            animation: cardAppear 1s var(--ease-smooth);
            position: relative;
            overflow: hidden;
        }
        
        .reset-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.1), transparent 70%);
            animation: cardRotate 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes cardRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .card-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--neon-cyan);
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .card-title i {
            font-size: 32px;
        }
        
        /* اختبار الاتصال */
        .test-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .test-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .test-label {
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .test-badge {
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
        }
        
        .test-badge.connecting {
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
            border: 1px solid #f97316;
        }
        
        .test-badge.connected {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
        }
        
        .test-badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        
        .admin-info {
            background: rgba(0, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .admin-info p {
            margin: 8px 0;
            font-size: 14px;
        }
        
        /* الحقول */
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }
        
        .input-group label i {
            color: var(--neon-cyan);
            margin-left: 10px;
            width: 25px;
        }
        
        .neon-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(3, 5, 20, 0.6);
            border: 2px solid var(--border-color);
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .neon-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px var(--neon-cyan);
            transform: translateY(-2px);
        }
        
        .neon-input:hover {
            border-color: var(--neon-purple);
        }
        
        /* أزرار الإجراءات */
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s var(--ease-bounce);
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: #fff;
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        
        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 50px var(--neon-cyan);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--neon-cyan);
            transform: translateY(-3px);
        }
        
        .btn-test {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            color: #fff;
            box-shadow: 0 0 20px var(--neon-orange);
        }
        
        .btn-test:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px var(--neon-orange);
        }
        
        /* رسالة الحالة */
        .status-message {
            text-align: center;
            padding: 15px;
            border-radius: 40px;
            margin-top: 20px;
            display: none;
            animation: messageAppear 0.5s var(--ease-elastic);
        }
        
        @keyframes messageAppear {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .status-message.show {
            display: block;
        }
        
        .status-message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
        }
        
        .status-message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
        }
        
        .status-message.warning {
            background: rgba(249, 115, 22, 0.2);
            border: 1px solid var(--neon-orange);
            color: var(--neon-orange);
        }
        
        /* شريط التقدم */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-bar.show {
            display: block;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        /* تذييل */
        .reset-footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }
        
        .version {
            font-family: 'Orbitron', monospace;
            color: var(--neon-cyan);
            margin-top: 10px;
        }
        
        /* تحسينات الجوال */
        @media (max-width: 768px) {
            .reset-card {
                padding: 30px;
            }
            
            .reset-title {
                font-size: 28px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
            
            .test-status {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- جزيئات متطايرة فاخرة -->
    <div class="particles" id="particles"></div>
    
    <div class="reset-container">
        <!-- الهيدر الفخم -->
        <div class="reset-header">
            <div class="logo-wrapper">
                <img src="https://placehold.co/120x120/0a0f1f/00ffff/png?text=Logo" alt="شعار النقابة" class="logo" id="reset-logo">
            </div>
            <h1 class="reset-title">إعادة تعيين كلمة المرور</h1>
            <p class="reset-subtitle">لسوبر أدمن النظام</p>
        </div>
        
        <!-- كارت إعادة التعيين -->
        <div class="reset-card">
            <div class="card-title">
                <i class="fas fa-key"></i>
                <span>تعيين كلمة مرور جديدة</span>
            </div>
            
            <!-- قسم اختبار الاتصال وقاعدة البيانات -->
            <div class="test-section">
                <div class="test-status">
                    <span class="test-label">
                        <i class="fas fa-database"></i>
                        حالة قاعدة البيانات:
                    </span>
                    <span class="test-badge" id="db-status">جاري الفحص...</span>
                </div>
                <div class="test-status">
                    <span class="test-label">
                        <i class="fas fa-user-shield"></i>
                        السوبر أدمن:
                    </span>
                    <span id="admin-status" style="color: var(--neon-cyan);">جاري البحث...</span>
                </div>
                <div class="admin-info" id="admin-info" style="display: none;">
                    <p><i class="fas fa-user"></i> <strong>اسم المستخدم:</strong> <span id="admin-username">-</span></p>
                    <p><i class="fas fa-user-circle"></i> <strong>الاسم الكامل:</strong> <span id="admin-name">-</span></p>
                    <p><i class="fas fa-phone"></i> <strong>رقم الهاتف:</strong> <span id="admin-phone">-</span></p>
                </div>
                <div style="margin-top: 15px;">
                    <button class="btn-test" onclick="testConnection()" style="width: 100%;">
                        <i class="fas fa-sync-alt"></i> اختبار الاتصال بقاعدة البيانات
                    </button>
                </div>
            </div>
            
            <!-- حقل كلمة المرور الجديدة -->
            <div class="input-group">
                <label><i class="fas fa-lock"></i> كلمة المرور الجديدة</label>
                <input type="password" id="new-password" class="neon-input" placeholder="أدخل كلمة المرور الجديدة">
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-check-circle"></i> تأكيد كلمة المرور الجديدة</label>
                <input type="password" id="confirm-password" class="neon-input" placeholder="أعد إدخال كلمة المرور الجديدة">
            </div>
            
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            
            <div class="status-message" id="status-message"></div>
            
            <div class="actions">
                <button class="btn btn-primary" onclick="resetPassword()">
                    <i class="fas fa-save"></i> تعيين كلمة المرور
                </button>
                <button class="btn btn-secondary" onclick="goToLogin()">
                    <i class="fas fa-sign-in-alt"></i> الذهاب لتسجيل الدخول
                </button>
            </div>
        </div>
        
        <!-- تذييل -->
        <div class="reset-footer">
            <p>نقابة تكنولوجيا المعلومات والبرمجيات © 2026</p>
            <p class="version">VR 2.05.2026 | جميع الحقوق محفوظة</p>
        </div>
    </div>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        // =====================================================================
        // تهيئة Firebase
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC71PVDTouBkQ4hRTANelbwRo4AYI6LwnE",
            authDomain: "itwsreq.firebaseapp.com",
            projectId: "itwsreq",
            storageBucket: "itwsreq.firebasestorage.app",
            messagingSenderId: "417900842360",
            appId: "1:417900842360:web:83d9310f36fef5bbbe4c8d",
            measurementId: "G-P3YQFRSBMM"
        };
        
        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // تفعيل التخزين المؤقت
        db.settings({ 
            cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED,
            ignoreUndefinedProperties: true
        });
        
        // =====================================================================
        // الثوابت
        // =====================================================================
        const DEFAULT_LOGO = 'https://placehold.co/120x120/0a0f1f/00ffff/png?text=Logo';
        let currentAdmin = null;
        
        // =====================================================================
        // دوال مساعدة
        // =====================================================================
        function showProgress(show) {
            const progressBar = document.getElementById('progress-bar');
            if (show) {
                progressBar.classList.add('show');
            } else {
                progressBar.classList.remove('show');
            }
        }
        
        function updateProgress(percent) {
            const progressFill = document.getElementById('progress-fill');
            progressFill.style.width = percent + '%';
        }
        
        function showMessage(type, text) {
            const messageEl = document.getElementById('status-message');
            messageEl.className = 'status-message ' + type;
            messageEl.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${text}`;
            messageEl.classList.add('show');
            
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 5000);
        }
        
        // =====================================================================
        // تحميل اللوجو المحفوظ
        // =====================================================================
        async function loadLogo() {
            try {
                const settingsDoc = await db.collection('Settings').doc('system').get();
                if (settingsDoc.exists && settingsDoc.data().logo) {
                    document.getElementById('reset-logo').src = settingsDoc.data().logo;
                }
            } catch (error) {
                console.error('خطأ في تحميل اللوجو:', error);
            }
        }
        
        // =====================================================================
        // اختبار الاتصال بقاعدة البيانات
        // =====================================================================
        window.testConnection = async function() {
            const dbStatusEl = document.getElementById('db-status');
            const adminStatusEl = document.getElementById('admin-status');
            const adminInfoEl = document.getElementById('admin-info');
            
            dbStatusEl.textContent = 'جاري الاتصال...';
            dbStatusEl.className = 'test-badge connecting';
            adminStatusEl.textContent = 'جاري البحث...';
            
            try {
                // اختبار الاتصال
                await db.collection('_test_').doc('test').set({ timestamp: Date.now() });
                dbStatusEl.textContent = '🟢 متصل';
                dbStatusEl.className = 'test-badge connected';
                
                // البحث عن السوبر أدمن
                const snapshot = await db.collection('Users')
                    .where('role', '==', 'super_admin')
                    .limit(1)
                    .get();
                
                if (snapshot.empty) {
                    adminStatusEl.textContent = '❌ غير موجود';
                    adminStatusEl.style.color = '#ef4444';
                    adminInfoEl.style.display = 'none';
                    currentAdmin = null;
                    showMessage('error', '❌ لا يوجد مستخدم سوبر أدمن في قاعدة البيانات');
                    return;
                }
                
                const admin = snapshot.docs[0];
                const data = admin.data();
                currentAdmin = { id: admin.id, ...data };
                
                adminStatusEl.textContent = '✅ موجود';
                adminStatusEl.style.color = '#10b981';
                
                document.getElementById('admin-username').textContent = data.username || 'admin';
                document.getElementById('admin-name').textContent = data.name || 'المشرف العام';
                document.getElementById('admin-phone').textContent = data.phone || '01234567890';
                adminInfoEl.style.display = 'block';
                
                showMessage('success', '✅ الاتصال بقاعدة البيانات ناجح وتم العثور على السوبر أدمن');
                
            } catch (error) {
                console.error('خطأ في الاختبار:', error);
                dbStatusEl.textContent = '🔴 غير متصل';
                dbStatusEl.className = 'test-badge error';
                adminStatusEl.textContent = 'خطأ';
                adminStatusEl.style.color = '#ef4444';
                showMessage('error', '❌ فشل الاتصال بقاعدة البيانات: ' + error.message);
                currentAdmin = null;
            }
        };
        
        // =====================================================================
        // تشفير كلمة المرور باستخدام bcrypt
        // =====================================================================
        async function hashPassword(password) {
            if (typeof bcrypt !== 'undefined') {
                const salt = await bcrypt.genSalt(10);
                return await bcrypt.hash(password, salt);
            }
            console.warn('⚠️ bcryptjs غير متاح، استخدام تشفير بسيط');
            return btoa(password);
        }
        
        // =====================================================================
        // إعادة تعيين كلمة المرور
        // =====================================================================
        window.resetPassword = async function() {
            const newPassword = document.getElementById('new-password')?.value.trim();
            const confirmPassword = document.getElementById('confirm-password')?.value.trim();
            
            // التحقق من وجود السوبر أدمن
            if (!currentAdmin) {
                showMessage('error', '❌ لم يتم العثور على السوبر أدمن. قم باختبار الاتصال أولاً');
                return;
            }
            
            // التحقق من إدخال كلمة المرور
            if (!newPassword) {
                showMessage('error', '❌ الرجاء إدخال كلمة المرور الجديدة');
                return;
            }
            
            // التحقق من طول كلمة المرور
            if (newPassword.length < 6) {
                showMessage('error', '❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            // التحقق من تطابق كلمة المرور
            if (newPassword !== confirmPassword) {
                showMessage('error', '❌ كلمة المرور غير متطابقة');
                return;
            }
            
            try {
                showProgress(true);
                updateProgress(30);
                
                // تشفير كلمة المرور الجديدة
                const hashedPassword = await hashPassword(newPassword);
                
                updateProgress(60);
                
                // تحديث كلمة المرور في قاعدة البيانات
                await db.collection('Users').doc(currentAdmin.id).update({
                    password: hashedPassword,
                    passwordResetAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                updateProgress(100);
                showProgress(false);
                
                showMessage('success', '✅ تم إعادة تعيين كلمة المرور بنجاح');
                
                // مسح الحقول
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
                
                Swal.fire({
                    icon: 'success',
                    title: 'تم إعادة تعيين كلمة المرور',
                    html: `
                        <div style="text-align: center;">
                            <p style="color: #00ffff; font-size: 18px; margin-bottom: 15px;">كلمة المرور الجديدة:</p>
                            <div style="background: rgba(0,255,255,0.1); padding: 20px; border-radius: 20px;">
                                <code style="color: #00ffff; font-size: 20px; font-family: monospace;">${newPassword}</code>
                            </div>
                            <p style="color: var(--neon-green); margin-top: 20px;">يمكنك الآن استخدامها لتسجيل الدخول</p>
                        </div>
                    `,
                    background: '#030514',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#00ffff'
                });
                
            } catch (error) {
                console.error('خطأ في إعادة تعيين كلمة المرور:', error);
                showMessage('error', '❌ ' + error.message);
                showProgress(false);
            }
        };
        
        // =====================================================================
        // الذهاب لتسجيل الدخول
        // =====================================================================
        function goToLogin() {
            window.location.href = 'index.html';
        }
        
        // =====================================================================
        // إنشاء الجزيئات
        // =====================================================================
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.animationDuration = 15 + Math.random() * 15 + 's';
                container.appendChild(p);
            }
        }
        
        // =====================================================================
        // التهيئة
        // =====================================================================
        window.addEventListener('load', async function() {
            createParticles();
            await loadLogo();
            
            // فحص تلقائي عند التحميل
            setTimeout(() => {
                testConnection();
            }, 1000);
        });
    </script>
</body>
</html>
